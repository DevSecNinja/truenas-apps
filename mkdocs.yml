---
site_name: TrueNAS Home Lab Apps
site_url: https://homelab.devsecninja.com/
site_description: Docker Compose stacks for a TrueNAS home lab server, managed with SOPS, Renovate, and GitOps
site_author: DevSecNinja
repo_url: https://github.com/DevSecNinja/truenas-apps
repo_name: DevSecNinja/truenas-apps
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    logo: material/server-network
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  # yamlfmt: off
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          # yaml-language-server-disable
          format: !!python/name:pymdownx.superfences.fence_code_format
  # yamlfmt: on
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Reference:
      - Architecture: ARCHITECTURE.md
      - Infrastructure: INFRASTRUCTURE.md
  - Guides:
      - Backup Strategy: BACKUP.md
      - Contributing: CONTRIBUTING.md
      - Database Upgrades: DATABASE-UPGRADES.md
      - Linux VM Deployment: VM-LINUX.md
      - Disaster Recovery: DISASTER-RECOVERY.md
      - Troubleshooting: TROUBLESHOOTING.md
  - Services:
      - AdGuard Home: services/adguard.md
      - Bazarr: services/bazarr.md
      - Dozzle: services/dozzle.md
      - Draw.io: services/drawio.md
      - Echo Server: services/echo-server.md
      - ESPHome: services/esphome.md
      - Excalidraw: services/excalidraw.md
      - Frigate: services/frigate.md
      - Gatus: services/gatus.md
      - hadiscover API: services/hadiscover.md
      - Home Assistant: services/home-assistant.md
      - Homepage: services/homepage.md
      - Immich: services/immich.md
      - Lidarr: services/lidarr.md
      - Matter Server: services/matter-server.md
      - MeTube: services/metube.md
      - Mosquitto: services/mosquitto.md
      - Outline: services/outline.md
      - Plex: services/plex.md
      - Prowlarr: services/prowlarr.md
      - qBittorrent: services/qbittorrent.md
      - Radarr: services/radarr.md
      - SABnzbd: services/sabnzbd.md
      - Sonarr: services/sonarr.md
      - Spottarr: services/spottarr.md
      - SQLite Web: services/sqlite-web.md
      - Traefik: services/traefik.md
      - Traefik Forward Auth: services/traefik-forward-auth.md
      - TubeSync: services/tubesync.md
      - Unifi: services/unifi.md
      - wmbusmeters: services/wmbusmeters.md
  - Retired Services: RETIRED-SERVICES.md
