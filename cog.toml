# see https://docs.cocogitto.io/
tag_prefix = "v"
from_latest_tag = true
ignore_merge_commits = true
filter_commits = ["Initial commit"]
# Changelog is generated by git-cliff in pre_bump_hooks; disable cog's built-in output
disable_changelog = true

pre_bump_hooks = [
    "mise exec -- git-cliff --tag {{version_tag}} --output CHANGELOG.md",
    "mise exec -- dprint fmt CHANGELOG.md",
    "git add CHANGELOG.md",
]

post_bump_hooks = [
    "git push",
    "git push origin {{version_tag}}",
]
