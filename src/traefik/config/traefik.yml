api:
  dashboard: true

ping: {}

global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
          permanent: true
  https:
    address: ":443"
    http:
      tls: {}

metrics:
  prometheus:
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0
      - 10.0

providers:
  docker:
    endpoint: tcp://traefik-docker-proxy:2375
    exposedByDefault: false
  file:
    directory: "/rules"
    watch: true

certificatesResolvers:
  dns-cloudflare:
    acme:
      # caServer: "https://acme-staging-v02.api.letsencrypt.org/directory" # LetsEncrypt Staging Server - uncomment when testing
      storage: "/acme/acme.json"
      dnsChallenge:
        provider: "cloudflare"
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"

accessLog:
  filters:
    statusCodes:
      - "400-499"
  fields:
    headers:
      names:
        User-Agent: keep
        Authorization: drop
        Content-Type: keep

log:
  level: INFO
