---
services:
  # Sets ownership on the traefik-acme volume so the non-root traefik container
  # can write acme.json to it. Runs once, then exits.
  # Required because traefik runs as ${PUID}:${PGID} with cap_drop: ALL, meaning
  # it has no CAP_CHOWN and cannot fix volume ownership itself at runtime.
  traefik-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: traefik-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to change file ownership
      - FOWNER # Required to chmod files after chown transfers ownership away from root
      - DAC_OVERRIDE # Required to traverse /acme if it was previously chowned to ${PUID}:${PGID}
    read_only: true
    command:
      - "sh"
      - "-c"
      - "chown -Rv ${PUID:-1000}:${PGID:-1000} /acme && chmod -v 700 /acme && touch /acme/acme.json && chmod -v 600 /acme/acme.json
        && chown -Rv ${PUID:-1000}:${PGID:-1000} /config"
    volumes:
      - traefik-acme:/acme
      - ./config:/config

  traefik:
    image: docker.io/library/traefik:v3.6.12@sha256:171c9c3565b29f6c133f1c1b43c5d4e5853415198e9e1078c001f8702ff66aec
    container_name: traefik
    depends_on:
      traefik-init:
        condition: service_completed_successfully
      traefik-docker-proxy:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      # Defined here instead of compose.env because env_file values are not interpolated by Compose,
      # so ${DOMAINNAME} would be passed as a literal string rather than the actual domain.
      TRAEFIK_PROVIDERS_DOCKER_DEFAULTRULE: >-
        Host(`{{ index .Labels "com.docker.compose.service" }}.${DOMAINNAME}`)
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: always
    networks:
      - traefik-backend
      - adguard-frontend
      - echo-server-frontend
      - gatus-frontend
      - homepage-frontend
      - traefik-forward-auth-frontend
      - unifi-frontend
      - plex-frontend
      - metube-frontend
      - immich-frontend
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - ${HOST_HTTP_PORT:-80}:80
      - ${HOST_HTTPS_PORT:-443}:443
    read_only: true
    tmpfs:
      - /tmp
      - /run
    volumes:
      - traefik-acme:/acme
      - ./config/rules:/rules:ro
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
    healthcheck:
      test:
        - "CMD"
        - "traefik"
        - "healthcheck"
        - "--ping"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: ${MEM_LIMIT:-1024m}
    pids_limit: 100
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Traefik
      - homepage.icon=traefik.svg
      - homepage.href=https://traefik.$DOMAINNAME
      - homepage.description=Application Proxy
      # Traefik
      - "traefik.enable=true"
      ## TLS
      - "traefik.http.routers.traefik-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.traefik-rtr.tls.domains[0].main=${DOMAINNAME}"
      - "traefik.http.routers.traefik-rtr.tls.domains[0].sans=*.${DOMAINNAME}"
      ## Middlewares
      - "traefik.http.routers.traefik-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.traefik-rtr.rule=Host(`traefik.${DOMAINNAME}`)"
      - "traefik.http.routers.traefik-rtr.service=api@internal"
      ## SVLNAS redirect to TrueNAS portal (80/443 → 8443)
      - "traefik.http.routers.svlnas-rtr.rule=Host(`svlnas.${DOMAINNAME}`)"
      - "traefik.http.routers.svlnas-rtr.entrypoints=https"
      - "traefik.http.routers.svlnas-rtr.tls=true"
      - "traefik.http.routers.svlnas-rtr.middlewares=middlewares-redirect-to-nas-mgmt"
      - "traefik.http.routers.svlnas-rtr.service=noop@internal"
      - "traefik.http.middlewares.middlewares-redirect-to-nas-mgmt.redirectregex.regex=^https?://svlnas\\.${DOMAINNAME}(.*)"
      - "traefik.http.middlewares.middlewares-redirect-to-nas-mgmt.redirectregex.replacement=https://svlnas.${DOMAINNAME}:8443$${1}"
      - "traefik.http.middlewares.middlewares-redirect-to-nas-mgmt.redirectregex.permanent=true"

  # LinuxServer socket-proxy runs as root by design (requires Docker socket access).
  # It does not support custom users, mods, or scripts.
  # See: https://github.com/linuxserver/docker-socket-proxy
  # cap_drop: ALL is therefore omitted.
  traefik-docker-proxy:
    image: lscr.io/linuxserver/socket-proxy:version-3.2.14-r0@sha256:56dde3144ef213d2df1ee3d600baad521bd8b8c2bf844672719b07363606f4c2
    container_name: traefik-docker-proxy
    restart: always
    networks:
      - traefik-backend
    env_file:
      - path: ../shared/env/tz.env
    environment:
      - CONTAINERS=1
    security_opt:
      - no-new-privileges=true
    mem_limit: ${SOCKET_PROXY_MEM_LIMIT:-50m}
    pids_limit: 50
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:2375/_ping"
      interval: 5s
      timeout: 5s
      retries: 3

networks:
  traefik-backend:
    name: traefik-backend
    driver: bridge
    internal: true
  echo-server-frontend:
    name: echo-server-frontend
    external: true
  adguard-frontend:
    name: adguard-frontend
    external: true
  gatus-frontend:
    name: gatus-frontend
    external: true
  homepage-frontend:
    name: homepage-frontend
    external: true
  traefik-forward-auth-frontend:
    name: traefik-forward-auth-frontend
    external: true
  unifi-frontend:
    name: unifi-frontend
    external: true
  plex-frontend:
    name: plex-frontend
    external: true
  metube-frontend:
    name: metube-frontend
    external: true
  immich-frontend:
    name: immich-frontend
    external: true

volumes:
  traefik-acme:
    name: traefik-acme
