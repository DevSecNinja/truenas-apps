---
services:
  gatus:
    image: twinproduction/gatus:v5.35.0@sha256:21609f31be8c4e680ce3004b24276305666239c99aff58391503f3fb6142f39d
    container_name: gatus
    depends_on:
      gatus-db:
        condition: service_healthy
    env_file:
      - .env # Decrypted from secret.sops.env
      - ../shared/env/tz.env
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      # Database
      - DB_ENGINE=postgres
      - DB_DATABASE=gatus
      - DB_USER=gatus
      - DB_PASSWORD=${GATUS_DB_PASSWORD}
      - DB_HOST=gatus-db
      - DB_PORT=5432
    restart: always
    networks:
      - gatus-frontend
      - gatus-backend
    mem_limit: ${MEM_LIMIT:-500m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    read_only: true
    tmpfs:
      - /tmp
    configs:
      - source: gatus-config
        target: /config/config.yaml
    # No healthcheck — the image is scratch-based (no shell, wget, or curl available)
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Gatus
      - homepage.icon=gatus.svg
      - homepage.href=https://status.${DOMAINNAME}
      - homepage.description=Uptime Monitoring
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=gatus-frontend"
      ## HTTP Routers
      - "traefik.http.routers.gatus-rtr.rule=Host(`status.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.gatus-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services
      - "traefik.http.routers.gatus-rtr.service=gatus"
      - "traefik.http.services.gatus.loadbalancer.server.port=8080"

  gatus-db:
    image: docker.io/library/postgres:17.8-alpine@sha256:3430fe182f5065a6ea505c3d432d2c7fff18fbab954df8f277c1dbf4c70124af
    container_name: gatus-db
    depends_on:
      gatus-db-upgrade:
        condition: service_completed_successfully
    env_file:
      - .env # Decrypted from secret.sops.env
      - ../shared/env/tz.env
    environment:
      - POSTGRES_DB=gatus
      - POSTGRES_USER=gatus
      - POSTGRES_PASSWORD=${GATUS_DB_PASSWORD}
    restart: always
    networks:
      - gatus-backend
    mem_limit: ${DB_MEM_LIMIT:-1024m}
    pids_limit: 100
    shm_size: 128mb
    security_opt:
      - no-new-privileges=true
    read_only: true
    tmpfs:
      - /tmp
      - /run
    volumes:
      - gatus-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  gatus-db-upgrade:
    image: pgautoupgrade/pgautoupgrade:17.7-alpine@sha256:091e51fb5347d48aec720b139f3b1ede45d4721310274c688cead29e77845921
    container_name: gatus-db-upgrade
    env_file:
      - .env # Decrypted from secret.sops.env
      - ../shared/env/tz.env
    environment:
      - POSTGRES_DB=gatus
      - POSTGRES_USER=gatus
      - POSTGRES_PASSWORD=${GATUS_DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
      - PGAUTO_ONESHOT=yes
    restart: "no"
    network_mode: none
    mem_limit: ${DB_MEM_LIMIT:-1024m}
    pids_limit: 100
    shm_size: 128mb
    security_opt:
      - no-new-privileges=true
    volumes:
      - gatus-db-data:/var/lib/postgresql/data

  # tiredofit/db-backup uses s6-overlay which must start as root.
  # It handles user switching internally via USER_DBBACKUP/GROUP_DBBACKUP.
  # read_only is also not set because s6-overlay needs extensive writable paths.
  gatus-db-backup:
    image: tiredofit/db-backup:4.1.100@sha256:78e3cb669ee9648c1a4ab7e8421c6e89d01b659bfa5963f7611a2347b2009eab
    container_name: gatus-db-backup
    depends_on:
      gatus-db:
        condition: service_healthy
    env_file:
      - .env # Decrypted from secret.sops.env
      - ../shared/env/tz.env
    environment:
      - USER_DBBACKUP=${PUID:-1000}
      - GROUP_DBBACKUP=${PGID:-1000}
      - CONTAINER_NAME=gatus-db-backup
      - CONTAINER_ENABLE_MONITORING=FALSE
      # Notification settings
      - ENABLE_NOTIFICATIONS=TRUE
      - NOTIFICATION_TYPE=EMAIL
      - SMTP_HOST=${NOTIFICATIONS_EMAIL_HOST}
      - SMTP_DOMAIN=${NOTIFICATIONS_EMAIL_DOMAIN}
      - SMTP_PORT=${NOTIFICATIONS_EMAIL_PORT}
      - SMTP_USER=${NOTIFICATIONS_EMAIL_USERNAME}
      - SMTP_PASS=${NOTIFICATIONS_EMAIL_PASSWORD}
      - MAIL_TO=${NOTIFICATIONS_EMAIL_TO}
      - MAIL_FROM=${NOTIFICATIONS_EMAIL_FROM}
      - SMTP_AUTHENTICATION=on
      - SMTP_TLSCERTCHECK=TRUE
      - SMTP_STARTTLS=on
      - SMTP_TLS=on
      # Backup defaults
      - DEFAULT_CHECKSUM=SHA1
      - DEFAULT_COMPRESSION=ZSTD
      - DEFAULT_BACKUP_INTERVAL=1440
      - DEFAULT_BACKUP_BEGIN=0000
      - DEFAULT_CLEANUP_TIME=2880
      # Encryption
      - DEFAULT_ENCRYPT=TRUE
      - DEFAULT_ENCRYPT_PASSPHRASE=${DB_ENC_PASSPHRASE}
      # Database
      - DB01_TYPE=pgsql
      - DB01_HOST=gatus-db
      - DB01_NAME=gatus
      - DB01_USER=gatus
      - DB01_PORT=5432
      - DB01_PASS=${GATUS_DB_PASSWORD}
    restart: always
    networks:
      - gatus-backend
    mem_limit: ${BACKUP_MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    volumes:
      - ./backups/db-backup:/backup

networks:
  gatus-frontend:
    name: gatus-frontend
    driver: bridge
  gatus-backend:
    name: gatus-backend
    driver: bridge
    internal: true

volumes:
  gatus-db-data:
    name: gatus-db-data

configs:
  gatus-config:
    file: ./config/config.yaml
