---
# Manual work to implement on a new server:
#
# First-run steps:
#   1. Plex claim token must be refreshed (only 4 minutes valid) (get it from https://www.plex.tv/claim/)
#   2. Spin up the Plex container
#   3. In Settings → Network:
#        - Set 'Custom server access URLs' to https://plex.<DOMAINNAME>
#          (this is what allows Traefik-proxied requests to be accepted)
#        - Set 'LAN Networks' to 192.168.0.0/16,172.16.0.0/16 (Traefik uses 172.16.0.0/16 network)
#          You should now see streams mentioned as 'Local' instead of 'Remote'. Note that within the Plex
#          portal in the server settings, you'll still see 'Remote' being mentioned, but this seems normal)
#
# Remaining setup steps:
# - Enable automatic library scanning in Plex settings
# - Set 'Transcoder temporary directory' to /data/transcode in Plex settings
# - Set backup directory in Plex settings under Scheduled Tasks

services:
  # s6-overlay exception (see ARCHITECTURE.md): read_only is omitted because s6-overlay starts as
  # root and needs a writable rootfs to create /etc/passwd and /etc/group entries for PUID/PGID,
  # chown /config, and then drop privileges internally. With read_only=true none of this works and
  # PUID/PGID are silently ignored. user: is also omitted for the same reason.
  # PUID=911 (LinuxServer Plex default) and PGID=3051 (media-readers) are set explicitly so that
  # the Plex process actually runs as 911:3051 with group 3051 in its supplementary groups, matching
  # the TrueNAS dataset ACL entry that grants media-readers read access.
  # /run is mounted as tmpfs (with exec) for s6-overlay's service files.
  # The /config volume must be owned by UID 911 — fix with:
  #   sudo docker run --rm -v plex-data:/config alpine chown -R 911:911 /config
  plex:
    image: lscr.io/linuxserver/plex:version-1.43.0.10492-121068a07@sha256:cbd631f9a972a1c453953a9192c1781dd7d2084db075a1bee78a3cc6387fb103
    container_name: plex
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
      - path: ../shared/env/pgid-media.env # Sets PGID=3051 (media-readers)
    environment:
      - PUID=911 # LinuxServer Plex default UID
      - HOSTNAME=plex
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM_TOKEN} # Get it from: https://www.plex.tv/claim/
    restart: always
    tmpfs:
      - /run:exec
    ports:
      - "32400:32400" # First-run only: remove after completing setup via direct port access (see top of file)
    networks:
      - plex-frontend
    mem_limit: ${MEM_LIMIT:-2048m}
    pids_limit: 500 # Plex spawns many threads for plugins, DB, and transcoding
    security_opt:
      - no-new-privileges=true
    ulimits:
      sigpending: 62793
      nproc: 131072
      nofile: 60000
      core: 0
    # devices:
    #   - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - plex-data:/config
      # Note: set "Transcoder temporary directory" to /data/transcode in Plex settings
      - /dev/shm:/data/transcode
      # Media datasets (ZFS on TrueNAS)
      - /mnt/archive-pool/Media/Audiobooks:/media/audiobooks:ro
      - /mnt/archive-pool/Media/Movies:/media/movies:ro
      - /mnt/archive-pool/Media/Music:/media/music:ro
      - /mnt/archive-pool/Media/Study:/media/study:ro
      - /mnt/archive-pool/Media/TV:/media/tv:ro
      - /mnt/archive-pool/Media/YouTube:/media/youtube:ro
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:32400/identity"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=Plex
      - homepage.icon=plex.svg
      - homepage.href=https://plex.${DOMAINNAME}
      - homepage.description=Media Services
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=plex-frontend"
      ## HTTP Routers
      - "traefik.http.routers.plex-rtr.rule=Host(`plex.${DOMAINNAME}`)"
      ## Middlewares — no-auth because Plex has its own authentication;
      ## uses plex-specific chain with relaxed CSP (Plex web app needs plex.tv access)
      - "traefik.http.routers.plex-rtr.middlewares=chain-no-auth-plex@file"
      ## HTTP Services
      - "traefik.http.routers.plex-rtr.service=plex"
      - "traefik.http.services.plex.loadbalancer.server.scheme=https"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"
      - "traefik.http.services.plex.loadbalancer.serverstransport=insecure-skip-verify@file"

networks:
  plex-frontend:
    name: plex-frontend
    driver: bridge

volumes:
  plex-data:
    name: plex-data
