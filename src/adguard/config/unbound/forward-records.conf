# Unbound forward zone template — variables are substituted at container startup
# by the adguard-unbound-init service (see compose.yaml).

# Override logging defaults from unbound.conf (logfile: /dev/null, verbosity: 0).
# This block is included inside the server: clause, so later values win.
logfile: ""  # log to stderr → visible in docker logs
verbosity: 1
log-servfail: yes

private-domain: "${DOMAINNAME}"

# forward-zone:
#     # Forwarding Kubernetes domain queries to a Kubernetes domain server
#     name: "${DOMAINNAME}"
#     forward-addr: ${IP_K8S_DNS}

forward-zone:
    # Forwarding my DDNS domain queries to Quad9 servers
    name: "${DDNS_DOMAIN}"
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net

forward-zone:
    # Forwarding my V60 app domain queries to Quad9 servers
    name: "v60.${DOMAINNAME}"
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net

forward-zone:
    # Forward all queries (except those in cache and local zone) to
    # upstream recursive servers
    name: "."
    # Queries to this forward zone use TLS
    forward-tls-upstream: yes

    # https://dnsprivacy.org/wiki/display/DP/DNS+Privacy+Test+Servers

