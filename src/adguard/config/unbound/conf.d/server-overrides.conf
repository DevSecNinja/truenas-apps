# Server-section overrides — logging and private-domain settings.
# Variables are substituted at container startup by adguard-unbound-init.
# Loaded via include-toplevel: in unbound.conf — must start a clause.

server:
    # Override logging defaults from unbound.conf (logfile: /dev/null, verbosity: 0).
    # Later values win over the main config.
    logfile: ""  # log to stderr → visible in docker logs
    verbosity: 1
    log-servfail: yes

    private-domain: "${DOMAINNAME}"

    # CA bundle for verifying upstream DoT certificates.
    # The madnuttah image is distroless (no system certs); the host bundle is
    # bind-mounted read-only into the container.
    tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt
