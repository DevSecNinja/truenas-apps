---
name: Release Please

# Drives semver bumping AND release publishing via the central
# reusable workflow. On every push to main this opens (or updates)
# a `chore(main): release vX.Y.Z` PR with the next version's
# CHANGELOG bump (computed from Conventional Commits). Merging that
# PR creates the `vX.Y.Z` git tag *and* publishes the GitHub Release
# in a single run (`skip-github-release: false` in
# release-please-config.json).
#
# The release PR is opened by the DevSecNinja Release Please GitHub
# App (not GITHUB_TOKEN) so required CI checks fire on the PR — see
# DevSecNinja/.github docs/release-please-onboarding.md.
#
# Branch protection is fully respected: every release commit lands via
# PR through normal CI. No bypass actor required.
#
# Reusable workflow:
#   https://github.com/DevSecNinja/.github/blob/main/.github/workflows/release-please.yml

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/release-please.yml@af5030dd0d6f61b80fe58f949c9b985d1931ddf2 # v1.3.0
    permissions:
      contents: write
      pull-requests: write
    with:
      app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

  # --- Page on main-branch release-please failure (homelab IRM pager) ---
  # Fires when release-please failed — covers both the version-PR phase
  # and the post-merge tag/release-publish phase, since both run inside
  # the same reusable workflow now that `skip-github-release: false`.
  # Workflow_dispatch reruns also page so manual reruns are observable.
  notify-irm:
    name: Notify Grafana IRM
    needs:
      - release-please
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Harden runner
        # renovate: datasource=github-tags depName=DevSecNinja/.github
        uses: DevSecNinja/.github/actions/harden-runner@bf22fcfcb4ef94a359eed55cea4b5ce7f5b98167 # main

      - name: Notify Grafana IRM
        uses: DevSecNinja/.github/.github/actions/notify-irm@b2509636243e456253c938184dfe1855d6401e6d # main
        with:
          webhook-url: ${{ secrets.GRAFANA_IRM_WEBHOOK_URL }}
          # `needs.*.result` is system-controlled, safe to interpolate.
          job-failed: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
          resolve-on-success: "false"
