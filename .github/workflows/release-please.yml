---
name: Release Please

# Drives semver bumping via the central reusable workflow. On every push
# to main this opens (or updates) a `chore: release vX.Y.Z` PR with the
# next version's CHANGELOG bump (computed from Conventional Commits).
# Merging that PR creates the `vX.Y.Z` tag, which triggers
# `.github/workflows/release.yml` (the existing tag-triggered workflow
# that publishes the GitHub Release via the central reusable).
#
# The release PR is opened by the DevSecNinja Release Please GitHub
# App (not GITHUB_TOKEN) so required CI checks fire on the PR — see
# DevSecNinja/.github docs/release-please-onboarding.md.
#
# Branch protection is fully respected: every release commit lands via
# PR through normal CI. No bypass actor required.
#
# Reusable workflow:
#   https://github.com/DevSecNinja/.github/blob/main/.github/workflows/release-please.yml

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/release-please.yml@d5381d4da98c75b3c86c6b4699616d176090824f # v1.2.0
    permissions:
      contents: write
      pull-requests: write
    with:
      app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
