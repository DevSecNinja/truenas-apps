---
name: Config Sync

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  sync:
    uses: DevSecNinja/.github/.github/workflows/config-sync.yml@b9b199e6ef225c6e8da6ded4da2cf2c492f6d94e # main
    permissions:
      contents: write
      pull-requests: write

  dispatch-pr-ci:
    name: Dispatch PR CI
    needs: sync
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Dispatch Lint and Tests for config-sync PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |-
          head_ref=$(gh pr list \
            --state open \
            --label config-sync \
            --json headRefName \
            --jq '.[0].headRefName // ""')

          if [ -z "${head_ref}" ]; then
            echo "No open config-sync PR found; skipping CI dispatch."
            exit 0
          fi

          gh workflow run lint.yml --ref "${head_ref}"
          gh workflow run test.yml --ref "${head_ref}"
