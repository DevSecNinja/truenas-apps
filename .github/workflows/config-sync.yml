---
name: Config Sync

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  sync:
    uses: DevSecNinja/.github/.github/workflows/config-sync.yml@b9b199e6ef225c6e8da6ded4da2cf2c492f6d94e # main
    permissions:
      contents: write
      pull-requests: write

  dispatch-pr-ci:
    name: Dispatch PR CI
    needs: sync
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Dispatch Lint and Tests for config-sync PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |-
          set -euo pipefail

          mapfile -t head_refs < <(gh pr list \
            --state open \
            --label config-sync \
            --json headRefName \
            --jq '.[].headRefName')

          if [ "${#head_refs[@]}" -eq 0 ]; then
            echo "No open config-sync PR found; skipping CI dispatch."
            exit 0
          fi

          for head_ref in "${head_refs[@]}"; do
            for workflow in lint.yml test.yml; do
              gh workflow view "${workflow}" > /dev/null
              echo "Dispatching ${workflow} for ${head_ref}..."
              gh workflow run "${workflow}" --ref "${head_ref}"
            done
          done
