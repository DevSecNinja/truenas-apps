---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # --- Centralized reusable lint workflow from DevSecNinja/.github ---
  lint:
    uses: DevSecNinja/.github/.github/workflows/lint.yml@0c4551a1ebe5f5332511514e4d45a9bb4df2df09 # main
    permissions:
      contents: read
      security-events: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.4.15"
      lint-config-drift: false
      # Vendored upstream libraries (e.g. scripts/lib/log.sh from
      # DevSecNinja/dotfiles) are excluded from shell linting/formatting.
      lint-shellcheck-exclude: "scripts/lib/*"
      lint-shfmt-exclude: "scripts/lib/*"

  # --- Repo-specific jobs (not centralized) ---
  vendored-libs-in-sync:
    name: vendored libs in sync
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify scripts/lib/log.sh checksum
        run: cd scripts/lib && sha256sum -c log.sh.sha256

      - name: Re-run vendor refresher and check for drift
        run: |
          bash scripts/update-log-sh.sh
          if ! git diff --exit-code -- scripts/lib/; then
            echo "::error::scripts/lib/ is out of sync with the URL pinned in scripts/update-log-sh.sh"
            echo "Run 'bash scripts/update-log-sh.sh' locally and commit the result."
            exit 1
          fi

  docker-compose-config:
    name: docker compose config
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate compose files
        run: |
          find . \( -name 'compose.yaml' -o -name 'compose.yml' -o -name 'docker-compose.yaml' -o -name 'docker-compose.yml' \) -print0 |
            while IFS= read -r -d '' f; do
              echo "Validating ${f}..."
              docker compose -f "${f}" config --quiet
            done

  dotenv-linter:
    name: dotenv-linter
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          # renovate: datasource=github-releases depName=jdx/mise
          version: 2026.4.15

      - name: Run dotenv-linter
        # renovate: datasource=github-releases depName=dotenv-linter/dotenv-linter
        run: find . -path "*/shared/env/*.env" -not -name "*.sops.env" -print0 | xargs -0 mise exec aqua:dotenv-linter/dotenv-linter@4.0.0
          -- dotenv-linter check

  validate-servers:
    name: validate servers.yaml
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          # renovate: datasource=github-releases depName=jdx/mise
          version: 2026.4.15

      - name: Validate servers.yaml schema
        run: mise exec -- check-jsonschema --schemafile servers.schema.json servers.yaml

      - name: Validate app directories exist
        run: |-
          mise exec -- yq -r '.servers[].apps // [] | .[]' servers.yaml | sort -u | while IFS= read -r app; do
            if [ ! -d "services/${app}" ]; then
              echo "ERROR: App '${app}' in servers.yaml has no services/${app}/ directory"
              exit 1
            fi
            if [ ! -f "services/${app}/compose.yaml" ]; then
              echo "ERROR: App '${app}' in servers.yaml has no services/${app}/compose.yaml"
              exit 1
            fi
          done

  # --- Page on main-branch CI failure (Phase 3 of #15) ---
  #
  # Posts a JSON alert to a Grafana IRM webhook integration when any prior
  # job in this workflow fails on a push to main, OR posts a resolve when
  # all prior jobs succeed (so a green run automatically closes the open
  # incident from the previous failure). The step is silently skipped if
  # the GRAFANA_IRM_WEBHOOK_URL secret is unset, so the workflow remains
  # usable on forks and during initial repo bring-up.
  notify-irm:
    name: Notify Grafana IRM
    needs:
      - lint
      - vendored-libs-in-sync
      - docker-compose-config
      - dotenv-linter
      - validate-servers
    # Run on every completed push to main so we can fire either an
    # `alerting` (on failure) or an `ok` (on success) payload with the
    # same alert_uid. PR runs and pushes to other branches are skipped.
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: POST alert state to Grafana IRM webhook
        env:
          WEBHOOK_URL: ${{ secrets.GRAFANA_IRM_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          # Whether any required job ended in failure (or was cancelled).
          # `needs.*.result` is system-controlled, safe to interpolate.
          JOB_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |-
          set -euo pipefail
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "::warning::GRAFANA_IRM_WEBHOOK_URL secret not set — skipping IRM notification."
            exit 0
          fi
          run_url="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

          # Branch the payload by outcome.
          # alert_uid is intentionally NOT keyed on SHA: a successful run on a
          # later commit (different SHA) must resolve the open incident from
          # the previous failed commit. Re-runs of the same workflow on any
          # commit on `main` collapse into the same alert group.
          if [ "${JOB_FAILED}" = "true" ]; then
            state="alerting"
            severity="critical"
            title="CI failure on main: ${WORKFLOW_NAME}"
            msg="Workflow '${WORKFLOW_NAME}' failed on ${REF_NAME} @ ${SHA} (actor: ${ACTOR})."
          else
            state="ok"
            severity="info"
            title="CI back to green on main: ${WORKFLOW_NAME}"
            msg="Workflow '${WORKFLOW_NAME}' succeeded on ${REF_NAME} @ ${SHA} (actor: ${ACTOR}). Auto-resolving any open incident."
          fi
          echo "::notice::Posting state=${state} for ${WORKFLOW_NAME} on ${REF_NAME} @ ${SHA:0:7}"

          # Grafana IRM "Custom" webhook payload — fields map to the standard
          # alert grouping keys. The `labels` object is the homelab convention
          # for IRM routing/filtering — IRM surfaces it in the alert-group
          # "Assigned labels" pane. Both `service` and `service_name` are sent
          # because IRM uses `service_name` for SLOs/alerts/synthetic checks
          # but `service` for incident & dashboard tags; emitting both keeps
          # every consumer happy without an integration-side rename.
          payload=$(jq -n \
            --arg uid "gha-${REPOSITORY}-${WORKFLOW_NAME}-${REF_NAME}" \
            --arg title "${title}" \
            --arg state "${state}" \
            --arg severity "${severity}" \
            --arg link "${run_url}" \
            --arg msg "${msg}" \
            --arg service "ci" \
            --arg source "github-actions" \
            --arg repo "${REPOSITORY}" \
            --arg workflow "${WORKFLOW_NAME}" \
            --arg branch "${REF_NAME}" \
            --arg sha_short "${SHA:0:7}" \
            --arg actor "${ACTOR}" \
            '{
              alert_uid: $uid,
              title: $title,
              state: $state,
              severity: $severity,
              link_to_upstream_details: $link,
              message: $msg,
              labels: {
                service: $service,
                service_name: $service,
                source: $source,
                repo: $repo,
                workflow: $workflow,
                branch: $branch,
                sha: $sha_short,
                actor: $actor,
                severity: $severity
              }
            }')
          curl --silent --show-error --fail-with-body \
            --max-time 30 \
            --request POST \
            --header 'Content-Type: application/json' \
            --data "${payload}" \
            "${WEBHOOK_URL}"
