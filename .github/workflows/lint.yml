---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  yamlfmt:
    name: yamlfmt
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          # renovate: datasource=github-releases depName=jdx/mise
          version: 2026.3.10

      - name: Check YAML formatting
        run: find . -name '*.yaml' -o -name '*.yml' | xargs mise exec -- yamlfmt -lint

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          # renovate: datasource=github-releases depName=jdx/mise
          version: 2026.3.10

      - name: Run shellcheck
        run: find . -name '*.sh' | xargs mise exec -- shellcheck
