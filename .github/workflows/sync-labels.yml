---
name: Label Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/labels-base.yaml
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  label-sync:
    uses: DevSecNinja/.github/.github/workflows/label-sync.yml@195660c2cde322b4f9402a20be4b2dac2fef77e0 # main
    permissions:
      contents: read
      issues: write
    with:
      labels-file: .github/labels-base.yaml
