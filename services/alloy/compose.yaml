---
services:
  # Sets ownership on the ./data bind-mount directory so Alloy (UID 3125) can
  # write its WAL, queue, and component state to /var/lib/alloy/data at startup.
  # Runs once, then exits.
  alloy-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: alloy-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to chown ./data to 3125:3125
    read_only: true
    command:
      - "sh"
      - "-c"
      - chown -Rv 3125:3125 /data || true
    volumes:
      - ./data:/data

  alloy:
    # Docker Hardened Image (DHI) variant of grafana/alloy on Debian 13.
    # Pulled from the dhi.io registry — requires `docker login dhi.io` on
    # every host that pulls this image (free with a Docker Hub account
    # entitled to DHI).
    # See: https://hub.docker.com/hardened-images/catalog/dhi/alloy
    # renovate: datasource=docker depName=dhi.io/alloy
    image: dhi.io/alloy:1.16.0-debian13@sha256:9c6c88d62f878949bd33d88b1a7b959da84f7eea0806b91e47f956e37d7a3552
    container_name: alloy
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    depends_on:
      alloy-init:
        condition: service_completed_successfully
      alloy-docker-proxy:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      # Static `host` label injected into every metric/log line shipped to
      # Grafana Cloud. Defaults to svlnas (the TrueNAS host); overridden per
      # non-default host via compose.<server>.yaml (e.g. compose.svlazext.yaml).
      - HOSTNAME_OVERRIDE=svlnas
    user: "3125:3125" # svc-app-alloy
    # Supplementary group needed to read the host's systemd journal files
    # under /var/log/journal — they are mode 0640 root:systemd-journal, so a
    # UID outside that group can't read them. The numeric GID of the
    # `systemd-journal` group differs per host (run `getent group systemd-journal`):
    #   svlnas   = 102 (set here, the default host)
    #   svlazext = 999 (overridden in compose.svlazext.yaml)
    # Per-host overrides live in compose.<server>.yaml — same pattern as
    # HOSTNAME_OVERRIDE — because secret.sops.env decrypts to the same
    # plaintext on every host and so cannot carry per-host values.
    group_add:
      - "102"
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - alloy-frontend
      - alloy-backend
      # Postgres exporter sidecars sit on each app's *-backend network. Alloy
      # joins those networks to scrape the exporters' :9187 endpoint. These
      # apps run on svlnas only — compose.svlazext.yaml drops both networks
      # via `networks: !override`.
      - immich-backend
      - outline-backend
    mem_limit: ${MEM_LIMIT:-512m}
    pids_limit: 200
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Config (git-tracked, read-only) — never chown'd by the init container
      - ./config:/etc/alloy:ro
      # Alloy state (WAL, queue, remotecfg cache) — mounted at the parent so
      # Alloy can mkdir its own subdirectories (data/, remotecfg/) at startup.
      # `read_only: true` makes the rest of /var/lib/alloy in the image read-only,
      # so Alloy must own a writable parent for any path it tries to create.
      - ./data:/var/lib/alloy
      # Host filesystem mounts for prometheus.exporter.unix (host metrics)
      - /:/host/rootfs:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # Host systemd journal — read-only, consumed by loki.source.journal so
      # `dccd.sh` deploy logs (logger tag `dccd`) and other host-level signals
      # (sshd, smartd, kernel OOM, zfs) are searchable in Loki. Both paths are
      # mounted because persistent storage may be at /var/log/journal and
      # runtime-only at /run/log/journal — sd-journal reads whichever exists.
      # /etc/machine-id is required by the journal reader to resolve the
      # current boot.
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    healthcheck:
      # The DHI alloy image is binary-only — no shell, no probe utilities.
      # Liveness is monitored externally instead:
      #   - Gatus probes https://alloy.${DOMAINNAME}/-/ready every 60s
      #   - Traefik logs every request
      #   - Alloy self-metrics (alloy_*) cover internal health
      # `dccd.sh` (compose_up_wait_tolerant) treats "no healthcheck" as
      # successful once the container reaches "running", which is sufficient
      # because Alloy refuses to bind :12345 unless config parsed.
      disable: true
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Alloy
      - homepage.icon=alloy.svg
      - homepage.href=https://alloy.${DOMAINNAME}
      - homepage.description=Telemetry collector (metrics, logs)
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=alloy-frontend"
      ## HTTP Routers
      - "traefik.http.routers.alloy-rtr.rule=Host(`alloy.${DOMAINNAME}`)"
      - "traefik.http.routers.alloy-rtr.entrypoints=https"
      ## Middlewares
      - "traefik.http.routers.alloy-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.alloy-rtr.service=alloy-svc"
      - "traefik.http.services.alloy-svc.loadbalancer.server.port=12345"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.alloy-monitor.rule=Host(`alloy.${DOMAINNAME}`)"
      - "traefik.http.routers.alloy-monitor.entrypoints=monitoring"
      - "traefik.http.routers.alloy-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.alloy-monitor.service=alloy-svc"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444/-/ready"
      - "gatus.headers.Host=alloy.${DOMAINNAME}"
      - "gatus.conditions=[\"[STATUS] == 200\", \"[RESPONSE_TIME] < 1000\"]"
      - "gatus.alerts=[{\"type\": \"email\"}, {\"type\": \"custom\"}]"

  # LinuxServer socket-proxy runs as root by design (requires Docker socket access).
  # See: https://github.com/linuxserver/docker-socket-proxy
  # cap_drop: ALL is therefore omitted.
  alloy-docker-proxy:
    image: lscr.io/linuxserver/socket-proxy:version-3.2.14-r0@sha256:56dde3144ef213d2df1ee3d600baad521bd8b8c2bf844672719b07363606f4c2
    container_name: alloy-docker-proxy
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - alloy-backend
    env_file:
      - path: ../shared/env/tz.env
    environment:
      - CONTAINERS=1 # Required: discover containers for log/stats collection
      - EVENTS=1 # Required: react to container start/stop events
      - INFO=1 # Required: read Docker engine info for daemon-level metrics
      - NETWORKS=1 # Required: discovery.docker queries /networks to compute network labels
      - PING=1 # Required: socket-proxy healthcheck endpoint
      - VERSION=1 # Required: Docker API version negotiation
      - POST=0 # Disallow any POST operations (effectively read-only)
    security_opt:
      - no-new-privileges=true
    mem_limit: ${SOCKET_PROXY_MEM_LIMIT:-50m}
    pids_limit: 50
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://127.0.0.1:2375/_ping"
      interval: 5s
      timeout: 5s
      retries: 3

networks:
  alloy-frontend:
    name: alloy-frontend
    driver: bridge
    # Pinned subnet so Traefik's metrics-ipallowlist middleware (in
    # config/rules/middlewares.yml) can restrict :8082 (Prometheus metrics
    # entrypoint) to Alloy. Mirrors the gatus-frontend pattern.
    ipam:
      config:
        - subnet: 172.30.100.8/29
  alloy-backend:
    name: alloy-backend
    driver: bridge
    internal: true
  immich-backend:
    name: immich-backend
    external: true
  outline-backend:
    name: outline-backend
    external: true
