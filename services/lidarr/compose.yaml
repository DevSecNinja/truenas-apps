---
services:
  # s6-overlay exception — see ARCHITECTURE.md for the full rationale.
  # LinuxServer Lidarr starts as root and uses s6-overlay to drop to PUID:PGID.
  # read_only: true is omitted (s6-overlay writes to the root fs at startup).
  # user: is omitted (s6-overlay requires root to chown /config to PUID:PGID).
  # cap_drop: ALL still applied; CHOWN/SETUID/SETGID/SETPCAP re-added for s6-overlay.
  #
  # Network design: arr-egress is listed FIRST so Docker sets it as eth0 and uses
  # EGRESS_GATEWAY as the default route — all internet traffic exits through egress network.
  # lidarr-frontend (bridge) is listed SECOND; Docker adds only a specific route for
  # the 172.x.x.x bridge subnet so Traefik can reach Lidarr without overriding the
  # egress network default route. Traefik is NOT joined to arr-egress (macvlan) to avoid
  # assigning Traefik an unnecessary egress network IP.
  lidarr:
    image: lscr.io/linuxserver/lidarr:version-3.1.0.4875@sha256:dbffcf91da47d48e09e613857032c95a62755b928a71a7718688e3ab03fbbd26
    container_name: lidarr
    hostname: lidarr
    env_file:
      - path: .env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=3112 # svc-app-lidarr
      - PGID=3200 # media group — shared with Plex, MeTube, and other arr apps
      - UMASK=002 # group-writable files for media group (664 files, 775 dirs)
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      arr-egress: # FIRST — becomes default route; all internet traffic via egress network
        ipv4_address: ${EGRESS_IP}
        mac_address: ${EGRESS_MAC}
      lidarr-frontend: # SECOND — bridge for Traefik; specific route only, no default GW change
      arr-stack-backend: # Internal bridge for arr app inter-communication
    mem_limit: ${MEM_LIMIT:-2048m}
    pids_limit: 200
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # s6-overlay chowns /config to PUID:PGID at startup
      - SETUID # s6-overlay drops from root to PUID
      - SETGID # s6-overlay drops from root to PGID
      - SETPCAP # s6-overlay clears bounding capabilities before exec-ing Lidarr
    tmpfs:
      - /run:exec # s6-overlay places executables in /run during init
      - /tmp
    volumes:
      - ./data/config:/config
      - /mnt/archive-pool/content:/data # downloads/ and media/ on same filesystem for hardlinks
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:8686/ping"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=Lidarr
      - homepage.icon=lidarr.svg
      - homepage.href=https://lidarr.$DOMAINNAME
      - homepage.description=Music Collection Manager
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=lidarr-frontend"
      ## HTTP Routers
      - "traefik.http.routers.lidarr-rtr.rule=Host(`lidarr.${DOMAINNAME}`)"
      - "traefik.http.routers.lidarr-rtr.entrypoints=https"
      ## Middlewares
      - "traefik.http.routers.lidarr-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.lidarr-rtr.service=lidarr"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.lidarr-monitor.rule=Host(`lidarr.${DOMAINNAME}`)"
      - "traefik.http.routers.lidarr-monitor.entrypoints=monitoring"
      - "traefik.http.routers.lidarr-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.lidarr-monitor.service=lidarr"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444"
      - "gatus.headers.Host=lidarr.${DOMAINNAME}"
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  arr-egress:
    name: arr-egress
    external: true
  lidarr-frontend:
    name: lidarr-frontend
    driver: bridge
    internal: true # Blocks internet egress via the Traefik bridge — all outbound traffic must use arr-egress
  arr-stack-backend:
    name: arr-stack-backend
    external: true
