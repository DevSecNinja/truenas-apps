---
services:
  # s6-overlay exception — see ARCHITECTURE.md for the full rationale.
  # LinuxServer Radarr starts as root and uses s6-overlay to drop to PUID:PGID.
  # read_only: true is omitted (s6-overlay writes to the root fs at startup).
  # user: is omitted (s6-overlay requires root to chown /config to PUID:PGID).
  # cap_drop: ALL still applied; CHOWN/SETUID/SETGID/SETPCAP re-added for s6-overlay.
  #
  # Network design: arr-egress is listed FIRST so Docker sets it as eth0 and uses
  # EGRESS_GATEWAY as the default route — all internet traffic exits through egress network.
  # radarr-frontend (bridge) is listed SECOND; Docker adds only a specific route for
  # the 172.x.x.x bridge subnet so Traefik can reach Radarr without overriding the
  # egress network default route. Traefik is NOT joined to arr-egress (macvlan) to avoid
  # assigning Traefik an unnecessary egress network IP.
  radarr:
    image: lscr.io/linuxserver/radarr:version-6.0.4.10291@sha256:c8a55bd83672d3b63dc20edf325277ce7dc3b69d4400568cc5bbc9e6a227ebf4
    container_name: radarr
    hostname: radarr # Identifies the container on egress network; visible in ARP/mDNS and UniFi client list
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=3110 # svc-app-radarr
      - PGID=3200 # media group — shared with Plex, MeTube, and other arr apps
      - UMASK=002 # group-writable files for media group (664 files, 775 dirs)
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      arr-egress: # FIRST — becomes default route; all internet traffic via egress network
        ipv4_address: ${EGRESS_IP}
        mac_address: ${EGRESS_MAC} # Stable MAC so UniFi always shows the same device entry; set a DHCP reservation on this MAC
      arr-stack-backend: # Internal bridge for arr-to-arr communication
      radarr-frontend: # SECOND — bridge for Traefik; specific route only, no default GW change
    mem_limit: ${MEM_LIMIT:-2048m}
    pids_limit: 200
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # s6-overlay chowns /config to PUID:PGID at startup
      - SETUID # s6-overlay drops from root to PUID
      - SETGID # s6-overlay drops from root to PGID
      - SETPCAP # s6-overlay clears bounding capabilities before exec-ing Radarr
    tmpfs:
      - /run:exec # s6-overlay places executables in /run during init
      - /tmp
    volumes:
      - ./data/config:/config
      - /mnt/archive-pool/content:/data # downloads/ and media/ on same filesystem for hardlinks
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:7878/ping"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=Radarr
      - homepage.icon=radarr.svg
      - homepage.href=https://radarr.$DOMAINNAME
      - homepage.description=Movie Collection Manager
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=radarr-frontend"
      ## HTTP Routers
      - "traefik.http.routers.radarr-rtr.rule=Host(`radarr.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.radarr-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services
      - "traefik.http.routers.radarr-rtr.service=radarr"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      ## Monitoring (Gatus — internal entrypoint only)
      - "traefik.http.routers.radarr-monitor.rule=Host(`radarr.${DOMAINNAME}`)"
      - "traefik.http.routers.radarr-monitor.entrypoints=monitoring"
      - "traefik.http.routers.radarr-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.radarr-monitor.service=radarr"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444/ping"
      - "gatus.headers.Host=radarr.${DOMAINNAME}"
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  arr-egress:
    external: true
  arr-stack-backend:
    external: true
  radarr-frontend:
    name: radarr-frontend
    driver: bridge
    internal: true # Blocks internet egress via the Traefik bridge — all outbound traffic must use arr-egress
