---
services:
  # Init container: validates VLAN 70 macvlan egress before deploying Radarr.
  # Resolves DDNS_DOMAIN (the home public IP) and compares it against the
  # container's external IP via api4.ipify.org. Exits non-zero — blocking any
  # dependent service — if the IPs match, meaning the container is egressing
  # through the home connection instead of VLAN 70.
  radarr-init:
    image: docker.io/library/alpine:3.21@sha256:c3f8e73fdb79deaebaa2037150150191b9dcbfba68b4a46d70103204c53f4709
    container_name: radarr-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    restart: "no"
    command:
      - sh
      - -c
      - |-
        echo "=== VLAN 70 egress check ==="

        EXTERNAL_IP="$(wget -qO- https://api4.ipify.org)"
        echo "External IP (container egress) : $${EXTERNAL_IP}"

        # nslookup last Address: line is the answer; strip any trailing :port suffix
        DDNS_IP="$(nslookup "${DDNS_DOMAIN}" | awk '/^Address:/{a=$2} END{print a}' | sed 's/:[0-9]*$//')"
        echo "DDNS domain                    : ${DDNS_DOMAIN}"
        echo "DDNS IP (home)                 : $${DDNS_IP}"

        if [ -z "$${EXTERNAL_IP}" ]; then
          echo "ERROR: Could not determine external IP via api4.ipify.org"
          exit 1
        fi
        if [ -z "$${DDNS_IP}" ]; then
          echo "ERROR: Could not resolve DDNS_DOMAIN=${DDNS_DOMAIN}"
          exit 1
        fi
        if [ "$${EXTERNAL_IP}" = "$${DDNS_IP}" ]; then
          echo "FAIL: Egress IP matches home IP — container is NOT on VLAN 70, aborting!"
          exit 1
        fi
        echo "OK: Egress IP ($${EXTERNAL_IP}) != home IP ($${DDNS_IP}) — VLAN 70 confirmed"
    networks:
      - radarr-frontend
    mem_limit: 64m
    pids_limit: 10
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true

networks:
  radarr-frontend:
    name: radarr-frontend
    driver: macvlan
    driver_opts:
      parent: ${VLAN70_PARENT_INTERFACE}
    ipam:
      driver: dhcp
