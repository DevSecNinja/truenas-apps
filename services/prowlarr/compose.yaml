---
services:
  # Init: validates egress network macvlan egress before deploying Prowlarr.
  # Resolves DDNS_DOMAIN (home public IP) and compares against the container's
  # api4.ipify.org egress IP. Exits non-zero — blocking prowlarr — if the IPs match,
  # meaning the container is egressing through the home connection, not egress network.
  prowlarr-init:
    image: docker.io/library/alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
    container_name: prowlarr-init
    env_file:
      - path: .env
        required: false
      - path: ../shared/env/tz.env
    restart: "no"
    command:
      - sh
      - -c
      - |-
        echo "=== egress network egress check ==="

        EXTERNAL_IP="$(wget -qO- https://api4.ipify.org)"
        echo "External IP (container egress) : $${EXTERNAL_IP}"

        DDNS_IP="$(nslookup "${DDNS_DOMAIN}" | awk '/^Address:/{a=$2} END{print a}' | sed 's/:[0-9]*$//')"
        echo "DDNS domain                    : ${DDNS_DOMAIN}"
        echo "DDNS IP (home)                 : $${DDNS_IP}"

        if [ -z "$${EXTERNAL_IP}" ]; then
          echo "ERROR: Could not determine external IP via api4.ipify.org"
          exit 1
        fi
        if [ -z "$${DDNS_IP}" ]; then
          echo "ERROR: Could not resolve DDNS_DOMAIN=${DDNS_DOMAIN}"
          exit 1
        fi
        if [ "$${EXTERNAL_IP}" = "$${DDNS_IP}" ]; then
          echo "FAIL: Egress IP matches home IP — container is NOT on egress network, aborting!"
          exit 1
        fi
        echo "OK: Egress IP ($${EXTERNAL_IP}) != home IP ($${DDNS_IP}) — egress network confirmed"
    networks:
      prowlarr-egress:
        ipv4_address: ${EGRESS_INIT_IP}
        mac_address: ${EGRESS_INIT_MAC}
    mem_limit: 64m
    pids_limit: 10
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true

  # s6-overlay exception — see ARCHITECTURE.md for the full rationale.
  # LinuxServer Prowlarr starts as root and uses s6-overlay to drop to PUID:PGID.
  # read_only: true is omitted (s6-overlay writes to the root fs at startup).
  # user: is omitted (s6-overlay requires root to chown /config to PUID:PGID).
  # cap_drop: ALL still applied; CHOWN/SETUID/SETGID/SETPCAP re-added for s6-overlay.
  #
  # Network design: prowlarr-egress is listed FIRST so Docker sets it as eth0 and uses
  # EGRESS_GATEWAY as the default route — all internet traffic exits through egress network.
  # prowlarr-frontend (bridge) is listed SECOND; Docker adds only a specific route for
  # the 172.x.x.x bridge subnet so Traefik can reach Prowlarr without overriding the
  # egress network default route. Traefik is NOT joined to prowlarr-egress (macvlan) to avoid
  # assigning Traefik an unnecessary egress network IP.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:version-2.3.5.5327@sha256:35f48abb3e976fcf077fae756866c582e4a90f8b24810ae4067b3558f7cdbbdf
    container_name: prowlarr
    hostname: prowlarr
    depends_on:
      prowlarr-init:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=3113 # svc-app-prowlarr
      - PGID=3113 # own group — Prowlarr is an indexer manager, no media file access needed
      - UMASK=002
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      prowlarr-egress: # FIRST — becomes default route; all internet traffic via egress network
        ipv4_address: ${EGRESS_IP}
        mac_address: ${EGRESS_MAC}
      prowlarr-frontend: # SECOND — bridge for Traefik; specific route only, no default GW change
      arr-stack-backend: # Internal bridge for arr app inter-communication
    mem_limit: ${MEM_LIMIT:-2048m}
    pids_limit: 200
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # s6-overlay chowns /config to PUID:PGID at startup
      - SETUID # s6-overlay drops from root to PUID
      - SETGID # s6-overlay drops from root to PGID
      - SETPCAP # s6-overlay clears bounding capabilities before exec-ing Prowlarr
    tmpfs:
      - /run:exec # s6-overlay places executables in /run during init
      - /tmp
    volumes:
      - ./data/config:/config
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:9696/ping"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=Prowlarr
      - homepage.icon=prowlarr.svg
      - homepage.href=https://prowlarr.$DOMAINNAME
      - homepage.description=Indexer Manager
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=prowlarr-frontend"
      ## HTTP Routers
      - "traefik.http.routers.prowlarr-rtr.rule=Host(`prowlarr.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.prowlarr-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.prowlarr-rtr.service=prowlarr"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

networks:
  prowlarr-egress:
    name: prowlarr-egress
    driver: macvlan
    driver_opts:
      parent: ${EGRESS_PARENT_INTERFACE}
    ipam:
      driver: default
      config:
        - subnet: ${EGRESS_SUBNET}
          gateway: ${EGRESS_GATEWAY}
  prowlarr-frontend:
    name: prowlarr-frontend
    driver: bridge
    internal: true # Blocks internet egress via the Traefik bridge — all outbound traffic must use prowlarr-egress
  arr-stack-backend:
    name: arr-stack-backend
    driver: bridge
    internal: true # No internet access — arr apps egress via their own dedicated macvlan networks
