---
services:
  # s6-overlay exception — see ARCHITECTURE.md for the full rationale.
  # LinuxServer Prowlarr starts as root and uses s6-overlay to drop to PUID:PGID.
  # read_only: true is omitted (s6-overlay writes to the root fs at startup).
  # user: is omitted (s6-overlay requires root to chown /config to PUID:PGID).
  # cap_drop: ALL still applied; CHOWN/SETUID/SETGID/SETPCAP re-added for s6-overlay.
  #
  # Network design: arr-egress is listed FIRST so Docker sets it as eth0 and uses
  # EGRESS_GATEWAY as the default route — all internet traffic exits through egress network.
  # prowlarr-frontend (bridge) is listed SECOND; Docker adds only a specific route for
  # the 172.x.x.x bridge subnet so Traefik can reach Prowlarr without overriding the
  # egress network default route. Traefik is NOT joined to arr-egress (macvlan) to avoid
  # assigning Traefik an unnecessary egress network IP.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:version-2.3.5.5327@sha256:35f48abb3e976fcf077fae756866c582e4a90f8b24810ae4067b3558f7cdbbdf
    container_name: prowlarr
    hostname: prowlarr
    env_file:
      - path: .env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=3113 # svc-app-prowlarr
      - PGID=3113 # own group — Prowlarr is an indexer manager, no media file access needed
      - UMASK=002
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      arr-egress: # FIRST — becomes default route; all internet traffic via egress network
        ipv4_address: ${EGRESS_IP}
        mac_address: ${EGRESS_MAC}
      prowlarr-frontend: # SECOND — bridge for Traefik; specific route only, no default GW change
      arr-stack-backend: # Internal bridge for arr app inter-communication
    mem_limit: ${MEM_LIMIT:-2048m}
    pids_limit: 200
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # s6-overlay chowns /config to PUID:PGID at startup
      - SETUID # s6-overlay drops from root to PUID
      - SETGID # s6-overlay drops from root to PGID
      - SETPCAP # s6-overlay clears bounding capabilities before exec-ing Prowlarr
    tmpfs:
      - /run:exec # s6-overlay places executables in /run during init
      - /tmp
    volumes:
      - ./data/config:/config
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://127.0.0.1:9696/ping"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=Prowlarr
      - homepage.icon=prowlarr.svg
      - homepage.href=https://prowlarr.$DOMAINNAME
      - homepage.description=Indexer Manager
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=prowlarr-frontend"
      ## HTTP Routers
      - "traefik.http.routers.prowlarr-rtr.rule=Host(`prowlarr.${DOMAINNAME}`)"
      - "traefik.http.routers.prowlarr-rtr.entrypoints=https"
      ## Middlewares
      - "traefik.http.routers.prowlarr-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.prowlarr-rtr.service=prowlarr"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.prowlarr-monitor.rule=Host(`prowlarr.${DOMAINNAME}`)"
      - "traefik.http.routers.prowlarr-monitor.entrypoints=monitoring"
      - "traefik.http.routers.prowlarr-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.prowlarr-monitor.service=prowlarr"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444/ping"
      - "gatus.headers.Host=prowlarr.${DOMAINNAME}"
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  arr-egress:
    name: arr-egress
    external: true
  prowlarr-frontend:
    name: prowlarr-frontend
    driver: bridge
    internal: true # Blocks internet egress via the Traefik bridge — all outbound traffic must use arr-egress
  arr-stack-backend:
    name: arr-stack-backend
    external: true
