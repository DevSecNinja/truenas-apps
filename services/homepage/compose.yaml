---
services:
  # NOTE: No init container needed — ./config is git-tracked and must NOT be
  # chowned (doing so breaks git pull). Homepage only reads its config YAML
  # files, which are world-readable from the git checkout (644).

  homepage:
    image: ghcr.io/gethomepage/homepage:v1.12.3@sha256:cc84f2f5eb3c7734353701ccbaa24ed02dacb0d119114e50e4251e2005f3990a
    container_name: homepage
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    depends_on:
      homepage-docker-proxy:
        condition: service_healthy
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=apps.${DOMAINNAME}
    user: "3102:3102" # svc-app-homepage
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - homepage-frontend
      - homepage-backend
    mem_limit: ${MEM_LIMIT:-300m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    # Note: Next.js emits a harmless EROFS warning trying to write a prerender cache
    # to /app/.next/server/pages/. Adding that path as tmpfs breaks startup because
    # it shadows the pre-built JS files (e.g. _document.js) that live there.
    # The warning is non-fatal — the app works fine without the cache write.
    tmpfs:
      - /tmp
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:3000"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=homepage-frontend"
      ## HTTP Routers
      - "traefik.http.routers.homepage-rtr.rule=Host(`apps.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.homepage-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services
      - "traefik.http.routers.homepage-rtr.service=homepage"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      ## Gatus
      - "gatus.url=https://traefik"
      - "gatus.headers.Host=apps.${DOMAINNAME}"
      - 'gatus.conditions=["[STATUS] == 200", "[CERTIFICATE_EXPIRATION] > 48h", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

  # LinuxServer socket-proxy runs as root by design (requires Docker socket access).
  # It does not support custom users, mods, or scripts.
  # See: https://github.com/linuxserver/docker-socket-proxy
  # cap_drop: ALL is therefore omitted.
  homepage-docker-proxy:
    image: lscr.io/linuxserver/socket-proxy:version-3.2.14-r0@sha256:56dde3144ef213d2df1ee3d600baad521bd8b8c2bf844672719b07363606f4c2
    container_name: homepage-docker-proxy
    env_file:
      - path: ../shared/env/tz.env
    environment:
      - CONTAINERS=1 # Allow access to viewing containers
      - POST=0 # Disallow any POST operations (effectively read-only)
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - homepage-backend
    mem_limit: ${PROXY_MEM_LIMIT:-50m}
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:2375/_ping"
      interval: 5s
      timeout: 5s
      retries: 3

networks:
  homepage-frontend:
    name: homepage-frontend
    driver: bridge
  homepage-backend:
    name: homepage-backend
    driver: bridge
    internal: true
