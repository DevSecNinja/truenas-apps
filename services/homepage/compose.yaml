---
services:
  # Sets ownership on ./config so the non-root homepage container can write to it.
  # Runs once, then exits.
  # Required because homepage's entrypoint only chowns when starting as root, so by
  # pre-chowning here we can start homepage directly as 3102:3102 without root.
  # Config files are set to group-write (775/664) so truenas_admin (member of
  # group 3102) can git-pull without permission conflicts.
  homepage-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: homepage-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to change file ownership
      - DAC_OVERRIDE # Required to traverse /config if it was previously chowned
      - FOWNER # Required to chmod files/dirs not owned by root
    read_only: true
    command:
      - "sh"
      - "-c"
      - |-
        chown -Rv 3102:3102 /config &&
        find /config -type d -exec chmod 775 {} + &&
        find /config -type f -exec chmod 664 {} +
    volumes:
      - ./config:/config

  homepage:
    image: ghcr.io/gethomepage/homepage:v1.12.3@sha256:cc84f2f5eb3c7734353701ccbaa24ed02dacb0d119114e50e4251e2005f3990a
    container_name: homepage
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    depends_on:
      homepage-init:
        condition: service_completed_successfully
      homepage-docker-proxy:
        condition: service_healthy
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=apps.${DOMAINNAME}
    user: "3102:3102" # svc-app-homepage
    restart: always
    networks:
      - homepage-frontend
      - homepage-backend
    mem_limit: ${MEM_LIMIT:-300m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    # Note: Next.js emits a harmless EROFS warning trying to write a prerender cache
    # to /app/.next/server/pages/. Adding that path as tmpfs breaks startup because
    # it shadows the pre-built JS files (e.g. _document.js) that live there.
    # The warning is non-fatal — the app works fine without the cache write.
    tmpfs:
      - /tmp
    volumes:
      - ./config:/app/config
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:3000"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=homepage-frontend"
      ## HTTP Routers
      - "traefik.http.routers.homepage-rtr.rule=Host(`apps.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.homepage-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services
      - "traefik.http.routers.homepage-rtr.service=homepage"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

  # LinuxServer socket-proxy runs as root by design (requires Docker socket access).
  # It does not support custom users, mods, or scripts.
  # See: https://github.com/linuxserver/docker-socket-proxy
  # cap_drop: ALL is therefore omitted.
  homepage-docker-proxy:
    image: lscr.io/linuxserver/socket-proxy:version-3.2.14-r0@sha256:56dde3144ef213d2df1ee3d600baad521bd8b8c2bf844672719b07363606f4c2
    container_name: homepage-docker-proxy
    env_file:
      - path: ../shared/env/tz.env
    environment:
      - CONTAINERS=1 # Allow access to viewing containers
      - POST=0 # Disallow any POST operations (effectively read-only)
    restart: always
    networks:
      - homepage-backend
    mem_limit: ${PROXY_MEM_LIMIT:-50m}
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:2375/_ping"
      interval: 5s
      timeout: 5s
      retries: 3

networks:
  homepage-frontend:
    name: homepage-frontend
    driver: bridge
  homepage-backend:
    name: homepage-backend
    driver: bridge
    internal: true
