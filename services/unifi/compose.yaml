---
services:
  # NOTE: MongoDB doesn't support automatic major-version upgrades.
  # Before upgrading to a new major version, run (change MONGO_VERSION to CURRENT version):
  #   export MONGO_VERSION=8.2
  #   docker compose exec unifi-db mongosh --eval 'db.adminCommand({ setFeatureCompatibilityVersion: "'$MONGO_VERSION'" })'
  # MongoDB starts as root and uses gosu to switch to the mongodb user during
  # startup. cap_drop: ALL would break that privilege transition.
  unifi-db:
    image: docker.io/library/mongo:8.2.6@sha256:eea8506335198f8b359865b32004036310854a935fbd317083817c614152818f
    container_name: unifi-db
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${UNIFI_MONGO_ROOT_PASS}
      - MONGO_USER=unifi
      - MONGO_PASS=${UNIFI_MONGO_PASS}
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - unifi-backend
    mem_limit: ${DB_MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    read_only: true
    tmpfs:
      - /tmp
      - /data/configdb
    volumes:
      - ./data/db:/data/db
      - ./config/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    healthcheck:
      test:
        - "CMD"
        - "mongosh"
        - "--quiet"
        - "--eval"
        - "db.adminCommand('ping')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # tiredofit/db-backup uses s6-overlay which must start as root.
  # It handles user switching internally via USER_DBBACKUP/GROUP_DBBACKUP.
  # read_only is also not set because s6-overlay needs extensive writable paths.
  # cap_drop: ALL is therefore omitted.
  # MODE=MANUAL + MANUAL_RUN_FOREVER=FALSE makes the container run one backup
  # and exit cleanly. The nightly CD script (dccd.sh) starts it fresh each run.
  unifi-db-backup:
    image: docker.io/tiredofit/db-backup:4.1.100@sha256:78e3cb669ee9648c1a4ab7e8421c6e89d01b659bfa5963f7611a2347b2009eab
    container_name: unifi-db-backup
    depends_on:
      unifi-db:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    command:
      - "backup-now"
    environment:
      - USER_DBBACKUP=3108
      - GROUP_DBBACKUP=3108
      - CONTAINER_NAME=unifi-db-backup
      - CONTAINER_ENABLE_MONITORING=FALSE
      - CONTAINER_ENABLE_SCHEDULING=FALSE
      # Run once and exit — restarted nightly by dccd.sh
      - MODE=MANUAL
      - MANUAL_RUN_FOREVER=FALSE
      # Notification settings
      - ENABLE_NOTIFICATIONS=TRUE
      - NOTIFICATION_TYPE=EMAIL
      - SMTP_HOST=${NOTIFICATIONS_EMAIL_HOST}
      - SMTP_DOMAIN=${NOTIFICATIONS_EMAIL_DOMAIN}
      - SMTP_PORT=${NOTIFICATIONS_EMAIL_PORT}
      - SMTP_USER=${NOTIFICATIONS_EMAIL_USERNAME}
      - SMTP_PASS=${NOTIFICATIONS_EMAIL_PASSWORD}
      - MAIL_TO=${NOTIFICATIONS_EMAIL_TO}
      - MAIL_FROM=${NOTIFICATIONS_EMAIL_FROM}
      - SMTP_AUTHENTICATION=on
      - SMTP_TLSCERTCHECK=TRUE
      - SMTP_STARTTLS=on
      - SMTP_TLS=on
      # Backup defaults
      - DEFAULT_CHECKSUM=SHA1
      - DEFAULT_COMPRESSION=ZSTD
      - DEFAULT_CLEANUP_TIME=2880
      # Encryption
      - DEFAULT_ENCRYPT=TRUE
      - DEFAULT_ENCRYPT_PASSPHRASE=${DB_ENC_PASSPHRASE}
      # Database
      - DB01_TYPE=mongo
      - DB01_HOST=unifi-db
      - DB01_NAME=unifi
      - DB01_USER=unifi
      - DB01_PORT=27017
      - DB01_PASS=${UNIFI_MONGO_PASS}
      - DB01_AUTH=admin
    restart: "no"
    networks:
      - unifi-backend
    mem_limit: ${BACKUP_MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    volumes:
      - ./backups/db-backup:/backup

  # LinuxServer's unifi-network-application uses s6-overlay which must start as root.
  # It handles user switching internally via PUID/PGID environment variables.
  # read_only is not set because s6-overlay and the Java-based Unifi application
  # need extensive writable paths beyond what can be covered by tmpfs mounts.
  # cap_drop: ALL is therefore omitted.
  unifi:
    image: lscr.io/linuxserver/unifi-network-application:version-10.1.89@sha256:521f2dad190e259259c4c82bcc87c6440ec9ed3020f2141a9eaaaab881418744
    container_name: unifi
    depends_on:
      unifi-db:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=3108 # svc-app-unifi
      - PGID=3108 # svc-app-unifi
      - MONGO_USER=unifi
      - MONGO_PASS=${UNIFI_MONGO_PASS}
      - MONGO_HOST=unifi-db
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
      - MEM_LIMIT=1024
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - unifi-frontend
      - unifi-backend
    mem_limit: ${MEM_LIMIT:-2048m}
    # UniFi's JVM spawns 150+ threads at runtime; 100 is too low and causes
    # pthread_create EAGAIN ("unable to create native thread") under load.
    pids_limit: 300
    security_opt:
      - no-new-privileges=true
    volumes:
      - ./data/config:/config
      - ./backups/autobackup:/config/data/backup
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fkL"
        - "https://localhost:8443"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    ports:
      - 3478:3478/udp # STUN
      - 10001:10001/udp # Device discovery
      - 8080:8080/tcp # Device ↔ controller communication
      - 6789:6789/tcp # Mobile speed test
      - 2221:22/tcp # SSH
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Unifi
      - homepage.icon=unifi.svg
      - homepage.href=https://unifi.${DOMAINNAME}
      - homepage.description=Ubiquiti Network Controller
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=unifi-frontend"
      ## HTTP Routers
      - "traefik.http.routers.unifi-rtr.rule=Host(`unifi.${DOMAINNAME}`)"
      ## Middlewares — no-auth because Unifi has its own authentication
      - "traefik.http.routers.unifi-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services — Unifi serves HTTPS on 8443 internally
      - "traefik.http.routers.unifi-rtr.service=unifi"
      - "traefik.http.services.unifi.loadbalancer.server.scheme=https"
      - "traefik.http.services.unifi.loadbalancer.server.port=8443"
      - "traefik.http.services.unifi.loadbalancer.serverstransport=insecure-skip-verify@file"
      ## Guest Portal — no authentication so WiFi guests can access the captive portal
      - "traefik.http.routers.unifi-guest-rtr.rule=Host(`unifi-guest.${DOMAINNAME}`)"
      - "traefik.http.routers.unifi-guest-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.unifi-guest-rtr.service=unifi-guest"
      - "traefik.http.services.unifi-guest.loadbalancer.server.scheme=https"
      - "traefik.http.services.unifi-guest.loadbalancer.server.port=8843"
      - "traefik.http.services.unifi-guest.loadbalancer.serverstransport=insecure-skip-verify@file"
      ## Gatus
      - "gatus.url=https://172.30.100.6"
      - "gatus.headers.Host=unifi.${DOMAINNAME}"
      - 'gatus.conditions=["[STATUS] == 200", "[CERTIFICATE_EXPIRATION] > 48h", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  unifi-frontend:
    name: unifi-frontend
    driver: bridge
  unifi-backend:
    name: unifi-backend
    driver: bridge
    internal: true
