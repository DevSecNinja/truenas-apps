---
services:
  # Sets ownership on the ./data bind-mount directory so Dozzle (UID 3109) can
  # write user profiles to /data/__default__ at startup. Runs once, then exits.
  dozzle-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: dozzle-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to chown ./data to 3109:3109
      - DAC_OVERRIDE # Required to traverse host dirs owned by truenas_admin
    read_only: true
    command:
      - "sh"
      - "-c"
      - chown -Rv 3109:3109 /data
    volumes:
      - ./data:/data

  dozzle:
    image: docker.io/amir20/dozzle:v10.4.1@sha256:03ac4280eec733d004de0a46a3944e8ef0d3fbd9c317027b19492d4ed360aa89
    container_name: dozzle
    # Dozzle is a scratch-based Go binary — no shell or wget inside the image.
    # The binary ships a built-in "healthcheck" subcommand that calls /healthcheck
    # on the configured address, so no external HTTP client is needed.
    command:
      - --remote-host
      - "tcp://dozzle-docker-proxy:2375|Docker"
    depends_on:
      dozzle-init:
        condition: service_completed_successfully
      dozzle-docker-proxy:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - DOZZLE_NO_ANALYTICS=true
    user: "3109:3109" # svc-app-dozzle
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - dozzle-frontend
      - dozzle-backend
    mem_limit: ${MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/data
    healthcheck:
      # Uses the dozzle binary's built-in healthcheck subcommand — scratch image has no shell.
      test:
        - "CMD"
        - "/dozzle"
        - "healthcheck"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Dozzle
      - homepage.icon=dozzle.svg
      - homepage.href=https://logs.${DOMAINNAME}
      - homepage.description=Container Log Viewer
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=dozzle-frontend"
      ## Middlewares
      - "traefik.http.routers.dozzle-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.dozzle-rtr.rule=Host(`logs.${DOMAINNAME}`)"
      - "traefik.http.routers.dozzle-rtr.entrypoints=https"
      - "traefik.http.routers.dozzle-rtr.service=dozzle-svc"
      - "traefik.http.services.dozzle-svc.loadbalancer.server.port=8080"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.dozzle-monitor.rule=Host(`logs.${DOMAINNAME}`)"
      - "traefik.http.routers.dozzle-monitor.entrypoints=monitoring"
      - "traefik.http.routers.dozzle-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.dozzle-monitor.service=dozzle-svc"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444/healthcheck"
      - "gatus.headers.Host=logs.${DOMAINNAME}"
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

  # LinuxServer socket-proxy runs as root by design (requires Docker socket access).
  # It does not support custom users, mods, or scripts.
  # See: https://github.com/linuxserver/docker-socket-proxy
  # cap_drop: ALL is therefore omitted.
  dozzle-docker-proxy:
    image: lscr.io/linuxserver/socket-proxy:version-3.2.14-r0@sha256:56dde3144ef213d2df1ee3d600baad521bd8b8c2bf844672719b07363606f4c2
    container_name: dozzle-docker-proxy
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - dozzle-backend
    env_file:
      - path: ../shared/env/tz.env
    environment:
      - CONTAINERS=1 # Allow access to viewing containers
      - EVENTS=1 # Enabled by default
      - INFO=1 # Allow providing system information
      - POST=0 # Disallow any POST operations (effectively read-only)
    security_opt:
      - no-new-privileges=true
    mem_limit: ${SOCKET_PROXY_MEM_LIMIT:-50m}
    pids_limit: 50
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://127.0.0.1:2375/_ping"
      interval: 5s
      timeout: 5s
      retries: 3

networks:
  dozzle-frontend:
    name: dozzle-frontend
    driver: bridge
  dozzle-backend:
    name: dozzle-backend
    driver: bridge
    internal: true
