# wmbusmeters main configuration
# See: https://github.com/wmbusmeters/wmbusmeters/blob/master/README.md

# MQTT output — publishes meter readings to the Mosquitto broker on the
# iot-backend Docker network
loglevel=normal
device=auto:t1
logtelegrams=false
format=json
# Mosquitto is reachable via Docker's iot-backend network
meterfiles=/wmbusmeters_data/logs/meter_readings
meterfilesaction=overwrite
logfile=/wmbusmeters_data/logs/wmbusmeters.log
shell=/usr/bin/mosquitto_pub -h mosquitto -p 1883 -t "wmbusmeters/$METER_ID" -m "$METER_JSON"
