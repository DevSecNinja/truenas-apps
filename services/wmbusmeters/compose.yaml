---
services:
  # Sets ownership on ./data so the non-root wmbusmeters container (UID 3123)
  # can write meter state files. Runs once, then exits.
  wmbusmeters-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: wmbusmeters-init
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to chown ./data to 3123:3123
      - DAC_OVERRIDE # Required to write to ZFS-mounted volumes as root
    read_only: true
    command:
      - "sh"
      - "-c"
      - |-
        chown -Rv 3123:3123 /wmbusmeters_data
    volumes:
      - ./data:/wmbusmeters_data

  # wmbusmeters reads wireless M-Bus (wM-Bus) telegrams from smart meters
  # (water, gas, electricity, heat) and publishes readings to MQTT. The
  # container needs access to the USB radio dongle (e.g. iM871A, Amber
  # Wireless AMB8465) via the devices: directive.
  #
  # user: is set because wmbusmeters supports running as non-root. The
  # USB device must be accessible by the container UID. On TrueNAS, use
  # udev rules or set the device permissions to allow access.
  wmbusmeters:
    image: docker.io/weetmuts/wmbusmeters:release-1.11.0@sha256:4d0e3cfa9ce3df79bc292fa1d1b39b2e5e71fa4ab8b20d47a6fca97392f9265a
    container_name: wmbusmeters
    depends_on:
      wmbusmeters-init:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    user: "3123:3123" # svc-app-wmbusmeters
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - iot-backend
    # Uncomment and adjust to pass through the USB radio dongle:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    environment:
      # Override the image defaults so the entrypoint finds our git-tracked
      # config (:ro) and writes runtime data to ./data (writable).
      - ETC_DIR=/wmbusmeters/etc
      - LOGS_DIR=/wmbusmeters_data/logs
      - READINGS_DIR=/wmbusmeters_data/logs/meter_readings
    mem_limit: ${MEM_LIMIT:-256m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./config/wmbusmeters.conf:/wmbusmeters/etc/wmbusmeters.conf:ro
      - ./config/meters.d:/wmbusmeters/etc/wmbusmeters.d:ro
      - ./data:/wmbusmeters_data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pgrep wmbusmeters || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      # Homepage
      - homepage.group=IoT
      - homepage.name=wmbusmeters
      - homepage.icon=mdi-gauge-#ffffff
      - homepage.description=Wireless M-Bus smart meter reader

networks:
  iot-backend:
    name: iot-backend
    external: true
