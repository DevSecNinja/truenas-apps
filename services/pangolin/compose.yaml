---
services:
  # Renders the git-tracked config templates into ./data/config so Pangolin can
  # keep its runtime database, WireGuard keys, and ACME state out of git.
  # NOTE: ./config is git-tracked and must NOT be chowned here.
  pangolin-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: pangolin-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to change ownership on runtime data paths
      - FOWNER # Required to chmod acme.json after chown transfers ownership
    read_only: true
    command:
      - "sh"
      - "-c"
      - |-
        set -eu
        : "$${DOMAINNAME:?DOMAINNAME is required}"
        mkdir -p /data/config/db /data/config/key /data/config/letsencrypt /data/config/logs /data/config/traefik
        sed "s|\$${DOMAINNAME}|$${DOMAINNAME}|g" /config/config.yml.template > /data/config/config.yml
        sed "s|\$${DOMAINNAME}|$${DOMAINNAME}|g" /config/traefik/dynamic_config.yml.template > /data/config/traefik/dynamic_config.yml
        : "$${ACME_EMAIL:?ACME_EMAIL is required}"
        sed "s|\$${ACME_EMAIL}|$${ACME_EMAIL}|g" /config/traefik/traefik_config.yml > /data/config/traefik/traefik_config.yml
        touch /data/config/letsencrypt/acme.json
        chown -Rv 3127:3127 /data
        chmod 600 /data/config/letsencrypt/acme.json
    volumes:
      - ./config:/config:ro
      - ./data:/data

  pangolin:
    image: docker.io/fosrl/pangolin:1.18.1@sha256:af41a484d919c1164018a17382ba184be0e27fa42ce29b8f9d4c78ddbec9269f
    container_name: pangolin
    depends_on:
      pangolin-init:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    user: "3127:3127" # svc-app-pangolin
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - pangolin-frontend
      - pangolin-backend
    mem_limit: ${PANGOLIN_MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data/config:/app/config
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://127.0.0.1:3001/api/v1/"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Pangolin
      - homepage.icon=mdi-pipe-disconnected-#ffffff
      - homepage.href=https://pangolin.$DOMAINNAME
      - homepage.description=Identity-Aware Tunnel Proxy
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=pangolin-frontend"
      ## HTTP Routers
      - "traefik.http.routers.pangolin-rtr.rule=Host(`pangolin.${DOMAINNAME}`)"
      - "traefik.http.routers.pangolin-rtr.entrypoints=https"
      ## Middlewares
      - "traefik.http.routers.pangolin-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.pangolin-rtr.service=pangolin"
      - "traefik.http.services.pangolin.loadbalancer.server.port=3001"
      ## Gatus
      - "gatus.url=https://pangolin.${DOMAINNAME}/api/v1/"
      - 'gatus.client={"ignore-redirect": true}'
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'
      # Config hash — triggers container recreation when ./config templates change
      - "config.sha256=${CONFIG_HASH:-}"

  # Gerbil manages WireGuard tunnels and therefore must run as root with
  # NET_ADMIN plus /dev/net/tun. SYS_MODULE is intentionally omitted; the host
  # must provide the WireGuard/TUN kernel support before deployment.
  gerbil:
    image: docker.io/fosrl/gerbil:1.3.1@sha256:b16a722d5603fa74acd3e1deb86cea0b8330d015ab5325dc41e44108fe6f29c9
    container_name: gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    env_file:
      - path: ../shared/env/tz.env
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - pangolin-backend
    mem_limit: ${GERBIL_MEM_LIMIT:-256m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    read_only: true
    tmpfs:
      - /tmp
      - /run
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - ${GERBIL_WIREGUARD_PORT:-51820}:51820/udp
      - ${GERBIL_CLIENTS_PORT:-21820}:21820/udp
      - ${PANGOLIN_HTTP_PORT:-8088}:80
      - ${PANGOLIN_HTTPS_PORT:-8448}:443
    volumes:
      - ./data/config:/var/config
    healthcheck:
      test:
        - "CMD-SHELL"
        - "nc -z 127.0.0.1 3004"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  pangolin-traefik:
    image: docker.io/library/traefik:v3.6@sha256:8cb20d16e01a53d8d7f7696ac2f1af7d200d5c9984d226ce2299731d9eab6d6c
    container_name: pangolin-traefik
    depends_on:
      pangolin:
        condition: service_healthy
      gerbil:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    env_file:
      - path: ../shared/env/tz.env
    user: "3127:3127" # svc-app-pangolin
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    network_mode: service:gerbil
    mem_limit: ${TRAEFIK_MEM_LIMIT:-512m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data/config/traefik:/etc/traefik:ro
      - ./data/config/letsencrypt:/letsencrypt
    healthcheck:
      test:
        - "CMD"
        - "traefik"
        - "healthcheck"
        - "--ping"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  pangolin-frontend:
    name: pangolin-frontend
    driver: bridge
  pangolin-backend:
    name: pangolin-backend
    driver: bridge
    internal: true
