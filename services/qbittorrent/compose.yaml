---
services:
  # s6-overlay exception — see ARCHITECTURE.md for the full rationale.
  # LinuxServer qBittorrent starts as root and uses s6-overlay to drop to PUID:PGID.
  # read_only: true is omitted (s6-overlay writes to the root fs at startup).
  # user: is omitted (s6-overlay requires root to chown /config to PUID:PGID).
  # cap_drop: ALL still applied; CHOWN/SETUID/SETGID/SETPCAP re-added for s6-overlay.
  #
  # Network design: arr-egress is listed FIRST so Docker sets it as eth0 and uses
  # EGRESS_GATEWAY as the default route — all internet traffic exits through egress network.
  # qbittorrent-frontend (bridge) is listed SECOND; Docker adds only a specific route for
  # the 172.x.x.x bridge subnet so Traefik can reach qBittorrent without overriding the
  # egress network default route. Traefik is NOT joined to arr-egress (macvlan) to avoid
  # assigning Traefik an unnecessary egress network IP.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4@sha256:a89108b1bf43de072a35a59a3ee41b97b564538faae5cbb3f6c803aa7f5fd9f7
    container_name: qbittorrent
    hostname: qbittorrent
    env_file:
      - path: .env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=3114 # svc-app-qbittorrent
      - PGID=3200 # media group — shared with Plex, MeTube, and other arr apps
      - UMASK=002 # group-writable files for media group (664 files, 775 dirs)
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      arr-egress: # FIRST — becomes default route; all internet traffic via egress network
        ipv4_address: ${EGRESS_IP}
        mac_address: ${EGRESS_MAC}
      qbittorrent-frontend: # SECOND — bridge for Traefik; specific route only, no default GW change
      arr-stack-backend: # Internal bridge for arr app inter-communication
    mem_limit: ${MEM_LIMIT:-1024m}
    pids_limit: 200
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # s6-overlay chowns /config to PUID:PGID at startup
      - SETUID # s6-overlay drops from root to PUID
      - SETGID # s6-overlay drops from root to PGID
      - SETPCAP # s6-overlay clears bounding capabilities before exec-ing qBittorrent
    tmpfs:
      - /run:exec # s6-overlay places executables in /run during init
      - /tmp
    volumes:
      - ./data/config:/config
      - /mnt/archive-pool/content:/data # downloads/ on same filesystem as media/ for hardlinks
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:8080"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=qBittorrent
      - homepage.icon=qbittorrent.svg
      - homepage.href=https://qbittorrent.$DOMAINNAME
      - homepage.description=Torrent Manager
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=qbittorrent-frontend"
      ## HTTP Routers
      - "traefik.http.routers.qbittorrent-rtr.rule=Host(`qbittorrent.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.qbittorrent-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.qbittorrent-rtr.service=qbittorrent"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.qbittorrent-monitor.rule=Host(`qbittorrent.${DOMAINNAME}`)"
      - "traefik.http.routers.qbittorrent-monitor.entrypoints=monitoring"
      - "traefik.http.routers.qbittorrent-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.qbittorrent-monitor.service=qbittorrent"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444"
      - "gatus.headers.Host=qbittorrent.${DOMAINNAME}"
      - 'gatus.client={"ignore-redirect": true}'
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  arr-egress:
    name: arr-egress
    external: true
  qbittorrent-frontend:
    name: qbittorrent-frontend
    driver: bridge
    internal: true # Blocks internet egress via the Traefik bridge — all outbound traffic must use arr-egress
  arr-stack-backend:
    name: arr-stack-backend
    external: true
