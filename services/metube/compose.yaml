---
services:
  # Sets ownership on the ./data/state bind-mount directory to the metube UID:GID.
  # The content directory tree and media permissions are handled by the _bootstrap
  # service (content-init), which deploys first alphabetically.
  # Runs once, then exits.
  metube-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: metube-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to chown ./data/state to 3107:3200
    read_only: true
    command:
      - "sh"
      - "-c"
      - "chown -Rv 3107:3200 /metube-state-dir"
    volumes:
      - ./data/state:/metube-state-dir

  # alexta69/metube is a standard Python/aiohttp application; it does not use
  # gosu or s6-overlay. The container can start directly as ${PUID}:${PGID}
  # with cap_drop: ALL and read_only: true fully supported.
  # UID/GID env vars instruct yt-dlp to set that ownership on downloaded files;
  # the composed user: field ensures the process itself runs as non-root.
  # UMASK=002 produces group-writable files (664/775) so all media group
  # (GID 3200) members can read files written by MeTube.
  metube:
    image: ghcr.io/alexta69/metube:2026.04.09@sha256:2ad2f7b064afc87184ce45466634048fd5c690de7c0f776bdbdf98de430173e5
    container_name: metube
    depends_on:
      metube-init:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - UID=3107
      # GID hardcoded to 3200 (media) — env_file cannot supply ${PGID} for
      # compose-level variable substitution (user:, tmpfs gid=), so we hardcode it.
      - GID=3200
      - UMASK=002 # Producers write group-writable files (664/775) for media consumers
      - AUDIO_DOWNLOAD_DIR=/downloads/audio
      - DOWNLOAD_DIR=/downloads/video
      - TEMP_DIR=/metube-temp-dir
      - STATE_DIR=/metube-state-dir
      - DOWNLOAD_MODE=limited
      - MAX_CONCURRENT_DOWNLOADS=1
    user: "3107:3200" # svc-app-metube:media
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - metube-frontend
    mem_limit: ${MEM_LIMIT:-4096m}
    # Limiting to 1024m can cause issues with large downloads; 4096m is the best compromise.
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      # temp download dir: size-capped, accessible only by the metube user (mode=1700)
      - /metube-temp-dir:size=4G,uid=3107,gid=3200,mode=1700
    volumes:
      # TrueNAS ZFS dataset — video/ and audio/ subdirs are pre-created by metube-init
      - /mnt/archive-pool/content/media/youtube/metube:/downloads
      - ./data/state:/metube-state-dir
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:8081"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=MeTube
      - homepage.icon=sh-metube
      - homepage.href=https://metube.${DOMAINNAME}
      - homepage.description=YouTube Individual Downloads
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=metube-frontend"
      ## HTTP Routers
      - "traefik.http.routers.metube-rtr.rule=Host(`metube.${DOMAINNAME}`)"
      - "traefik.http.routers.metube-rtr.entrypoints=https"
      ## Middlewares
      - "traefik.http.routers.metube-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.metube-rtr.service=metube"
      - "traefik.http.services.metube.loadbalancer.server.port=8081"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.metube-monitor.rule=Host(`metube.${DOMAINNAME}`)"
      - "traefik.http.routers.metube-monitor.entrypoints=monitoring"
      - "traefik.http.routers.metube-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.metube-monitor.service=metube"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444"
      - "gatus.headers.Host=metube.${DOMAINNAME}"
      - 'gatus.client={"ignore-redirect": true}'
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  metube-frontend:
    name: metube-frontend
    driver: bridge
