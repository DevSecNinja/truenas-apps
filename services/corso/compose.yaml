---
services:
  # Sets ownership on the ./data bind-mount directory so Corso (UID 3127) can
  # persist its repository configuration and logs under /app/corso.
  corso-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: corso-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to chown ./data to 3127:3127
    read_only: true
    command:
      - "sh"
      - "-c"
      - mkdir -p /data/logs && chown -Rv 3127:3127 /data
    volumes:
      - ./data:/data

  corso:
    # Corso is an archived but still-available open-source Microsoft 365 backup CLI.
    image: ghcr.io/alcionai/corso:v0.19.0@sha256:41d7fb46bb9339b8331455bf2a652d5f96d7ea74e4b146d762bd5cb2046c1219
    container_name: corso
    depends_on:
      corso-init:
        condition: service_completed_successfully
    entrypoint:
      - "/bin/sh"
      - "-c"
    command:
      - |-
        set -eu

        # Wrap the Corso CLI with common non-interactive logging flags.
        corso() {
          /corso --hide-progress --log-file /app/corso/logs/corso.log "$$@"
        }
        repo() {
          action="$$1"
          if [ -n "$${CORSO_S3_PREFIX:-}" ] && [ -n "$${CORSO_S3_ENDPOINT:-}" ]; then
            corso repo "$${action}" s3 --bucket "$${CORSO_S3_BUCKET}" --prefix "$${CORSO_S3_PREFIX}" --endpoint "$${CORSO_S3_ENDPOINT}"
          elif [ -n "$${CORSO_S3_PREFIX:-}" ]; then
            corso repo "$${action}" s3 --bucket "$${CORSO_S3_BUCKET}" --prefix "$${CORSO_S3_PREFIX}"
          elif [ -n "$${CORSO_S3_ENDPOINT:-}" ]; then
            corso repo "$${action}" s3 --bucket "$${CORSO_S3_BUCKET}" --endpoint "$${CORSO_S3_ENDPOINT}"
          else
            corso repo "$${action}" s3 --bucket "$${CORSO_S3_BUCKET}"
          fi
        }
        selector_or_all() {
          if [ "$$1" = "x" ]; then
            printf "%s" "$$2"
          else
            printf "*"
          fi
        }

        while true; do
          backup_interval="$${CORSO_BACKUP_INTERVAL_SECONDS:-86400}"
          echo "Starting Microsoft 365 backup run at $$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if ! repo connect; then
            echo "Corso repository connect failed; attempting repository initialization"
            repo init
          fi

          # Unset selectors default to all resources; set a selector to an
          # empty value in .env to disable that workload.
          exchange_mailboxes=$$(selector_or_all "$${CORSO_EXCHANGE_MAILBOXES+x}" "$${CORSO_EXCHANGE_MAILBOXES:-}")
          onedrive_users=$$(selector_or_all "$${CORSO_ONEDRIVE_USERS+x}" "$${CORSO_ONEDRIVE_USERS:-}")
          sharepoint_sites=$$(selector_or_all "$${CORSO_SHAREPOINT_SITES+x}" "$${CORSO_SHAREPOINT_SITES:-}")

          if [ -n "$${exchange_mailboxes}" ]; then
            corso backup create exchange --mailbox "$${exchange_mailboxes}"
          fi

          if [ -n "$${onedrive_users}" ]; then
            corso backup create onedrive --user "$${onedrive_users}"
          fi

          if [ -n "$${sharepoint_sites}" ]; then
            corso backup create sharepoint --site "$${sharepoint_sites}"
          fi

          echo "Microsoft 365 backup run completed; sleeping for $${backup_interval}s"
          sleep "$${backup_interval}"
        done
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    user: "3127:3127" # svc-app-corso
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - corso-backend
    mem_limit: ${MEM_LIMIT:-512m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/app/corso
    healthcheck:
      test:
        - "CMD"
        - "/corso"
        - "--log-file"
        - "-"
        - "--hide-progress"
        - "--version"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      # Homepage
      - homepage.group=Backup
      - homepage.name=Corso
      - homepage.icon=mdi-cloud-sync-#ffffff
      - homepage.description=Microsoft 365 backup runner

networks:
  corso-backend:
    name: corso-backend
    driver: bridge
