---
http:
  middlewares:
    # Restricts the monitoring entrypoint (:8444) to the gatus-frontend subnet.
    # Applied at the entrypoint level in traefik.yml so it covers all -monitor
    # routers automatically. If the gatus-frontend IPAM subnet changes, update
    # the sourceRange here to match.
    monitoring-ipallowlist:
      ipAllowList:
        sourceRange:
          - "172.30.100.0/29"
    # Restricts the metrics entrypoint (:8082, Prometheus /metrics) to the
    # alloy-frontend subnet so only Alloy can scrape Traefik metrics. Applied
    # at the entrypoint level in traefik.yml. If the alloy-frontend IPAM
    # subnet changes (services/alloy/compose.yaml), update sourceRange here.
    metrics-ipallowlist:
      ipAllowList:
        sourceRange:
          - "172.30.100.8/29"
    middlewares-rate-limit:
      rateLimit:
        average: 100
        burst: 50
    middlewares-rate-limit-strict:
      rateLimit:
        average: 10
        burst: 20
    # Loose rate limit for apps like Immich whose SvelteKit frontend loads
    # many JS/CSS chunks in parallel on first page load.
    middlewares-rate-limit-loose:
      rateLimit:
        average: 500
        burst: 300
    middlewares-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: "DENY"
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
            'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"
    # Standalone Plex-specific headers middleware — replaces middlewares-secure-headers
    # entirely for Plex rather than chaining and overriding. The two-middleware approach
    # (secure-headers + plex-headers) had a middleware ordering bug: in Traefik chains,
    # response headers are applied in reverse order, so middlewares-secure-headers ran
    # last and its strict CSP always won over the plex-headers override.
    # Plex Web needs to reach plex.tv/plex.direct for auth, metadata, and streaming.
    middlewares-plex-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src 'self' https://*.plex.tv wss://*.plex.tv https://*.plex.direct; script-src
            'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src
            'self' data:; connect-src 'self' https://*.plex.tv wss://*.plex.tv https://*.plex.direct https://*.plex.media;
            frame-ancestors 'none'"
    # Standalone Immich-specific headers middleware — replaces middlewares-secure-headers
    # for Immich. CSP is intentionally open (home-only, not public-facing) to avoid
    # maintenance as Immich adds new script hashes or external sources with each release.
    middlewares-immich-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:"
    # Standalone qBittorrent-specific headers middleware — replaces middlewares-secure-headers
    # for qBittorrent. Uses frame-ancestors 'self' instead of 'none' because the qBittorrent
    # Web UI opens dialogs (e.g. "Add category") as same-origin iframes. frame-ancestors
    # 'none' causes "violates Content Security Policy" errors and blocks those dialogs.
    middlewares-qbittorrent-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
            'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"
    # Standalone Bitwarden-specific headers middleware — replaces middlewares-secure-headers
    # for Bitwarden Lite. The Bitwarden web vault needs:
    #   - connect-src: api.pwnedpasswords.com (HIBP password-strength check),
    #     api.2fa.directory (2FA provider hints), app.simplelogin.io (alias generator)
    #   - script-src 'wasm-unsafe-eval': required for the Argon2 KDF wasm module
    #   - img-src haveibeenpwned.com: HIBP breach-result icons
    #   - child-src/frame-src duosecurity/duofederal: Duo MFA iframe
    #   - object-src 'self' blob:: required for vault attachments
    #   - worker-src 'self' blob:: required for iOS 1Password import parsing
    # Mirrors the CSP rendered by upstream Bitwarden's nginx-config.hbs but with
    # frame-ancestors 'none' added for clickjacking protection (the upstream
    # CSP omits frame-ancestors).
    middlewares-bitwarden-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: "DENY"
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline';
            img-src 'self' data: https://haveibeenpwned.com; font-src 'self' data:; child-src 'self' https://*.duosecurity.com
            https://*.duofederal.com; frame-src 'self' https://*.duosecurity.com https://*.duofederal.com; connect-src 'self'
            https://api.pwnedpasswords.com https://api.2fa.directory https://app.simplelogin.io/api/alias/random/new; object-src
            'self' blob:; worker-src 'self' blob:; frame-ancestors 'none'"
    middlewares-forward-auth:
      forwardAuth:
        address: "http://traefik-forward-auth:4181"
        trustForwardHeader: true
        maxResponseBodySize: 1048576 # 1 MiB — prevents DoS via unbounded response
        authResponseHeaders:
          - "X-Forwarded-User"
          - "X-Forwarded-DisplayName"
