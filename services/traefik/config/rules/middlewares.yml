---
http:
  middlewares:
    middlewares-rate-limit:
      rateLimit:
        average: 100
        burst: 50
    middlewares-rate-limit-strict:
      rateLimit:
        average: 10
        burst: 20
    # Loose rate limit for apps like Immich whose SvelteKit frontend loads
    # many JS/CSS chunks in parallel on first page load.
    middlewares-rate-limit-loose:
      rateLimit:
        average: 500
        burst: 300
    middlewares-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: "DENY"
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
            'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"
    # Standalone Plex-specific headers middleware — replaces middlewares-secure-headers
    # entirely for Plex rather than chaining and overriding. The two-middleware approach
    # (secure-headers + plex-headers) had a middleware ordering bug: in Traefik chains,
    # response headers are applied in reverse order, so middlewares-secure-headers ran
    # last and its strict CSP always won over the plex-headers override.
    # Plex Web needs to reach plex.tv/plex.direct for auth, metadata, and streaming.
    middlewares-plex-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src 'self' https://*.plex.tv wss://*.plex.tv https://*.plex.direct; script-src
            'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src
            'self' data:; connect-src 'self' https://*.plex.tv wss://*.plex.tv https://*.plex.direct https://*.plex.media;
            frame-ancestors 'none'"
    # Standalone Immich-specific headers middleware — replaces middlewares-secure-headers
    # for Immich. CSP is intentionally open (home-only, not public-facing) to avoid
    # maintenance as Immich adds new script hashes or external sources with each release.
    middlewares-immich-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:"
    # Standalone OpenSpeedTest-specific headers middleware — replaces middlewares-secure-headers
    # for OpenSpeedTest. The speed test runs its upload/download measurement inside an iframe
    # loaded from the same origin. The default 'X-Frame-Options: DENY' and
    # 'frame-ancestors: none' CSP block that iframe, breaking the test entirely.
    # Relaxing to SAMEORIGIN / frame-ancestors 'self' is safe because the iframe
    # is served by the same domain and only the authorised user can reach this app.
    middlewares-openspeedtest-secure-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: "SAMEORIGIN"
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera 'none'; geolocation 'none'; microphone 'none'; payment 'none'; usb 'none'; vr 'none';"
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
            'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"
    middlewares-forward-auth:
      forwardAuth:
        address: "http://traefik-forward-auth:4181"
        trustForwardHeader: true
        maxResponseBodySize: 1048576 # 1 MiB — prevents DoS via unbounded response
        authResponseHeaders:
          - "X-Forwarded-User"
          - "X-Forwarded-DisplayName"
