---
api:
  dashboard: true

ping: {}

global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
          permanent: true
  https:
    address: ":443"
    http:
      tls: {}
  # Internal-only entrypoint for Gatus health checks. Not published to the host
  # (no ports: entry in compose.yaml), so it is only reachable from containers
  # that share a Docker network with Traefik. An entrypoint-level ipAllowList
  # restricts access to the gatus-frontend subnet (172.30.100.0/29), ensuring
  # no other container can use this entrypoint to bypass forward-auth.
  monitoring:
    address: ":8444"
    observability:
      accessLogs: false
    http:
      middlewares:
        - monitoring-ipallowlist@file
  # Internal-only entrypoint for Prometheus metrics scraping by Alloy. Not
  # published to the host; only reachable via the alloy-frontend Docker
  # network. An entrypoint-level ipAllowList restricts access to the
  # alloy-frontend subnet (172.30.100.8/29) so that no other container on a
  # frontend network Traefik joins can scrape /metrics (which exposes router,
  # service, and entrypoint topology).
  metrics:
    address: ":8082"
    observability:
      accessLogs: false
    http:
      middlewares:
        - metrics-ipallowlist@file

metrics:
  prometheus:
    entryPoint: metrics
    addRoutersLabels: true
    addServicesLabels: true
    addEntryPointsLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0
      - 10.0

providers:
  docker:
    endpoint: tcp://traefik-docker-proxy:2375
    exposedByDefault: false
  file:
    directory: "/rules"
    watch: true

certificatesResolvers:
  dns-cloudflare:
    acme:
      # caServer: "https://acme-staging-v02.api.letsencrypt.org/directory" # LetsEncrypt Staging Server - uncomment when testing
      storage: "/acme/acme.json"
      dnsChallenge:
        provider: "cloudflare"
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"

accessLog:
  filters:
    statusCodes:
      - "400-599"
  fields:
    headers:
      names:
        User-Agent: keep
        Authorization: drop
        Content-Type: keep

log:
  level: INFO
