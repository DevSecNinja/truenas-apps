---
services:
  # Sets ownership on the ./data/acme bind-mount directory so the non-root
  # traefik container can access its certificate store. Runs once, then exits.
  # Required because traefik runs as 3100:3100 with cap_drop: ALL, meaning
  # it has no CAP_CHOWN and cannot fix volume ownership itself at runtime.
  # NOTE: ./config is git-tracked and must NOT be chowned here — doing so
  # changes file ownership away from the deploy user and breaks git pull.
  # Config files are mounted :ro and are world-readable from the git checkout.
  traefik-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: traefik-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to change file ownership
      - FOWNER # Required to chmod files after chown transfers ownership away from root
      - DAC_OVERRIDE # Required to traverse /acme if previously chowned to 3100
    read_only: true
    command:
      - "sh"
      - "-c"
      - |-
        touch /acme/acme.json &&
        chown -Rv 3100:3100 /acme &&
        chmod -v 700 /acme &&
        chmod -v 600 /acme/acme.json
    volumes:
      - ./data/acme:/acme

  traefik:
    # Docker Hub Hardened Image — requires `docker login dhi.io` (free with Docker Hub account).
    # Runs as nonroot (UID 65532) by default; overridden to 3100:3100 via user: below.
    # NOTE: DHI digest intentionally not pinned — see services/adguard/compose.yaml
    # for rationale (multi-arch manifest list resolution on arm64 hosts).
    image: dhi.io/traefik:3.6.14-debian13@sha256:b71ffbb608f77f14c6b14290096670e9c2a51df5d8247710b8eac6ac4142025a
    container_name: traefik
    depends_on:
      traefik-init:
        condition: service_completed_successfully
      traefik-docker-proxy:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      # Defined here instead of compose.env because env_file values are not interpolated by Compose,
      # so ${DOMAINNAME} would be passed as a literal string rather than the actual domain.
      TRAEFIK_PROVIDERS_DOCKER_DEFAULTRULE: >-
        Host(`{{ index .Labels "com.docker.compose.service" }}.${DOMAINNAME}`)
    user: "3100:3100" # svc-app-traefik
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      traefik-backend:
      adguard-frontend:
      alloy-frontend:
      echo-server-frontend:
      excalidraw-frontend:
      gatus-frontend:
        ipv4_address: 172.30.100.6
      homepage-frontend:
      traefik-forward-auth-frontend:
      unifi-frontend:
      plex-frontend:
      metube-frontend:
      immich-frontend:
      bazarr-frontend:
      dozzle-frontend:
      lidarr-frontend:
      prowlarr-frontend:
      qbittorrent-frontend:
      radarr-frontend:
      sabnzbd-frontend:
      sonarr-frontend:
      spottarr-frontend:
      tubesync-frontend:
      drawio-frontend:
      esphome-frontend:
      frigate-frontend:
      home-assistant-frontend:
      outline-frontend:
      sqlite-web-frontend:
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - ${HOST_HTTP_PORT:-80}:80
      - ${HOST_HTTPS_PORT:-443}:443
    read_only: true
    tmpfs:
      - /tmp
      - /run
    volumes:
      - ./data/acme:/acme
      - ./config/rules:/rules:ro
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
    healthcheck:
      test:
        - "CMD"
        - "traefik"
        - "healthcheck"
        - "--ping"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: ${MEM_LIMIT:-1024m}
    pids_limit: 100
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Traefik
      - homepage.icon=traefik.svg
      - homepage.href=https://traefik.$DOMAINNAME
      - homepage.description=Application Proxy
      # Traefik
      - "traefik.enable=true"
      ## TLS
      - "traefik.http.routers.traefik-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.traefik-rtr.tls.domains[0].main=${DOMAINNAME}"
      - "traefik.http.routers.traefik-rtr.tls.domains[0].sans=*.${DOMAINNAME}"
      ## Middlewares
      - "traefik.http.routers.traefik-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.traefik-rtr.rule=Host(`traefik.${DOMAINNAME}`)"
      - "traefik.http.routers.traefik-rtr.entrypoints=https"
      - "traefik.http.routers.traefik-rtr.service=api@internal"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.traefik-monitor.rule=Host(`traefik.${DOMAINNAME}`)"
      - "traefik.http.routers.traefik-monitor.entrypoints=monitoring"
      - "traefik.http.routers.traefik-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.traefik-monitor.service=api@internal"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444/api/overview"
      - "gatus.headers.Host=traefik.${DOMAINNAME}"
      - "gatus.conditions=[\"[STATUS] == 200\", \"[RESPONSE_TIME] < 1000\"]"
      - "gatus.alerts=[{\"type\": \"email\"}, {\"type\": \"custom\"}]"
      ## SVLNAS redirect to TrueNAS portal (80/443 → 8443)
      - "traefik.http.routers.svlnas-rtr.rule=Host(`svlnas.${DOMAINNAME}`)"
      - "traefik.http.routers.svlnas-rtr.entrypoints=https"
      - "traefik.http.routers.svlnas-rtr.tls=true"
      - "traefik.http.routers.svlnas-rtr.middlewares=middlewares-redirect-to-nas-mgmt"
      - "traefik.http.routers.svlnas-rtr.service=noop@internal"
      - "traefik.http.middlewares.middlewares-redirect-to-nas-mgmt.redirectregex.regex=^https?://svlnas\\.${DOMAINNAME}(.*)"
      - "traefik.http.middlewares.middlewares-redirect-to-nas-mgmt.redirectregex.replacement=https://svlnas.${DOMAINNAME}:8443$${1}"
      - "traefik.http.middlewares.middlewares-redirect-to-nas-mgmt.redirectregex.permanent=true"
      # Config hash — triggers container recreation when the static config changes.
      # Only config/traefik.yml is watched (the static config that requires a restart).
      # Dynamic rules under config/rules/ are hot-reloaded by Traefik's file provider
      # without a container restart, so hashing the whole config/ dir is unnecessary.
      - "config.watch=config/traefik.yml"
      - "config.sha256=${CONFIG_HASH:-}"

  # LinuxServer socket-proxy runs as root by design (requires Docker socket access).
  # It does not support custom users, mods, or scripts.
  # See: https://github.com/linuxserver/docker-socket-proxy
  # cap_drop: ALL is therefore omitted.
  traefik-docker-proxy:
    image: lscr.io/linuxserver/socket-proxy:version-3.2.14-r0@sha256:56dde3144ef213d2df1ee3d600baad521bd8b8c2bf844672719b07363606f4c2
    container_name: traefik-docker-proxy
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - traefik-backend
    env_file:
      - path: ../shared/env/tz.env
    environment:
      - CONTAINERS=1
    security_opt:
      - no-new-privileges=true
    mem_limit: ${SOCKET_PROXY_MEM_LIMIT:-50m}
    pids_limit: 50
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:2375/_ping"
      interval: 5s
      timeout: 5s
      retries: 3

networks:
  traefik-backend:
    name: traefik-backend
    driver: bridge
    internal: true
