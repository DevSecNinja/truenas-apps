---
services:
  # Seeds ./config/ template files into ./data/config/ on first deploy only
  # (cp -n never overwrites existing files). Seeds:
  #   configuration.yaml — main config with http: trusted_proxies for Traefik
  #   automations.yaml   — empty list required by automation: !include
  #   scripts.yaml       — empty list required by script: !include
  #   scenes.yaml        — empty list required by scene: !include
  # Without these stubs HA cannot parse configuration.yaml and enters recovery
  # mode, ignoring the http: block and logging the "not set-up for reverse
  # proxies" error on every request.
  # Runs as root (no user:) — data/config is root:root so no CHOWN is needed.
  home-assistant-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: home-assistant-init
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    command:
      - "sh"
      - "-c"
      - |-
        mkdir -p /data &&
        cp -n /templates/configuration.yaml /data/configuration.yaml &&
        cp -n /templates/automations.yaml /data/automations.yaml &&
        cp -n /templates/scripts.yaml /data/scripts.yaml &&
        cp -n /templates/scenes.yaml /data/scenes.yaml
    volumes:
      - ./config:/templates:ro
      - ./data/config:/data

  # ghcr.io/home-assistant/home-assistant uses s6-overlay (confirmed by s6-rc
  # log lines at startup). s6-overlay starts as root and drops privileges
  # internally, so user: and read_only: are omitted per the s6-overlay pattern.
  # cap_drop: ALL is applied; the following caps are re-added:
  #   CHOWN      — s6-overlay chowns /config to the runtime user at startup
  #   SETUID     — s6-overlay drops from root to the runtime UID
  #   SETGID     — s6-overlay drops from root to the runtime GID
  #   SETPCAP    — s6-overlay clears the bounding capability set before exec
  #   NET_RAW    — required by HA's DHCP watcher integration (raw packet
  #                capture via AF_PACKET sockets); without it HA logs
  #                "[Errno 1] Operation not permitted" and the DHCP
  #                integration silently stops tracking devices.
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:beta@sha256:8848691147f01a6eee7753de2ade21b04d6168fcd2e2a7089f6f84e3b7b86960
    container_name: home-assistant
    depends_on:
      home-assistant-init:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - home-assistant-frontend
    mem_limit: ${MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # s6-overlay chowns /config to the runtime user at startup
      - SETUID # s6-overlay drops from root to the runtime UID
      - SETGID # s6-overlay drops from root to the runtime GID
      - SETPCAP # s6-overlay clears the bounding capability set before exec
      - NET_RAW # Required by HA's DHCP watcher integration (raw packet capture)
    tmpfs:
      - /tmp
    volumes:
      - ./data/config:/config
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sf http://localhost:8123/ -o /dev/null || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      # Homepage
      - homepage.group=Productivity
      - homepage.name=Home Assistant
      - homepage.icon=home-assistant.svg
      - homepage.href=https://home-assistant.${DOMAINNAME}
      - homepage.description=Open source home automation platform
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=home-assistant-frontend"
      ## HTTP Routers
      - "traefik.http.routers.home-assistant-rtr.rule=Host(`home-assistant.${DOMAINNAME}`)"
      ## Middlewares
      # chain-no-auth: HA enforces its own authentication (login page, MFA,
      # long-lived access tokens). The Companion mobile app authenticates
      # directly via HA's own OAuth/token flow; adding forward auth (chain-auth)
      # at the Traefik layer would redirect Companion API calls to the SSO
      # provider, breaking mobile connectivity.
      - "traefik.http.routers.home-assistant-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services
      - "traefik.http.routers.home-assistant-rtr.service=home-assistant"
      - "traefik.http.services.home-assistant.loadbalancer.server.port=8123"
      ## Gatus
      - 'gatus.conditions=["[STATUS] == 200", "[CERTIFICATE_EXPIRATION] > 48h", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  home-assistant-frontend:
    name: home-assistant-frontend
    driver: bridge
