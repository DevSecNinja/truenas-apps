---
services:
  # Cloudflare Tunnel agent — exposes services to the internet via Cloudflare's
  # edge network without opening inbound ports on the host. Routing rules (which
  # hostname maps to which local service) are managed centrally in the Cloudflare
  # Zero Trust dashboard.
  #
  # No dedicated UID/GID: the official image already runs as nonroot (65532) and
  # this service has zero writable volumes, so there is no file ownership to manage.
  # No init container needed for the same reason.
  cloudflared:
    image: docker.io/cloudflare/cloudflared:2025.4.2@sha256:698f5c59bf0b9ece62f8c60061004bdfcf7718fbac5d72b87e214af7b9d1d7ac
    container_name: cloudflared
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "--metrics"
      - "0.0.0.0:2000"
      - "run"
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - hadiscover-frontend
    mem_limit: ${MEM_LIMIT:-256m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    healthcheck:
      test:
        - "CMD"
        - "cloudflared"
        - "tunnel"
        - "--metrics"
        - "0.0.0.0:2000"
        - "ready"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Cloudflared
      - homepage.icon=cloudflare.svg
      - homepage.description=Cloudflare Tunnel Agent

networks:
  hadiscover-frontend:
    name: hadiscover-frontend
    external: true
