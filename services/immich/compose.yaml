---
# See README.md for TrueNAS host setup, storage layout, first-run steps, and volume details.

services:
  # Sets ownership on writable volumes and substitutes ${VAR} placeholders in
  # config/immich.yaml, writing the processed file to data/immich.yaml.
  # Runs once before all main services start, then exits.
  # GID is hardcoded to 3202 (private-photos) because env_file entries are injected
  # into the container environment and do not feed into compose variable
  # substitution (user:, tmpfs gid=, etc.).
  immich-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: immich-init
    env_file:
      - path: .env # Decrypted from secret.sops.env — provides OAuth credentials and DOMAINNAME
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to chown volumes to 3106:3202 (svc-app-immich:private-photos)
      - DAC_OVERRIDE # Required to open /upload for recursive chown — it is a bind-mount owned by
      # truenas_admin:truenas_admin 770, so UID 0 has no permissions without this cap
    read_only: true
    command:
      - "sh"
      - "-c"
      - "chown 3106:3202 /usr/src/app/upload /model-cache 2>/dev/null || true && /templates/envsubst.sh"
    volumes:
      - /mnt/archive-pool/private/photos/immich:/usr/src/app/upload
      - ./data/model-cache:/model-cache
      - ./config:/templates:ro
      - ./data:/output

  # Immich server is a standard Node.js application (not s6-overlay).
  # It runs as non-root and supports user: directly.
  # Hardware transcoding is enabled via the quicksync extends profile.
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.6.3@sha256:0cc1f82953d9598eb9e9dd11cbde1f50fe54f9c46c4506b089e8ad7bfc9d1f0c
    container_name: immich-server
    depends_on:
      immich-init:
        condition: service_completed_successfully
      immich-db:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    extends:
      file: ./config/hwaccel.transcoding.yml
      service: quicksync # set to one of [cpu, nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=immich
      - DB_DATABASE_NAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - REDIS_HOSTNAME=immich-redis
      - REDIS_PASSWORD=${IMMICH_REDIS_PASSWORD}
      # Trust X-Forwarded-For from Traefik (Docker bridge networks are auto-assigned in 172.16.0.0/12)
      - IMMICH_TRUSTED_PROXIES=172.16.0.0/12
      # Config file path inside the container (processed by immich-config-init from config/immich.yaml)
      - IMMICH_CONFIG_FILE=/config/immich.yaml
    user: "3106:3202" # svc-app-immich:private-photos
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - immich-frontend
      - immich-backend
    # Recommended: https://docs.immich.app/install/requirements/
    mem_limit: ${MEM_LIMIT:-6144m}
    pids_limit: 200
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - /mnt/archive-pool/private/photos/immich:/usr/src/app/upload
      # Processed config file (written by immich-init envsubst, contains substituted secrets)
      - ./data/immich.yaml:/config/immich.yaml:ro
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:2283/api/server/ping"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      # Homepage
      - homepage.group=Productivity
      - homepage.name=Immich
      - homepage.icon=sh-immich
      - homepage.href=https://photos.${DOMAINNAME}
      - homepage.description=Photo Library
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=immich-frontend"
      ## HTTP Routers
      - "traefik.http.routers.immich-rtr.rule=Host(`photos.${DOMAINNAME}`)"
      - "traefik.http.routers.immich-rtr.entrypoints=https"
      ## Middlewares
      - "traefik.http.routers.immich-rtr.middlewares=chain-auth-immich@file"
      ## HTTP Services
      - "traefik.http.routers.immich-rtr.service=immich"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
      ## Mobile app endpoint — bypasses Traefik forward-auth (mobile uses Bearer tokens, not browser sessions)
      - "traefik.http.routers.immich-mobile-rtr.rule=Host(`photos-mobile.${DOMAINNAME}`)"
      - "traefik.http.routers.immich-mobile-rtr.middlewares=chain-no-auth-immich@file"
      - "traefik.http.routers.immich-mobile-rtr.service=immich"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.immich-monitor.rule=Host(`photos.${DOMAINNAME}`)"
      - "traefik.http.routers.immich-monitor.entrypoints=monitoring"
      - "traefik.http.routers.immich-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.immich-monitor.service=immich"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444/api/server/ping"
      - "gatus.headers.Host=photos.${DOMAINNAME}"
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'
      # Config hash — triggers container recreation when ./config changes
      - "config.sha256=${CONFIG_HASH:-}"

  # Immich machine learning is a standard Python application (not s6-overlay).
  # It runs as non-root and supports user: directly.
  # Hardware acceleration is enabled via the OpenVINO extends profile (Intel iGPU).
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.6.3-openvino@sha256:428b319762c5c0f39218162bd24cab38f48d369c580389e9897c8ab92807cf7a
    container_name: immich-machine-learning
    depends_on:
      immich-init:
        condition: service_completed_successfully
    extends:
      file: ./config/hwaccel.ml.yml
      service: openvino # set to one of [cpu, cuda, openvino, openvino-wsl] for accelerated ML inference
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - MPLCONFIGDIR=/tmp # matplotlib defaults to /.config/matplotlib which is on the read-only rootfs
      - HF_HOME=/cache # huggingface_hub writes to ~/.cache/huggingface which is on the read-only rootfs
      - HF_HUB_DISABLE_XET=1 # Xet storage backend writes temp files to read-only rootfs paths; use standard HTTP downloads
    user: "3106:3202" # svc-app-immich:private-photos
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - immich-frontend # Outbound internet required — downloads ML models from huggingface.co and modelscope.cn
      - immich-backend
    mem_limit: ${ML_MEM_LIMIT:-4096m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run # gunicorn 22+ control server creates a Unix socket here at startup
    volumes:
      - ./data/model-cache:/cache
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:3003/ping')"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  immich-redis:
    image: docker.io/valkey/valkey:9-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5
    container_name: immich-redis
    # requirepass via command because the REDIS_PASSWORD env var isn't picked up
    command: >
      --requirepass ${IMMICH_REDIS_PASSWORD}
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - immich-backend
    mem_limit: ${REDIS_MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required for Valkey's entrypoint to chown /data before dropping to valkey user
      - SETUID # Required for setpriv/gosu to drop from root to valkey user
      - SETGID # Required for setpriv/gosu to drop from root to valkey group
    read_only: true
    tmpfs:
      - /tmp
      - /data # Valkey data directory — ephemeral for Immich (used as cache only)
    healthcheck:
      test:
        - "CMD"
        - "valkey-cli"
        - "-a"
        - "${IMMICH_REDIS_PASSWORD}"
        - "--no-auth-warning"
        - "ping"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Immich's custom Postgres image bundles pgvecto.rs and vectorchord extensions.
  # Postgres starts as root and uses gosu to switch to the postgres user during
  # startup. cap_drop: ALL would break that privilege transition.
  # pgautoupgrade is NOT used — see database notes at top of file.
  immich-db:
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3-pgvector0.8.1@sha256:25bccbafc0354f53f9b9228be9ca18f015b58ba5593d117c2b9a270f333b170b
    container_name: immich-db
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - POSTGRES_DB=immich
      - POSTGRES_USER=immich
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--data-checksums
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - immich-backend
    # Recommended: https://docs.immich.app/install/requirements/
    mem_limit: ${DB_MEM_LIMIT:-2048m}
    pids_limit: 100
    shm_size: 128mb
    security_opt:
      - no-new-privileges=true
    # TODO: [immich] Test if read_only + tmpfs for /tmp and /run works with this image
    # Currently it doesn't: `cp: cannot create regular file '/etc/postgresql/postgresql.conf': Read-only file system`
    # read_only: true
    # tmpfs:
    #   - /tmp
    #   - /run
    volumes:
      - ./data/db:/var/lib/postgresql
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # postgres_exporter — exposes immich-db metrics on :9187 for Alloy to scrape.
  # Joins immich-backend only; metrics are reachable only by services already
  # on immich-backend (the app, the DB, and Alloy once it joins this network).
  # The official quay.io/prometheuscommunity/postgres-exporter image is built
  # FROM scratch and ships only the static binary — no shell, no wget/curl, so
  # `disable: true` is the only viable healthcheck (mirrors the Alloy pattern).
  immich-db-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1@sha256:e96064f876226d94bb6ce48a4c4b3dd76edba91168ec1ab024e5c4b959310b0f
    container_name: immich-db-exporter
    depends_on:
      immich-db:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - DATA_SOURCE_NAME=postgresql://immich:${IMMICH_DB_PASSWORD}@immich-db:5432/immich?sslmode=disable
    # Point --config.file at /dev/null (always present in the container's /dev,
    # parses as empty YAML) so the exporter does not log a startup warning
    # about the missing optional auth_modules config. This deployment uses a
    # single DATA_SOURCE_NAME, so no auth_modules config is needed.
    command:
      - --config.file=/dev/null
    user: "65534:65534" # nobody:nogroup
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - immich-backend
    mem_limit: ${DB_EXPORTER_MEM_LIMIT:-128m}
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    healthcheck:
      # postgres-exporter image is built FROM scratch — no shell, no probe
      # utilities. Liveness is monitored externally via Alloy's scrape error
      # rate; a stuck exporter shows up as `up{job="postgres_immich"}=0`.
      disable: true

  # tiredofit/db-backup uses s6-overlay which must start as root.
  # It handles user switching internally via USER_DBBACKUP/GROUP_DBBACKUP.
  # read_only is not set because s6-overlay needs extensive writable paths.
  # MODE=MANUAL + MANUAL_RUN_FOREVER=FALSE makes the container run one backup
  # and exit cleanly. The nightly CD script (dccd.sh) starts it fresh each run.
  immich-db-backup:
    image: docker.io/tiredofit/db-backup:4.1.100@sha256:78e3cb669ee9648c1a4ab7e8421c6e89d01b659bfa5963f7611a2347b2009eab
    container_name: immich-db-backup
    depends_on:
      immich-db:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    command:
      - "backup-now"
    environment:
      - USER_DBBACKUP=${PUID:-1000}
      - GROUP_DBBACKUP=${PGID:-1000}
      - CONTAINER_NAME=immich-db-backup
      - CONTAINER_ENABLE_MONITORING=FALSE
      - CONTAINER_ENABLE_SCHEDULING=FALSE
      # Run once and exit — restarted nightly by dccd.sh
      - MODE=MANUAL
      - MANUAL_RUN_FOREVER=FALSE
      # Notification settings
      - ENABLE_NOTIFICATIONS=TRUE
      - NOTIFICATION_TYPE=EMAIL
      - SMTP_HOST=${NOTIFICATIONS_EMAIL_HOST}
      - SMTP_DOMAIN=${NOTIFICATIONS_EMAIL_DOMAIN}
      - SMTP_PORT=${NOTIFICATIONS_EMAIL_PORT}
      - SMTP_USER=${NOTIFICATIONS_EMAIL_USERNAME}
      - SMTP_PASS=${NOTIFICATIONS_EMAIL_PASSWORD}
      - MAIL_TO=${NOTIFICATIONS_EMAIL_TO}
      - MAIL_FROM=${NOTIFICATIONS_EMAIL_FROM}
      - SMTP_AUTHENTICATION=on
      - SMTP_TLSCERTCHECK=TRUE
      - SMTP_STARTTLS=on
      - SMTP_TLS=on
      # Backup defaults
      - DEFAULT_CHECKSUM=SHA1
      - DEFAULT_COMPRESSION=ZSTD
      - DEFAULT_CLEANUP_TIME=2880
      # Encryption
      - DEFAULT_ENCRYPT=TRUE
      - DEFAULT_ENCRYPT_PASSPHRASE=${DB_ENC_PASSPHRASE}
      # Database
      - DB01_TYPE=pgsql
      - DB01_HOST=immich-db
      - DB01_NAME=immich
      - DB01_USER=immich
      - DB01_PORT=5432
      - DB01_PASS=${IMMICH_DB_PASSWORD}
    restart: "no"
    networks:
      - immich-backend
    mem_limit: ${BACKUP_MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    volumes:
      - ./backups/db-backup:/backup

networks:
  immich-frontend:
    name: immich-frontend
    driver: bridge
  immich-backend:
    name: immich-backend
    driver: bridge
    internal: true
