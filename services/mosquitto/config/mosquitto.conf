# Mosquitto MQTT Broker Configuration
# See: https://mosquitto.org/man/mosquitto-conf-5.html

# Persistence — retain messages across restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type warning
log_type error
log_type notice
connection_messages true

# Listener — MQTT on port 1883 (unencrypted, internal/LAN only)
listener 1883

# Authentication — anonymous access allowed since Mosquitto is only reachable
# on the internal iot-backend Docker network and published to the LAN.
# To add password authentication:
#   1. docker exec -it mosquitto mosquitto_passwd -c /mosquitto/data/password_file <user>
#   2. Set: allow_anonymous false
#   3. Set: password_file /mosquitto/data/password_file
#   4. Restart the container
allow_anonymous true
