---
services:
  # Sets ownership on ./data so the non-root mosquitto container (UID 3122)
  # can write persistent MQTT data. Runs once, then exits.
  mosquitto-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: mosquitto-init
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to chown ./data to 3122:3122
      - DAC_OVERRIDE # Required to write to ZFS-mounted volumes as root
    read_only: true
    command:
      - "sh"
      - "-c"
      - |-
        mkdir -p /data/data /data/log /data/config &&
        cp /templates/mosquitto.conf /data/config/mosquitto.conf &&
        chown -Rv 3122:3122 /data || true
    volumes:
      - ./config:/templates:ro
      - ./data:/data

  mosquitto:
    # Docker Hub Hardened Image — requires `docker login dhi.io` (free with Docker Hub account).
    # Runs as nonroot (UID 65532) by default; overridden to 3122:3122 via user: below.
    # Hardened variant is 2.0.22 (latest hardened build); upstream is at 2.1.x.
    # Entrypoint: /usr/sbin/mosquitto (no shell — health check uses CMD, not CMD-SHELL).
    image: dhi.io/eclipse-mosquitto:2.0.22-debian13@sha256:2a9284050330df790a8633ed0241db1288e0843c8092f954e7fe1377b3da1d77
    container_name: mosquitto
    depends_on:
      mosquitto-init:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    user: "3122:3122" # svc-app-mosquitto
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      mosquitto-frontend:
      iot-backend:
    ports:
      - "1883:1883" # MQTT — accessible from LAN for IoT devices
    mem_limit: ${MEM_LIMIT:-256m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/data:/mosquitto/data
      - ./data/log:/mosquitto/log
    healthcheck:
      # CMD format required — hardened image has no shell (no CMD-SHELL).
      # $$SYS becomes literal $SYS after Compose variable expansion, which is passed
      # directly to mosquitto_sub as the MQTT topic string ($SYS/broker/uptime).
      test:
        - "CMD"
        - "/usr/bin/mosquitto_sub"
        - "-t"
        - "$$SYS/broker/uptime"
        - "-C"
        - "1"
        - "-W"
        - "5"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      # Homepage
      - homepage.group=IoT
      - homepage.name=Mosquitto
      - homepage.icon=mqtt.svg
      - homepage.description=MQTT broker for IoT devices

networks:
  mosquitto-frontend:
    name: mosquitto-frontend
    driver: bridge
    # NOT internal — required for Docker to publish port 1883 to the host.
    # iot-backend is internal:true, so a second non-internal network is needed.
  iot-backend:
    name: iot-backend
    external: true
