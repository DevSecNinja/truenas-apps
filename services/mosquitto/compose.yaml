---
services:
  # Sets ownership on ./data so the non-root mosquitto container (UID 3122)
  # can write persistent MQTT data. Runs once, then exits.
  mosquitto-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: mosquitto-init
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to chown ./data to 3122:3122
      - DAC_OVERRIDE # Required to write to ZFS-mounted volumes as root
    read_only: true
    command:
      - "sh"
      - "-c"
      - |-
        mkdir -p /data/data /data/log /data/config &&
        cp /templates/mosquitto.conf /data/config/mosquitto.conf &&
        chown -Rv 3122:3122 /data || true
    volumes:
      - ./config:/templates:ro
      - ./data:/data

  mosquitto:
    image: docker.io/library/eclipse-mosquitto:2.1.2-alpine@sha256:a908c65cc8e67ec9d292ef27c2c0360dbaaee7eb1b935cdd194e67697f15dea1
    container_name: mosquitto
    depends_on:
      mosquitto-init:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    user: "3122:3122" # svc-app-mosquitto
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      mosquitto-frontend:
      iot-backend:
    mem_limit: ${MEM_LIMIT:-256m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/data:/mosquitto/data
      - ./data/log:/mosquitto/log
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 5 || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      # Homepage
      - homepage.group=IoT
      - homepage.name=Mosquitto
      - homepage.icon=mqtt.svg
      - homepage.description=MQTT broker for IoT devices
      # Traefik — TCP router for MQTT (plain TCP, no TLS → HostSNI(*) required)
      - "traefik.enable=true"
      - "traefik.docker.network=mosquitto-frontend"
      - "traefik.tcp.routers.mosquitto-tcp.entrypoints=mqtt"
      - "traefik.tcp.routers.mosquitto-tcp.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.mosquitto-tcp.service=mosquitto-tcp-svc"
      - "traefik.tcp.services.mosquitto-tcp-svc.loadbalancer.server.port=1883"

networks:
  mosquitto-frontend:
    name: mosquitto-frontend
    driver: bridge
    # internal: true — Traefik routes TCP port 1883 to Mosquitto via this network.
    # Mosquitto no longer publishes any host ports; all inbound MQTT traffic enters
    # through Traefik's mqtt entrypoint. iot-backend remains the path for IoT
    # service-to-service communication.
    internal: true
  iot-backend:
    name: iot-backend
    external: true
