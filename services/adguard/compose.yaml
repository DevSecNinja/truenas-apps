---
services:
  # Runs once at startup to substitute ${VAR} placeholders in unbound config
  # templates with actual values from secret.sops.env, then exits.
  adguard-unbound-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: adguard-unbound-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to change ownership of output files to svc-app-adguard
      - DAC_OVERRIDE # Required to overwrite existing output files regardless of their permissions
    read_only: true
    command:
      - "sh"
      - "-c"
      - |
        /templates/envsubst.sh
        chown -Rv 3101:3101 /output
    volumes:
      - ./config/unbound:/templates:ro
      - ./data/unbound:/output
    tmpfs:
      - /tmp

  # Redis is used as a persistent DNS cache backend for Unbound (cachedb module).
  # Internal network only — no external exposure. Ephemeral: --save "" disables
  # RDB snapshots so read_only: true is safe. Cache is lost on Redis restart but
  # survives Unbound restarts, which is the primary goal (warm cache across deploys).
  # The madnuttah/unbound image is built with --with-libhiredis (Redis support).
  adguard-redis:
    # Docker Hub Hardened Image — requires `docker login dhi.io` (free with Docker Hub account).
    # Same Redis version (8.6.2) as the previous alpine variant; runs as nonroot (UID 65532).
    image: dhi.io/redis:8.6.2-debian13@sha256:3f877f99e20fb4584c3170fd92b29cc45f13fb0328fea7a27bfbc375719af490
    container_name: adguard-redis
    # --save "" disables RDB snapshots — Redis is used only as an ephemeral DNS
    # cache backend for Unbound. No persistence required; read_only: true is safe.
    # --tcp-keepalive 60 sends TCP keepalive probes every 60 s so the kernel
    # refreshes idle connections; without it the connection goes stale after ~2 h
    # and the next cachedb command fails with EAGAIN before Unbound reconnects.
    command:
      - "--save"
      - ""
      - "--tcp-keepalive"
      - "60"
    env_file:
      - path: ../shared/env/tz.env
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - adguard-backend
    mem_limit: ${REDIS_MEM_LIMIT:-128m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        - "CMD"
        - "redis-cli"
        - "ping"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  adguard-unbound:
    # Validate config with: docker exec adguard-unbound unbound-checkconf
    image: docker.io/madnuttah/unbound:1.24.2-1@sha256:47fdc01759f661b6ac3d63b6e6f1e073e6b71617a37c419624e8a3cb82534b2e
    container_name: adguard-unbound
    depends_on:
      adguard-unbound-init:
        condition: service_completed_successfully
      adguard-redis:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      UNBOUND_UID: 3101
      UNBOUND_GID: 3101
    # No user: — entrypoint starts as root, chowns dirs to UNBOUND_UID:UNBOUND_GID,
    # then drops privileges internally. Setting user: externally breaks that.
    # read_only is not set: image writes pidfile and auth-zone data under
    # /usr/local/unbound/ during startup.
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      adguard-frontend:
        ipv4_address: 172.30.53.2
      adguard-backend:
    mem_limit: ${UNBOUND_MEM_LIMIT:-512m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required for entrypoint to chown dirs to UNBOUND_UID:UNBOUND_GID
      - SETUID # Required to drop from root to _unbound user
      - SETGID # Required to drop from root to _unbound group
    tmpfs:
      - /tmp
    volumes:
      - ./data/unbound/conf.d/a-records.conf:/usr/local/unbound/conf.d/a-records.conf:ro
      - ./data/unbound/conf.d/server-overrides.conf:/usr/local/unbound/conf.d/server-overrides.conf:ro
      - ./config/unbound/conf.d/cachedb.conf:/usr/local/unbound/conf.d/cachedb.conf:ro
      - ./config/unbound/conf.d/remote-control.conf:/usr/local/unbound/conf.d/remote-control.conf:ro
      - ./data/unbound/zones.d/forward-zones.conf:/usr/local/unbound/zones.d/forward-zones.conf:ro
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    healthcheck:
      # 1. Resolves the canary record from conf.d/a-records.conf — proves unbound is
      #    running, the config was loaded, and envsubst substituted ${DOMAINNAME}.
      # 2. Resolves an external domain — proves forward zones and upstream TLS work.
      test:
        - "CMD-SHELL"
        - "drill -p 5335 @127.0.0.1 healthcheck.${DOMAINNAME} | grep -q 'rcode: NOERROR' && drill -p 5335 @127.0.0.1 dns.quad9.net
          | grep -q 'rcode: NOERROR'"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Selectively flushes Unbound's cache for the internal domain on every deploy.
  # Clears stale entries (e.g. cached NXDOMAIN for newly added local-data records)
  # without wiping the Redis-backed external DNS cache.
  # Uses network_mode: service to reach Unbound's localhost-only control socket.
  adguard-unbound-flush:
    image: docker.io/madnuttah/unbound:1.24.2-1@sha256:47fdc01759f661b6ac3d63b6e6f1e073e6b71617a37c419624e8a3cb82534b2e
    container_name: adguard-unbound-flush
    depends_on:
      adguard-unbound:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    network_mode: "service:adguard-unbound"
    restart: "no"
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    entrypoint:
      - "/bin/sh"
      - "-c"
    command:
      - "unbound-control -c /usr/local/unbound/conf.d/remote-control.conf flush_zone ${DOMAINNAME}"
    volumes:
      - ./config/unbound/conf.d/remote-control.conf:/usr/local/unbound/conf.d/remote-control.conf:ro
    tmpfs:
      - /tmp

  # Sets ownership on the adguard-data volume and data/conf directory so the
  # non-root adguard container can write to them. Always overwrites
  # AdGuardHome.yaml from the repo config — the repo is the source of truth.
  # The UI is treated as read-only; any UI changes will be lost on next deploy.
  adguard-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: adguard-init
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to change file ownership
      - DAC_OVERRIDE # Required to traverse directories previously chowned to ${PUID}:${PGID}
    read_only: true
    command:
      - "sh"
      - "-c"
      - |
        cp /seed/AdGuardHome.yaml /opt/adguardhome/conf/AdGuardHome.yaml
        echo 'Applied AdGuardHome.yaml from repo config'
        chown -Rv 3101:3101 /opt/adguardhome/work /opt/adguardhome/conf
    volumes:
      - ./data/work:/opt/adguardhome/work
      - ./data/conf:/opt/adguardhome/conf
      - ./config/conf/AdGuardHome.yaml:/seed/AdGuardHome.yaml:ro

  adguard:
    image: docker.io/adguard/adguardhome:v0.107.73@sha256:7fbf01d73ecb7a32d2d9e6cef8bf88e64bd787889ca80a1e8bce30cd4c084442
    container_name: adguard
    depends_on:
      adguard-init:
        condition: service_completed_successfully
      adguard-unbound-flush:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    user: "3101:3101" # svc-app-adguard
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      adguard-frontend:
        ipv4_address: 172.30.53.3
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # TODO: [adguard] Implement DNS over TLS with TLS certificate
      # - "853:853/tcp"
    mem_limit: ${MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # Required to bind DNS on port 53/853
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data/work:/opt/adguardhome/work
      - ./data/conf:/opt/adguardhome/conf
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:80"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=AdGuard
      - homepage.icon=adguard-home.svg
      - homepage.href=https://adguard.${DOMAINNAME}
      - homepage.description=DNS Service
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=adguard-frontend"
      ## HTTP Routers
      - "traefik.http.routers.adguard-rtr.rule=Host(`adguard.${DOMAINNAME}`)"
      - "traefik.http.routers.adguard-rtr.entrypoints=https"
      ## Middlewares
      - "traefik.http.routers.adguard-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.adguard-rtr.service=adguard"
      - "traefik.http.services.adguard.loadbalancer.server.port=80"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.adguard-monitor.rule=Host(`adguard.${DOMAINNAME}`)"
      - "traefik.http.routers.adguard-monitor.entrypoints=monitoring"
      - "traefik.http.routers.adguard-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.adguard-monitor.service=adguard"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444"
      - "gatus.headers.Host=adguard.${DOMAINNAME}"
      - 'gatus.client={"ignore-redirect": true}'
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  adguard-frontend:
    name: adguard-frontend
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.53.0/24
  adguard-backend:
    name: adguard-backend
    driver: bridge
    internal: true
