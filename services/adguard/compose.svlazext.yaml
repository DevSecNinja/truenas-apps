---
# Server-specific compose override for svlazext (Azure DNS/VPN VM, arm64).
# Applied automatically by dccd.sh -S svlazext on top of compose.yaml.
#
# Overrides:
# - Labels: adjusts dashboard hostname for the svlazext instance
# - Image: drops the DHI digest pin for redis. Renovate captures DHI digests
#   from an amd64 runner, which are per-platform manifest digests rather
#   than multi-arch manifest-list digests. Pulling those by digest forces
#   amd64 even on arm64 hosts (svlazext is arm64), producing emulated
#   binaries that fail healthchecks. Using the tag without digest lets
#   Docker resolve via the manifest list to the correct arch. The DHI
#   tag itself remains version-pinned, so reproducibility is preserved
#   at the tag level (only the immutable digest pin is dropped).
services:
  adguard-redis:
    image: dhi.io/redis:8.6.2-debian13
  adguard:
    labels: !override
      - homepage.group=Infrastructure
      - homepage.name=AdGuard (svlazext)
      - homepage.icon=adguard-home.svg
      - homepage.href=https://adguard-ext.${DOMAINNAME}
      - homepage.description=DNS Service (svlazext)
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=adguard-frontend"
      ## HTTP Routers
      - "traefik.http.routers.adguard-rtr.rule=Host(`adguard-ext.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.adguard-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.adguard-rtr.service=adguard"
      - "traefik.http.services.adguard.loadbalancer.server.port=80"
