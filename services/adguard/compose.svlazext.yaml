---
# Server-specific compose override for svlazext (Azure DNS/VPN VM).
# Applied automatically by dccd.sh -S svlazext on top of compose.yaml.
#
# Overrides:
# - Labels: adjusts dashboard hostname for the svlazext instance
services:
  adguard:
    labels: !override
      - homepage.group=Infrastructure
      - homepage.name=AdGuard (svlazext)
      - homepage.icon=adguard-home.svg
      - homepage.href=https://adguard-ext.${DOMAINNAME}
      - homepage.description=DNS Service (svlazext)
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=adguard-frontend"
      ## HTTP Routers
      - "traefik.http.routers.adguard-rtr.rule=Host(`adguard-ext.${DOMAINNAME}`)"
      - "traefik.http.routers.adguard-rtr.entrypoints=https"
      ## Middlewares
      - "traefik.http.routers.adguard-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.adguard-rtr.service=adguard"
      - "traefik.http.services.adguard.loadbalancer.server.port=80"
      ## TCP Router for DNS-over-TCP (plain TCP, no TLS → HostSNI(*) required)
      - "traefik.tcp.routers.adguard-dns-tcp.entrypoints=dns-tcp"
      - "traefik.tcp.routers.adguard-dns-tcp.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.adguard-dns-tcp.service=adguard-dns-tcp-svc"
      - "traefik.tcp.services.adguard-dns-tcp-svc.loadbalancer.server.port=53"
      ## UDP Router for DNS-over-UDP (no rule — UDP routers map entrypoint → service)
      - "traefik.udp.routers.adguard-dns-udp.entrypoints=dns-udp"
      - "traefik.udp.routers.adguard-dns-udp.service=adguard-dns-udp-svc"
      - "traefik.udp.services.adguard-dns-udp-svc.loadbalancer.server.port=53"
