---
http:
  pprof:
    port: 6060
    enabled: false
  address: 0.0.0.0:80
  session_ttl: 720h
users: []
auth_attempts: 5
block_auth_min: 15
http_proxy: ""
language: en
theme: auto
dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  anonymize_client_ip: false
  ratelimit: 100
  ratelimit_subnet_len_ipv4: 24
  ratelimit_subnet_len_ipv6: 56
  ratelimit_whitelist: []
  refuse_any: true
  # TODO: [adguard] Enable support for IPv6
  upstream_dns:
    - udp://adguard-unbound:5335
  upstream_dns_file: ""
  bootstrap_dns:
    - 127.0.0.11
  # IP-literal DoH URLs avoid bootstrap DNS lookups
  fallback_dns:
    - https://9.9.9.9/dns-query
    - https://149.112.112.112/dns-query
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
  upstream_mode: load_balance
  fastest_timeout: 1s
  allowed_clients: []
  disallowed_clients: []
  blocked_hosts:
    - version.bind
    - id.server
    - hostname.bind
  trusted_proxies:
    - 127.0.0.0/8
    - ::1/128
  cache_enabled: false
  cache_size: 4194304
  cache_ttl_min: 0
  cache_ttl_max: 0
  cache_optimistic: false
  cache_optimistic_answer_ttl: 30s
  cache_optimistic_max_age: 12h
  bogus_nxdomain: []
  aaaa_disabled: false
  enable_dnssec: true
  edns_client_subnet:
    custom_ip: ""
    enabled: false
    use_custom: false
  max_goroutines: 300
  handle_ddr: true
  ipset: []
  ipset_file: ""
  bootstrap_prefer_ipv6: false
  upstream_timeout: 5s
  private_networks: []
  use_private_ptr_resolvers: true
  local_ptr_upstreams:
    - 192.168.1.1
  use_dns64: false
  dns64_prefixes: []
  serve_http3: false
  use_http3_upstreams: false
  serve_plain_dns: true
  hostsfile_enabled: true
  pending_requests:
    enabled: true
tls:
  enabled: false
  server_name: ""
  force_https: false
  port_https: 443
  port_dns_over_tls: 853
  port_dns_over_quic: 853
  port_dnscrypt: 0
  dnscrypt_config_file: ""
  allow_unencrypted_doh: false
  certificate_chain: ""
  private_key: ""
  certificate_path: ""
  private_key_path: ""
  strict_sni_check: false
querylog:
  dir_path: ""
  ignored: []
  interval: 720h
  size_memory: 1000
  enabled: true
  ignored_enabled: false
  file_enabled: true
# NOTE: On less performant hardware, consider reducing statistics.interval to 24h
statistics:
  dir_path: ""
  ignored: []
  interval: 720h
  enabled: true
  ignored_enabled: false
filters:
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
    name: AdGuard DNS filter
    id: 1
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
    name: AdAway Default Blocklist
    id: 2
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_42.txt
    name: ShadowWhisperer's Malware List
    id: 3

  # ---------------------------------------------------------------------------
  # Stage 1 — Security (threat intelligence, phishing, malware, DNS attacks)
  # Recommended to enable first. Low false-positive risk.
  # ---------------------------------------------------------------------------
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_44.txt
    name: HaGeZi's Threat Intelligence Feeds
    id: 4
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_11.txt
    name: Malicious URL Blocklist (URLHaus)
    id: 5
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_18.txt
    name: Phishing Army
    id: 6
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_30.txt
    name: Phishing URL Blocklist (PhishTank and OpenPhish)
    id: 7
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_10.txt
    name: Scam Blocklist by DurableNapkin
    id: 8
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_8.txt
    name: NoCoin Filter List
    id: 9

# ---------------------------------------------------------------------------
# Stage 2 — Ad & tracker blocking (general)
# Enable after Stage 1 is stable. Monitor for false positives.
# ---------------------------------------------------------------------------
# - enabled: true
#   url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_5.txt
#   name: OISD Blocklist Small
#   id: 12
# - enabled: true
#   url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_34.txt
#   name: HaGeZi's Normal Blocklist
#   id: 13
# - enabled: true
#   url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_3.txt
#   name: Peter Lowe's Blocklist
#   id: 14
# - enabled: true
#   url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_59.txt
#   name: AdGuard DNS Popup Hosts filter
#   id: 15
# - enabled: true
#   url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_69.txt
#   name: ShadowWhisperer Tracking List
#   id: 16

# ---------------------------------------------------------------------------
# Stage 3 — Device-specific tracker blocklists (optional)
# Only enable for devices/platforms present on your network.
# ---------------------------------------------------------------------------
# - enabled: true
#   url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_63.txt
#   name: HaGeZi's Windows/Office Tracker Blocklist
#   id: 17
# - enabled: true
#   url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_67.txt
#   name: HaGeZi's Apple Tracker Blocklist
#   id: 18
# - enabled: true
#   url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_7.txt
#   name: Perflyst and Dandelion Sprout's Smart-TV Blocklist
#   id: 19

whitelist_filters: []
user_rules:
  - '@@||api.ipify.org^$important'
  - '@@||login.windows.net^$important'
  - /(^|\.)xn--/
  - '# Block Tweakers ads after DPG Media takeover.'
  - '||aa.tweakers.nl^$important'
  - '||ab.tweakers.nl^$important'
  - '# Security: prevent WPAD lookups, ref: DEF CON 32 2024.'
  - '||wpad^$important'
  - '||wpad.*^$important'
dhcp:
  enabled: false
  interface_name: ""
  local_domain_name: lan
  dhcpv4:
    gateway_ip: ""
    subnet_mask: ""
    range_start: ""
    range_end: ""
    lease_duration: 86400
    icmp_timeout_msec: 1000
    options: []
  dhcpv6:
    range_start: ""
    lease_duration: 86400
    ra_slaac_only: false
    ra_allow_slaac: false
filtering:
  blocking_ipv4: ""
  blocking_ipv6: ""
  blocked_services:
    schedule:
      time_zone: Europe/Amsterdam
    ids:
      - qq
      - telegram
      - vk
      - 500px
      - 9gag
      - bilibili
      - clubhouse
      - crunchyroll
      - dailymotion
      - deezer
      - disneyplus
      - douban
      - ebay
      - facebook
      - flickr
      - gog
      - hulu
      - instagram
      - iqiyi
      - kakaotalk
      - kik
      - lazada
      - leagueoflegends
      - line
      - mail_ru
      - minecraft
      - nintendo
      - ok
      - onlyfans
      - pinterest
      - playstation
      - rakuten_viki
      - riot_games
      - roblox
      - shopee
      - snapchat
      - tidal
      - tiktok
      - valorant
      - viber
      - vimeo
      - voot
      - wechat
      - weibo
      - zhihu
  protection_disabled_until: null
  safe_search:
    enabled: false
    bing: true
    duckduckgo: true
    ecosia: true
    google: true
    pixabay: true
    yandex: true
    youtube: true
  blocking_mode: default
  parental_block_host: family-block.dns.adguard.com
  safebrowsing_block_host: standard-block.dns.adguard.com
  rewrites:
    - domain: www.bing.com
      answer: nochat.bing.com
      enabled: true
    - domain: copilot.microsoft.com
      answer: cdp.copilot.microsoft.com
      enabled: true
  safe_fs_patterns:
    - /opt/adguardhome/work/data/userfilters/*
  safebrowsing_cache_size: 1048576
  safesearch_cache_size: 1048576
  parental_cache_size: 1048576
  cache_time: 30
  filters_update_interval: 24
  blocked_response_ttl: 10
  filtering_enabled: true
  rewrites_enabled: true
  parental_enabled: false
  safebrowsing_enabled: true
  protection_enabled: true
clients:
  runtime_sources:
    whois: true
    arp: true
    rdns: true
    dhcp: true
    hosts: true
  persistent: []
log:
  enabled: true
  file: ""
  max_backups: 3
  max_size: 100
  max_age: 3
  compress: true
  local_time: false
  verbose: false
os:
  group: ""
  user: ""
  rlimit_nofile: 0
schema_version: 33
