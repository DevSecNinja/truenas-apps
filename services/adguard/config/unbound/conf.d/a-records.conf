# Unbound A record template — variables are substituted at container startup
# by the adguard-unbound-init service (see compose.yaml).
# Loaded via include-toplevel: in unbound.conf — must start a clause.

server:
    # Healthcheck canary — verifies envsubst ran and config was loaded
    local-data: "healthcheck.${DOMAINNAME} A 127.0.0.1"

    # Security: prevent WPAD lookups, ref: DEF CON 32 2024.
    local-zone: "wpad" static
    local-data: "wpad A 127.0.0.1"

    # A Record
    ## SVLDEV
    local-data: "SVLDEV.${DOMAINNAME} A ${IP_SVLDEV}"
    ## SVLNAS
    local-data: "SVLNAS.${DOMAINNAME} A ${IP_SVLNAS}"
    ## SVLAPPS
    local-data: "SVLAPPS.${DOMAINNAME} A ${IP_SVLAPPS}"
    ## SVLMEDIA
    local-data: "SVLMEDIA.${DOMAINNAME} A ${IP_SVLMEDIA}"
    ## SVLAZEXT
    local-data: "svlazext.${DOMAINNAME} A ${IP_SVLAZEXT}"
    ## SVLAZEXTPUB
    local-data: "svlazextpub.${DOMAINNAME} A ${IP_SVLAZEXTPUB}"
    ## SVLDMZ
    local-data: "SVLDMZ.${DOMAINNAME} A ${IP_SVLDMZ}"

    ## Home
    local-data: "home.${DOMAINNAME} A ${IP_HOME}"
    local-data: "proxy.${DOMAINNAME} A ${IP_HOME}"
    local-data: "receiver.${DOMAINNAME} A ${IP_HOME}"
    local-data: "shelly1.${DOMAINNAME} A ${IP_HOME}"
    local-data: "shelly2.${DOMAINNAME} A ${IP_HOME}"
    local-data: "shelly3.${DOMAINNAME} A ${IP_HOME}"

    # TODO: [unbound] Dynamically generate list of records to create
    ## Apps
    ### External
    local-data: "adguard-ext.${DOMAINNAME} A ${IP_SVLAZEXT}"
    local-data: "auth-ext.${DOMAINNAME} A ${IP_SVLAZEXT}"
    local-data: "echo-dmz.${DOMAINNAME} A ${IP_SVLDMZ}"
    local-data: "traefik-dmz.${DOMAINNAME} A ${IP_SVLDMZ}"
    local-data: "traefik-ext.${DOMAINNAME} A ${IP_SVLAZEXT}"

    ### Internal
    local-data: "adguard.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "apps.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "auth-apps.${DOMAINNAME} A ${IP_SVLAPPS}"
    local-data: "auth-media.${DOMAINNAME} A ${IP_SVLMEDIA}"
    local-data: "auth-prod.${DOMAINNAME} A ${IP_SVLPROD}"
    local-data: "auth.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "bazarr.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "chat.${DOMAINNAME} A ${IP_SVLAPPS}"
    local-data: "docs.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "dozzle.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "echo-apps.${DOMAINNAME} A ${IP_SVLAPPS}"
    local-data: "echo-media.${DOMAINNAME} A ${IP_SVLMEDIA}"
    local-data: "echo.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "excalidraw.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "home-assistant.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "homepage-proxy-apps.${DOMAINNAME} A ${IP_SVLAPPS}"
    local-data: "homepage-proxy-media.${DOMAINNAME} A ${IP_SVLMEDIA}"
    local-data: "lidarr.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "logs.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "metube.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "photos-mobile.${DOMAINNAME} A ${IP_SVLNAS}"
