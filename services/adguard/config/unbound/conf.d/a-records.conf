    local-data: "qbittorrent.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "radarr.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "sabnzbd.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "sonarr.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "spottarr.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "status.${DOMAINNAME} A ${IP_SVLNAS}"
    local-data: "traefik-apps.${DOMAINNAME} A ${IP_SVLAPPS}"
    local-data: "traefik-media.${DOMAINNAME} A ${IP_SVLMEDIA}"
