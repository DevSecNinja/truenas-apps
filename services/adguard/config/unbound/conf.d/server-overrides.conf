# Server-section overrides — logging and private-domain settings.
# Variables are substituted at container startup by adguard-unbound-init.
# Loaded via include-toplevel: in unbound.conf — must start a clause.

server:
    # Override logging defaults from unbound.conf (logfile: /dev/null, verbosity: 0).
    # Later values win over the main config.
    logfile: ""  # log to stderr → visible in docker logs
    verbosity: 1
    log-servfail: yes

    # Use system-default socket buffer sizes instead of the image default (4m).
    # Without elevated privileges or a larger net.core.wmem_max/rmem_max sysctl,
    # Unbound cannot grant 4m buffers and logs a startup warning. Setting 0 tells
    # Unbound to use whatever the OS has already configured.
    so-rcvbuf: 0
    so-sndbuf: 0

    # Enable the cachedb module for Redis-backed persistent DNS cache.
    # Default is "validator iterator"; cachedb sits between validator and iterator
    # to intercept cache misses and delegate storage to Redis.
    module-config: "validator cachedb iterator"

    private-domain: "${DOMAINNAME}"

    # Split-horizon: serve all ${DOMAINNAME} queries entirely from local-data.
    # Any name not in local-data returns NXDOMAIN; any record type not in
    # local-data for an existing name returns NODATA (NOERROR, empty answer).
    # This prevents Unbound from forwarding HTTPS/SVCB record queries (type 65)
    # for internal hostnames to upstream resolvers, which caused intermittent
    # SERVFAIL → "server misbehaving" errors in Gatus and other Go HTTP clients.
    local-zone: "${DOMAINNAME}." static
    # Exempt subdomains from the static zone so their forward-zones can resolve them
    local-zone: "v60.${DOMAINNAME}." transparent
    local-zone: "digitalsecurity.${DOMAINNAME}." transparent
    local-zone: "travel.${DOMAINNAME}." transparent

    # CA bundle for verifying upstream DoT certificates (not needed for recursive
    # resolution but kept for reference in case forward zones are re-enabled).
    # The madnuttah image is distroless (no system certs); the host bundle must be
    # bind-mounted read-only into the container if this is re-enabled.
    # tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

    # Silence the startup ZONEMD warning for the root auth zone.
    # The madnuttah image pre-configures an auth zone for "." that fetches the root
    # zone and validates it via ZONEMD. Verification fails because the DNSKEY RRset
    # cannot be verified against the trust anchor during early startup. Setting
    # zonemd-permissive-mode makes that failure a non-fatal notice rather than a
    # warning, keeping logs clean. The zone is still used normally.
    zonemd-permissive-mode: yes
