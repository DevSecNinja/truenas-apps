# Enable unbound-control for cache management (flush, reload, stats, etc.).
# Binds to 127.0.0.1 inside the container only — not exposed on any network.
# control-use-cert is disabled because the control socket is localhost-only;
# the flush sidecar reaches it via shared network namespace (network_mode: service).
# Loaded via include-toplevel: in unbound.conf — must start a clause.

remote-control:
    control-enable: yes
    control-use-cert: no
