# Forward zone template — variables are substituted at container startup
# by the adguard-unbound-init service (see compose.yaml).
# Loaded via include-toplevel: in unbound.conf — forward-zone is a top-level clause.

# No active forward zones — Unbound performs full recursive resolution from the
# root DNS servers using the built-in root hints. This avoids sending all queries
# to a single third-party upstream (e.g. Quad9 or Cloudflare over DNS-over-TLS),
# improving privacy and removing the dependency on external resolvers.

# forward-zone:
#     # Forwarding Kubernetes domain queries to a Kubernetes domain server
#     name: "${DOMAINNAME}"
#     forward-addr: ${IP_K8S_DNS}
