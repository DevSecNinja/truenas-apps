---
services:
  # jgraph/drawio is a stateless Jetty-based web application. It has no
  # persistent volumes and requires no init container — all writable paths are
  # covered by tmpfs mounts. The image does not support PUID/PGID env vars;
  # the process is launched under the hardcoded user: directive instead.
  drawio:
    image: docker.io/jgraph/drawio:29.6.10@sha256:e4a2690d57b6b108ae4673358754d6924b3348e1729d700d641b6dbf7b0aafaf
    container_name: drawio
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    user: "3119:3119" # svc-app-drawio
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - drawio-frontend
    mem_limit: ${MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      # Java / Jetty write temp and work files to /tmp at runtime
      - /tmp
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:8080"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      # Homepage
      - homepage.group=Productivity
      - homepage.name=Draw.io
      - homepage.icon=sh-draw-io
      - homepage.href=https://draw.${DOMAINNAME}
      - homepage.description=Flowchart & Diagram Maker
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=drawio-frontend"
      ## HTTP Routers
      - "traefik.http.routers.drawio-rtr.rule=Host(`draw.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.drawio-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.drawio-rtr.service=drawio"
      - "traefik.http.services.drawio.loadbalancer.server.port=8080"
      ## Monitoring (Gatus — no auth, internal entrypoint only)
      - "traefik.http.routers.drawio-monitor.rule=Host(`draw.${DOMAINNAME}`)"
      - "traefik.http.routers.drawio-monitor.entrypoints=monitoring"
      - "traefik.http.routers.drawio-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.drawio-monitor.service=drawio"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444"
      - "gatus.headers.Host=draw.${DOMAINNAME}"
      - 'gatus.client={"ignore-redirect": true}'
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  drawio-frontend:
    name: drawio-frontend
