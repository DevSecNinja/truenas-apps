---
services:
  # Sets ownership on the ./config directory and copies config.yaml into the
  # ./data/sidecar-config directory so the non-root gatus container can read it.
  # Runs once, then exits.
  # Docker Compose configs (non-swarm) are bind-mounted from the host, so host
  # file permissions apply. An init container avoids that limitation.
  # Config files are set to group-write (775/664) so truenas_admin (member of
  # group 3103) can git-pull without permission conflicts.
  gatus-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: gatus-init
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Required to change file ownership
      - FOWNER # Required to chmod files after chown transfers ownership away from root
      - DAC_OVERRIDE # Required to traverse and read host files with restrictive permissions
    read_only: true
    command:
      - "sh"
      - "-c"
      - |-
        chown -Rv 3103:3103 /config-src &&
        find /config-src -type d -exec chmod 775 {} + &&
        find /config-src -type f -exec chmod 664 {} + &&
        cp /config-src/config.yaml /config/config.yaml &&
        chown 3103:3103 /config/config.yaml &&
        chmod 644 /config/config.yaml
    volumes:
      - ./config:/config-src
      - ./data/sidecar-config:/config

  gatus:
    image: docker.io/twinproduction/gatus:v5.35.0@sha256:21609f31be8c4e680ce3004b24276305666239c99aff58391503f3fb6142f39d
    container_name: gatus
    depends_on:
      gatus-init:
        condition: service_completed_successfully
      gatus-db:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    user: "3103:3103" # svc-app-gatus
    environment:
      # Database
      - DB_ENGINE=postgres
      - DB_DATABASE=gatus
      - DB_USER=gatus
      - DB_PASSWORD=${GATUS_DB_PASSWORD}
      - DB_HOST=gatus-db
      - DB_PORT=5432
      # Gatus
      - GATUS_CONFIG_PATH=/config
    restart: always
    networks:
      - gatus-frontend
      - gatus-backend
    mem_limit: ${MEM_LIMIT:-500m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data/sidecar-config:/config
    # TODO: [gatus] Healthcheck currently not supported
    # Issue: https://github.com/TwiN/gatus/issues/711
    # healthcheck:
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Gatus
      - homepage.icon=gatus.svg
      - homepage.href=https://status.${DOMAINNAME}
      - homepage.description=Uptime Monitoring
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=gatus-frontend"
      ## HTTP Routers
      - "traefik.http.routers.gatus-rtr.rule=Host(`status.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.gatus-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services
      - "traefik.http.routers.gatus-rtr.service=gatus"
      - "traefik.http.services.gatus.loadbalancer.server.port=8080"
      ## Disable automatic monitoring with Gatus since ... this is Gatus!
      - "gatus.enabled=false"

  # Postgres starts as root and uses gosu to switch to the postgres user during
  # startup. cap_drop: ALL would break that privilege transition.
  gatus-db:
    image: docker.io/library/postgres:18.3-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    container_name: gatus-db
    depends_on:
      gatus-db-upgrade:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - POSTGRES_DB=gatus
      - POSTGRES_USER=gatus
      - POSTGRES_PASSWORD=${GATUS_DB_PASSWORD}
    restart: always
    networks:
      - gatus-backend
    mem_limit: ${DB_MEM_LIMIT:-1024m}
    pids_limit: 100
    shm_size: 128mb
    security_opt:
      - no-new-privileges=true
    read_only: true
    tmpfs:
      - /tmp
      - /run
    volumes:
      - ./data/db:/var/lib/postgresql
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # To allow longer upgrade times without marking the service as unhealthy

  # pgautoupgrade starts as root to perform data-directory upgrade operations
  # before handing off to Postgres. cap_drop: ALL would break that process.
  gatus-db-upgrade:
    image: docker.io/pgautoupgrade/pgautoupgrade:18.3-alpine@sha256:fadc9788ee25f7acc040bbf485a880ce7ca9021575bd6e45b0ca4cf7edb50d5b
    container_name: gatus-db-upgrade
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - POSTGRES_DB=gatus
      - POSTGRES_USER=gatus
      - POSTGRES_PASSWORD=${GATUS_DB_PASSWORD}
      - PGAUTO_ONESHOT=yes
    restart: "no"
    network_mode: none
    mem_limit: ${DB_MEM_LIMIT:-1024m}
    pids_limit: 100
    shm_size: 128mb
    security_opt:
      - no-new-privileges=true
    volumes:
      - ./data/db:/var/lib/postgresql

  # tiredofit/db-backup uses s6-overlay which must start as root.
  # It handles user switching internally via USER_DBBACKUP/GROUP_DBBACKUP.
  # read_only is also not set because s6-overlay needs extensive writable paths.
  # cap_drop: ALL is therefore omitted.
  # MODE=MANUAL + MANUAL_RUN_FOREVER=FALSE makes the container run one backup
  # and exit cleanly. The nightly CD script (dccd.sh) starts it fresh each run.
  gatus-db-backup:
    image: docker.io/tiredofit/db-backup:4.1.100@sha256:78e3cb669ee9648c1a4ab7e8421c6e89d01b659bfa5963f7611a2347b2009eab
    container_name: gatus-db-backup
    depends_on:
      gatus-db:
        condition: service_healthy
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    command:
      - "backup-now"
    environment:
      - USER_DBBACKUP=3103
      - GROUP_DBBACKUP=3103
      - CONTAINER_NAME=gatus-db-backup
      - CONTAINER_ENABLE_MONITORING=FALSE
      - CONTAINER_ENABLE_SCHEDULING=FALSE
      # Run once and exit — restarted nightly by dccd.sh
      - MODE=MANUAL
      - MANUAL_RUN_FOREVER=FALSE
      # Notification settings
      - ENABLE_NOTIFICATIONS=TRUE
      - NOTIFICATION_TYPE=EMAIL
      - SMTP_HOST=${NOTIFICATIONS_EMAIL_HOST}
      - SMTP_DOMAIN=${NOTIFICATIONS_EMAIL_DOMAIN}
      - SMTP_PORT=${NOTIFICATIONS_EMAIL_PORT}
      - SMTP_USER=${NOTIFICATIONS_EMAIL_USERNAME}
      - SMTP_PASS=${NOTIFICATIONS_EMAIL_PASSWORD}
      - MAIL_TO=${NOTIFICATIONS_EMAIL_TO}
      - MAIL_FROM=${NOTIFICATIONS_EMAIL_FROM}
      - SMTP_AUTHENTICATION=on
      - SMTP_TLSCERTCHECK=TRUE
      - SMTP_STARTTLS=on
      - SMTP_TLS=on
      # Backup defaults
      - DEFAULT_CHECKSUM=SHA1
      - DEFAULT_COMPRESSION=ZSTD
      - DEFAULT_CLEANUP_TIME=2880
      # Encryption
      - DEFAULT_ENCRYPT=TRUE
      - DEFAULT_ENCRYPT_PASSPHRASE=${DB_ENC_PASSPHRASE}
      # Database
      - DB01_TYPE=pgsql
      - DB01_HOST=gatus-db
      - DB01_NAME=gatus
      - DB01_USER=gatus
      - DB01_PORT=5432
      - DB01_PASS=${GATUS_DB_PASSWORD}
    restart: "no"
    networks:
      - gatus-backend
    mem_limit: ${BACKUP_MEM_LIMIT:-1024m}
    pids_limit: 100
    security_opt:
      - no-new-privileges=true
    volumes:
      - ./backups/db-backup:/backup

  # build-from-source: This repo is owned by the same maintainer. The branch
  # reference is not digest-pinned, which is accepted for this first-party tool.
  gatus-sidecar:
    build: https://github.com/DevSecNinja/gatus-sidecar.git#feature/docker-support
    container_name: gatus-sidecar
    command:
      - --mode=docker
      - --output=/config/gatus-sidecar.yaml
      - --docker-default-protocol=https
      - --docker-default-group=Docker
    depends_on:
      gatus-docker-proxy:
        condition: service_healthy
    env_file:
      - path: ../shared/env/tz.env
    environment:
      - DOCKER_HOST=tcp://gatus-docker-proxy:2375
    restart: always
    networks:
      - gatus-backend
    mem_limit: ${SIDECAR_MEM_LIMIT:-100m}
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data/sidecar-config:/config

  # LinuxServer socket-proxy runs as root by design (requires Docker socket access).
  # It does not support custom users, mods, or scripts.
  # See: https://github.com/linuxserver/docker-socket-proxy
  # cap_drop: ALL is therefore omitted.
  gatus-docker-proxy:
    image: lscr.io/linuxserver/socket-proxy:version-3.2.14-r0@sha256:56dde3144ef213d2df1ee3d600baad521bd8b8c2bf844672719b07363606f4c2
    container_name: gatus-docker-proxy
    env_file:
      - path: ../shared/env/tz.env
    environment:
      - CONTAINERS=1 # Allow access to viewing containers
      - EVENTS=1 # Allow access to the /events stream (required for gatus-sidecar docker mode)
      - POST=0 # Disallow any POST operations (effectively read-only)
    restart: always
    networks:
      - gatus-backend
    mem_limit: ${PROXY_MEM_LIMIT:-50m}
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        - "http://localhost:2375/_ping"
      interval: 5s
      timeout: 5s
      retries: 3

networks:
  gatus-frontend:
    name: gatus-frontend
    driver: bridge
  gatus-backend:
    name: gatus-backend
    driver: bridge
    internal: true
