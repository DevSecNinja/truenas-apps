---
storage:
  type: ${DB_ENGINE}
  path: "${DB_ENGINE}://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_DATABASE}?sslmode=disable"

# Enable Prometheus metrics
metrics: true

alerting:
  email:
    from: ${NOTIFICATIONS_EMAIL_FROM}
    username: ${NOTIFICATIONS_EMAIL_USERNAME}
    password: ${NOTIFICATIONS_EMAIL_PASSWORD}
    host: ${NOTIFICATIONS_EMAIL_HOST}
    port: ${NOTIFICATIONS_EMAIL_PORT}
    to: ${NOTIFICATIONS_EMAIL_TO}
    client:
      insecure: false
    default-alert:
      description: "Health check failed"
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 5

endpoint-defaults: &defaults
  group: Internal
  interval: 1m
  client:
    timeout: 5s
    dns-resolver: "udp://${IP_DNS_SERVER_1}:53"
  conditions:
    - "[STATUS] == 200"
    - "[CERTIFICATE_EXPIRATION] > 48h"
    - "[RESPONSE_TIME] < 1000"
  alerts:
    - type: email
      description: "Health check failed"

# Use a public resolver for external endpoints so that a temporary AdGuard
# outage doesn't cause false-positive failures via Docker's 127.0.0.11 fallback.
external-defaults: &external-defaults
  group: External
  interval: 1m
  client:
    timeout: 5s
    dns-resolver: "udp://1.1.1.1:53"
  conditions:
    - "[STATUS] == 200"
    - "[CERTIFICATE_EXPIRATION] > 48h"
    - "[RESPONSE_TIME] < 1000"
  alerts:
    - type: email
      description: "Health check failed"

tcp-udp-defaults: &tcp-udp-defaults
  group: Internal
  interval: 1m
  client:
    timeout: 5s
    dns-resolver: "udp://${IP_DNS_SERVER_1}:53"
  conditions:
    - "[CONNECTED] == true"
  alerts:
    - type: email
      description: "Health check failed"
      send-on-resolved: true

# Pause endpoint executions if internet is down
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 60s

# External endpoints pushed programmatically (e.g. CD pipeline status)
external-endpoints:
  - name: docker-compose-cd
    group: Webhooks
    token: "${GATUS_CD_TOKEN}"
    heartbeat:
      interval: 25h
    alerts:
      - type: email
        description: "CD pipeline has not reported in 25 hours"
        send-on-resolved: true

endpoints:
  #
  # External HTTP
  #

  - name: DevSecNinja - HTTP
    <<: *external-defaults
    url: "https://devsecninja.com/"

  - name: hadiscover - HTTP
    <<: *external-defaults
    url: "https://hadiscover.com/"
    group: External
    interval: 1m
    conditions:
      - "[BODY] == pat(*Built with 💙 for the Home Assistant community*)"
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"

  - name: hadiscover WWW - HTTP
    <<: *external-defaults
    url: "https://www.hadiscover.com/"
    interval: 1m
    conditions:
      - "[BODY] == pat(*Built with 💙 for the Home Assistant community*)"
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"

  - name: hadiscover API - HTTP
    <<: *external-defaults
    url: "https://api.hadiscover.com/api/v1/statistics"
    method: GET
    headers:
      Accept: application/json
    interval: 1m
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"
      - "[BODY].total_repositories != null"
      - "[BODY].total_automations != null"
      - "[BODY].total_repositories > 0"
      - "[BODY].total_automations > 10"

  - name: V60 - HTTP
    <<: *external-defaults
    url: "https://v60.${DOMAINNAME}"
    group: External
    conditions:
      - "[BODY] == pat(*V60 Recipe Calculator*)"
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"

  - name: Bing - HTTP
    <<: *external-defaults
    url: "https://bing.com/"

  #
  # Internal HTTP
  #

  - name: Home Assistant - HTTP
    <<: *defaults
    url: "https://home.${DOMAINNAME}"

  - name: UniFi Guest - HTTP
    <<: *defaults
    url: "https://unifi-guest.${DOMAINNAME}:8843/guest/s/default/"

  - name: UniFi - Inform (TCP)
    <<: *tcp-udp-defaults
    url: "tcp://${IP_SVLNAS}:8080"

  - name: UniFi - STUN (UDP)
    <<: *tcp-udp-defaults
    url: "udp://${IP_SVLNAS}:3478"

  - name: UniFi - Device Discovery (UDP)
    <<: *tcp-udp-defaults
    url: "udp://${IP_SVLNAS}:10001"

  - name: UniFi - Speed Test (TCP)
    <<: *tcp-udp-defaults
    url: "tcp://${IP_SVLNAS}:6789"

  - name: UniFi - SSH (TCP)
    <<: *tcp-udp-defaults
    url: "tcp://${IP_SVLNAS}:2221"

  #
  # DNS
  #

  - name: AdGuard Router - DNS
    url: "${IP_DNS_SERVER_1}" # Address of the DNS server to use
    group: Internal
    dns:
      query-name: "SVLNAS.${DOMAINNAME}"
      query-type: "A"
    conditions:
      - "[BODY] == ${IP_DNS_SERVER_1}5"
      - "[DNS_RCODE] == NOERROR"

  - name: Google.com - DNS
    url: "${IP_DNS_SERVER_1}" # Address of the DNS server to use
    group: External
    dns:
      query-name: "google.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  #
  # ICMP
  #

  - name: Google - ICMP
    url: "icmp://8.8.8.8"
    group: External
    conditions:
      - "[CONNECTED] == true"

  - name: Quad9 - ICMP
    url: "icmp://9.9.9.9"
    group: External
    conditions:
      - "[CONNECTED] == true"
