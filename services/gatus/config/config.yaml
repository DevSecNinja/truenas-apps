---
storage:
  type: ${DB_ENGINE}
  path: "${DB_ENGINE}://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_DATABASE}?sslmode=disable"

# Enable Prometheus metrics
metrics: true

alerting:
  email:
    from: ${NOTIFICATIONS_EMAIL_FROM}
    username: ${NOTIFICATIONS_EMAIL_USERNAME}
    password: ${NOTIFICATIONS_EMAIL_PASSWORD}
    host: ${NOTIFICATIONS_EMAIL_HOST}
    port: ${NOTIFICATIONS_EMAIL_PORT}
    to: ${NOTIFICATIONS_EMAIL_TO}
    client:
      insecure: false
    default-alert:
      description: "Health check failed"
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 5
  custom:
    url: "https://home.${DOMAINNAME}/api/webhook/${HA_WEBHOOK_TOKEN}"
    method: POST
    headers:
      Content-Type: application/json
    body: |
      {
        "status": "[ALERT_TRIGGERED_OR_RESOLVED]",
        "endpoint": "[ENDPOINT_NAME]",
        "group": "[ENDPOINT_GROUP]",
        "description": "[ALERT_DESCRIPTION]",
        "errors": "[RESULT_ERRORS]"
      }
    default-alert:
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 5

endpoint-defaults: &defaults
  group: Internal
  interval: 1m
  conditions:
    - "[STATUS] == 200"
    - "[CERTIFICATE_EXPIRATION] > 48h"
    - "[RESPONSE_TIME] < 1000"
  alerts:
    - type: email
      description: "Health check failed"
      send-on-resolved: true
    - type: custom
      description: "Health check failed"
      send-on-resolved: true

tcp-udp-defaults: &tcp-udp-defaults
  group: Internal
  interval: 1m
  client:
    timeout: 5s
    dns-resolver: "udp://${IP_DNS_SERVER_1}:53"
  conditions:
    - "[CONNECTED] == true"
  alerts:
    - type: email
      description: "Health check failed"
      send-on-resolved: true
    - type: custom
      description: "Health check failed"
      send-on-resolved: true

# Pause endpoint executions if internet is down
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 60s

# External endpoints pushed programmatically (e.g. CD pipeline status)
external-endpoints:
  - name: docker-compose-cd
    group: Webhooks
    token: "${GATUS_CD_TOKEN}"
    heartbeat:
      interval: 25h
    alerts:
      - type: email
        description: "CD pipeline has not reported in 25 hours"
        send-on-resolved: true
        # - type: custom
        #   description: "CD pipeline has not reported in 25 hours"

endpoints:
  #
  # External HTTP
  #

  - name: DevSecNinja - HTTP
    <<: *defaults
    url: "https://devsecninja.com/"

  - name: hadiscover - HTTP
    <<: *defaults
    url: "https://hadiscover.com/"
    group: External
    interval: 1m
    conditions:
      - "[BODY] == pat(*Built with 💙 for the Home Assistant community*)"
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"

  - name: hadiscover WWW - HTTP
    <<: *defaults
    url: "https://www.hadiscover.com/"
    interval: 1m
    conditions:
      - "[BODY] == pat(*Built with 💙 for the Home Assistant community*)"
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"

  - name: hadiscover API - HTTP
    <<: *defaults
    url: "https://api.hadiscover.com/api/v1/statistics"
    method: GET
    headers:
      Accept: application/json
    interval: 1m
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"
      - "[BODY].total_repositories != null"
      - "[BODY].total_automations != null"
      - "[BODY].total_repositories > 0"
      - "[BODY].total_automations > 10"

  - name: V60 - HTTP
    <<: *defaults
    url: "https://v60.${DOMAINNAME}"
    group: External
    conditions:
      - "[BODY] == pat(*V60 Recipe Calculator*)"
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"

  - name: traefik-ext - HTTP
    <<: *defaults
    url: "https://traefik-ext.${DOMAINNAME}"
    group: External
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"

  - name: adguard-ext - HTTP
    <<: *defaults
    url: "https://adguard-ext.${DOMAINNAME}"
    group: External
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 48h"
      - "[RESPONSE_TIME] < 1000"

  - name: Bing - HTTP
    <<: *defaults
    url: "https://bing.com/"

  #
  # Internal HTTP (non-Docker or special protocol endpoints)
  # These can't be discovered via sidecar labels (e.g. secondary routers on the same container).
  #

  - name: UniFi Guest Portal - HTTPS
    <<: *defaults
    url: "https://traefik"
    headers:
      Host: "unifi-guest.${DOMAINNAME}"

  - name: UniFi - Inform (TCP)
    <<: *tcp-udp-defaults
    url: "tcp://${IP_SVLNAS}:8080"

  - name: UniFi - STUN (UDP)
    <<: *tcp-udp-defaults
    url: "udp://${IP_SVLNAS}:3478"

  - name: UniFi - Device Discovery (UDP)
    <<: *tcp-udp-defaults
    url: "udp://${IP_SVLNAS}:10001"

  - name: UniFi - Speed Test (TCP)
    <<: *tcp-udp-defaults
    url: "tcp://${IP_SVLNAS}:6789"

  - name: UniFi - SSH (TCP)
    <<: *tcp-udp-defaults
    url: "tcp://${IP_SVLNAS}:2221"

  #
  # DNS
  #

  # Tests: AdGuard (direct on NAS) is up and serving internal static records.
  # Failure here means AdGuard itself is down — independent of router forwarding.
  - name: AdGuard NAS Direct - DNS
    url: "${IP_SVLNAS}"
    group: Internal
    dns:
      query-name: "SVLNAS.${DOMAINNAME}"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  # Tests: Router (Ubiquiti) forwards DNS to AdGuard and internal records resolve.
  # If this fails but AdGuard NAS Direct passes → router forwarding is broken.
  # If both fail → AdGuard itself is down.
  - name: AdGuard Router - DNS
    url: "${IP_DNS_SERVER_1}"
    group: Internal
    dns:
      query-name: "SVLNAS.${DOMAINNAME}"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  # Tests: Full external resolution chain (Router → AdGuard → Unbound → Quad9).
  # If this fails but AdGuard Router - DNS passes → Unbound or upstream is broken.
  - name: Google.com - DNS
    url: "${IP_DNS_SERVER_1}"
    group: External
    dns:
      query-name: "google.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  # Tests: DNSSEC validation chain is intact end-to-end.
  # internetsociety.org is DNSSEC-signed; a broken chain returns SERVFAIL instead of NOERROR.
  - name: DNSSEC Validation - DNS
    url: "${IP_DNS_SERVER_1}"
    group: Internal
    dns:
      query-name: "internetsociety.org"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  # Tests: Quad9 is actually resolving DNS (not just reachable via ICMP).
  # If this fails but Quad9 ICMP passes → outbound UDP/53 is blocked or Quad9 port is down.
  - name: Quad9 - DNS
    url: "9.9.9.9"
    group: External
    dns:
      query-name: "google.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  #
  # ICMP
  #

  - name: Google - ICMP
    url: "icmp://8.8.8.8"
    group: External
    conditions:
      - "[CONNECTED] == true"

  - name: Quad9 - ICMP
    url: "icmp://9.9.9.9"
    group: External
    conditions:
      - "[CONNECTED] == true"
