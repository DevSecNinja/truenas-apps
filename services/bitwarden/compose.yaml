---
services:
  # Bitwarden Lite (formerly "Bitwarden Unified") is the official single-image
  # self-hosted Bitwarden server, intended for personal use and home-labs.
  # The image bundles nginx + multiple .NET services (api, identity, admin,
  # icons, notifications, sso, scim, events) orchestrated by supervisord.
  #
  # The entrypoint script must run as root: it generates an Identity PFX
  # certificate via openssl, creates the in-container `bitwarden` user from
  # PUID/PGID, chowns /etc/bitwarden + nginx + supervisor paths, and finally
  # `exec su-exec`s into supervisord as PUID:PGID. Therefore:
  #   - no `user:` directive (root → drops via su-exec)
  #   - no `read_only:` (entrypoint writes nginx/supervisor/cert files)
  #   - cap_drop: ALL is applied; CHOWN/SETUID/SETGID/SETPCAP/DAC_OVERRIDE/FOWNER
  #     are re-added because they are required by adduser/addgroup, the chown
  #     chain in entrypoint.sh, and the final su-exec privilege drop.
  bitwarden:
    image: ghcr.io/bitwarden/lite:2026.4.0
    container_name: bitwarden
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=3126 # svc-app-bitwarden
      - PGID=3126 # svc-app-bitwarden
      - BW_DOMAIN=vault.${DOMAINNAME}
      # SQLite — the entrypoint auto-creates /etc/bitwarden/vault.db
      - BW_DB_PROVIDER=sqlite
      - BW_DB_FILE=/etc/bitwarden/vault.db
      # Traefik terminates TLS — disable internal SSL
      - BW_ENABLE_SSL=false
      - BW_PORT_HTTP=8080
      # Lower memory by proxying brand icons to Bitwarden's cloud
      - BW_ENABLE_ICONS=false
      - BW_ICONS_PROXY_TO_CLOUD=true
      # Disable services not needed for personal use (default false, set explicitly)
      - BW_ENABLE_EVENTS=false
      - BW_ENABLE_SCIM=false
      - BW_ENABLE_SSO=false
      # Required: get from https://bitwarden.com/host/
      - BW_INSTALLATION_ID=${BW_INSTALLATION_ID}
      - BW_INSTALLATION_KEY=${BW_INSTALLATION_KEY}
      # Lock down the deployment to a single account after first login
      - globalSettings__disableUserRegistration=${BW_DISABLE_USER_REGISTRATION:-true}
      - adminSettings__admins=${BW_ADMIN_EMAILS}
      # SMTP — required for new-device verification, password resets, etc.
      - globalSettings__mail__replyToEmail=${NOTIFICATIONS_EMAIL_FROM}
      - globalSettings__mail__smtp__host=${NOTIFICATIONS_EMAIL_HOST}
      - globalSettings__mail__smtp__port=${NOTIFICATIONS_EMAIL_PORT}
      - globalSettings__mail__smtp__ssl=false
      - globalSettings__mail__smtp__startTls=true
      - globalSettings__mail__smtp__username=${NOTIFICATIONS_EMAIL_USERNAME}
      - globalSettings__mail__smtp__password=${NOTIFICATIONS_EMAIL_PASSWORD}
      # Stable cryptographic keys — if unset, the entrypoint generates a fresh
      # random value on every container start, invalidating all device sessions
      # and the IdentityServer signing certificate. Pin them once via SOPS so
      # restarts (Renovate digest bumps, host reboots) don't log everyone out.
      - globalSettings__internalIdentityKey=${BW_INTERNAL_IDENTITY_KEY}
      - globalSettings__oidcIdentityClientKey=${BW_OIDC_IDENTITY_CLIENT_KEY}
      - globalSettings__duo__aKey=${BW_DUO_AKEY}
      - globalSettings__identityServer__certificatePassword=${BW_IDENTITY_CERT_PASSWORD}
      # Refresh-token policy: absolute 30-day expiry (no sliding renewal) so
      # MFA is re-prompted at least monthly even on long-lived clients.
      - globalSettings__IdentityServer__ApplyAbsoluteExpirationOnRefreshToken=true
      - globalSettings__IdentityServer__AbsoluteRefreshTokenLifetimeSeconds=2592000
      # bitwarden-frontend network is IPv4-only — disable the IPv6 nginx listener.
      - BW_ENABLE_IPV6=false
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      - bitwarden-frontend
    mem_limit: ${MEM_LIMIT:-1024m}
    # supervisord spawns 8+ worker processes (admin, api, identity, icons,
    # notifications, sso, scim, events, nginx) plus their own .NET threads.
    pids_limit: 300
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # Entrypoint chowns /etc/bitwarden, /var/log, nginx + supervisor dirs
      - DAC_OVERRIDE # Traverse bind-mount paths owned by host users (e.g. truenas_admin)
      - FOWNER # chown chain across multiple owners (root, runtime user)
      - SETGID # adduser/addgroup + su-exec privilege drop
      - SETUID # adduser/addgroup + su-exec privilege drop
      - SETPCAP # su-exec capability transition
    volumes:
      - ./data:/etc/bitwarden
      - ./data/logs:/var/log/bitwarden
    # Runtime-only writable paths backed by tmpfs. The image rootfs cannot be
    # set read_only: true because the entrypoint addgroup/adduser writes to
    # /etc/passwd and /etc/group, but isolating these working dirs to tmpfs
    # still narrows the writable surface and clears them on every restart.
    tmpfs:
      - /tmp
      - /run
      - /var/run/nginx
      - /var/lib/nginx/tmp
    labels:
      # Homepage
      - homepage.group=Infrastructure
      - homepage.name=Bitwarden Lite
      - homepage.icon=bitwarden.svg
      - homepage.href=https://vault.$DOMAINNAME
      - homepage.description=Self-hosted password manager
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=bitwarden-frontend"
      ## HTTP Routers
      ### Public router — clients (web vault, mobile, desktop, browser ext.)
      ### must NOT go through Traefik Forward Auth: those endpoints handle
      ### their own authentication via the Bitwarden API/Identity services.
      - "traefik.http.routers.bitwarden-rtr.rule=Host(`vault.${DOMAINNAME}`)"
      - "traefik.http.routers.bitwarden-rtr.entrypoints=https"
      - "traefik.http.routers.bitwarden-rtr.middlewares=chain-no-auth-bitwarden@file"
      - "traefik.http.routers.bitwarden-rtr.service=bitwarden"
      ### Admin panel — protected by Traefik Forward Auth in addition to
      ### the built-in admin authentication (defence in depth).
      - "traefik.http.routers.bitwarden-admin-rtr.rule=Host(`vault.${DOMAINNAME}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.bitwarden-admin-rtr.entrypoints=https"
      - "traefik.http.routers.bitwarden-admin-rtr.middlewares=chain-auth-bitwarden@file"
      - "traefik.http.routers.bitwarden-admin-rtr.service=bitwarden"
      ## HTTP Services
      - "traefik.http.services.bitwarden.loadbalancer.server.port=8080"
      ## Monitoring (Gatus — internal entrypoint only, no auth)
      - "traefik.http.routers.bitwarden-monitor.rule=Host(`vault.${DOMAINNAME}`)"
      - "traefik.http.routers.bitwarden-monitor.entrypoints=monitoring"
      - "traefik.http.routers.bitwarden-monitor.middlewares=chain-no-auth-bitwarden@file"
      - "traefik.http.routers.bitwarden-monitor.service=bitwarden"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444"
      - "gatus.headers.Host=vault.${DOMAINNAME}"
      - 'gatus.conditions=["[STATUS] == 200", "[RESPONSE_TIME] < 2000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--spider"
        - "-q"
        # Use 127.0.0.1 explicitly — Alpine's /etc/hosts resolves "localhost"
        # to ::1 first, but the rendered nginx config only listens on
        # 0.0.0.0:8080 (IPv6 listener fails to bind on hosts without IPv6
        # bridge support, e.g. TrueNAS). busybox wget does not fall back to
        # IPv4, so localhost always reports "Connection refused".
        - "http://127.0.0.1:8080/alive"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  bitwarden-frontend:
    name: bitwarden-frontend
    driver: bridge
