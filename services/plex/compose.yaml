---
# Manual work to implement on a new server:
#
# First-run steps:
#   1. Plex claim token must be refreshed (only 4 minutes valid) (get it from https://www.plex.tv/claim/)
#   2. Spin up the Plex container
#   3. In Settings → Network:
#        - Set 'Custom server access URLs' to https://plex.<DOMAINNAME>
#          (this is what allows Traefik-proxied requests to be accepted)
#        - Set 'LAN Networks' to 192.168.0.0/16,172.16.0.0/16 (Traefik uses 172.16.0.0/16 network)
#          You should now see streams mentioned as 'Local' instead of 'Remote'. Note that within the Plex
#          portal in the server settings, you'll still see 'Remote' being mentioned, but this seems normal)
#
# Remaining setup steps:
# - Enable automatic library scanning in Plex settings
# - Set 'Transcoder temporary directory' to /data/transcode in Plex settings
# - Set backup directory in Plex settings under Scheduled Tasks

services:
  # s6-overlay exception (see ARCHITECTURE.md § "Exceptions — s6-overlay and root-start containers"):
  # - read_only is omitted: s6-overlay writes /etc/passwd and /etc/group for PUID/PGID during startup;
  #   these writes fail silently with read_only=true, causing PUID/PGID to be ignored entirely.
  # - user: is omitted: s6-overlay handles the privilege drop internally.
  # - cap_drop: ALL is still applied; only the four capabilities s6-overlay needs are re-added.
  # PUID=911 (LinuxServer Plex UID) and PGID=3200 (media GID) are set explicitly so that
  # Plex runs as 911:3200, matching the TrueNAS dataset Unix permissions that grant media group read access.
  # /run is mounted as tmpfs (with exec) for s6-overlay's service files.

  # Pre-sets ownership on the ./data/config bind-mount directory to PUID:PGID before plex starts.
  # This is a belt-and-suspenders measure for fresh deploys or ACL resets on ZFS.
  # The main guard is DAC_OVERRIDE on the plex container itself (see below).
  # Runs once, then exits.
  plex-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: plex-init
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    read_only: true
    command:
      - "sh"
      - "-c"
      - "chown -Rv 911:3200 /config"
    volumes:
      - ./data/config:/config

  plex:
    image: lscr.io/linuxserver/plex:version-1.43.0.10492-121068a07@sha256:cbd631f9a972a1c453953a9192c1781dd7d2084db075a1bee78a3cc6387fb103
    container_name: plex
    depends_on:
      plex-init:
        condition: service_completed_successfully
    env_file:
      - path: .env # Decrypted from secret.sops.env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=911 # LinuxServer Plex default UID
      - PGID=3200 # media group — all media-touching services use this GID
      - HOSTNAME=plex
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM_TOKEN} # Get it from: https://www.plex.tv/claim/
    restart: always
    tmpfs:
      - /run:exec
    networks:
      - plex-frontend
    mem_limit: ${MEM_LIMIT:-2048m}
    pids_limit: 500 # Plex spawns many threads for plugins, DB, and transcoding
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # s6-overlay chowns /config to PUID:PGID at startup
      - DAC_OVERRIDE # s6-overlay runs as root before dropping privs; needed to write into /config even when it's owned by PUID:PGID
      - KILL # init-plex-claim (root) signals the temporary Plex process (UID 911) during server claiming
      - SETGID # s6-overlay drops from root GID to PGID
      - SETUID # s6-overlay drops from root UID to PUID
      - SETPCAP # s6-overlay clears the bounding capability set before exec-ing Plex
    security_opt:
      - no-new-privileges=true
    ulimits:
      sigpending: 62793
      nproc: 131072
      nofile: 60000
      core: 0
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - ./data/config:/config
      # Note: set "Transcoder temporary directory" to /data/transcode in Plex settings
      - /dev/shm:/data/transcode
      # Media datasets (ZFS on TrueNAS)
      - /mnt/archive-pool/content/media/audiobooks:/media/audiobooks:ro
      - /mnt/archive-pool/content/media/movies:/media/movies:ro
      - /mnt/archive-pool/content/media/music:/media/music:ro
      - /mnt/archive-pool/content/media/study:/media/study:ro
      - /mnt/archive-pool/content/media/tv:/media/tv:ro
      - /mnt/archive-pool/content/media/youtube:/media/youtube:ro
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:32400/identity"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=Plex
      - homepage.icon=plex.svg
      - homepage.href=https://plex.${DOMAINNAME}
      - homepage.description=Media Services
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=plex-frontend"
      ## HTTP Routers
      - "traefik.http.routers.plex-rtr.rule=Host(`plex.${DOMAINNAME}`)"
      ## Middlewares — no-auth because Plex has its own authentication;
      ## uses plex-specific chain with relaxed CSP (Plex web app needs plex.tv access)
      - "traefik.http.routers.plex-rtr.middlewares=chain-no-auth-plex@file"
      ## HTTP Services
      - "traefik.http.routers.plex-rtr.service=plex"
      - "traefik.http.services.plex.loadbalancer.server.scheme=https"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"
      - "traefik.http.services.plex.loadbalancer.serverstransport=insecure-skip-verify@file"

networks:
  plex-frontend:
    name: plex-frontend
    driver: bridge
