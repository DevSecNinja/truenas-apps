---
# See README.md for first-run setup, networking notes, and volume details.

services:
  # s6-overlay exception — see ARCHITECTURE.md and README.md for details.
  plex-init:
    image: docker.io/library/busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    container_name: plex-init
    restart: "no"
    network_mode: none
    mem_limit: 64m
    pids_limit: 50
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    read_only: true
    command:
      - "sh"
      - "-c"
      - "chown -Rv 911:3200 /config /backups"
    volumes:
      - ./data/config:/config
      - ./backups:/backups

  plex:
    image: lscr.io/linuxserver/plex:version-1.43.0.10492-121068a07@sha256:cbd631f9a972a1c453953a9192c1781dd7d2084db075a1bee78a3cc6387fb103
    container_name: plex
    depends_on:
      plex-init:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=911
      - PGID=3200
      - HOSTNAME=plex
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM_TOKEN}
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    tmpfs:
      - /run:exec
    networks:
      - plex-frontend
    mem_limit: ${MEM_LIMIT:-4096m}
    pids_limit: 500
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - KILL
      - SETGID
      - SETUID
      - SETPCAP
    security_opt:
      - no-new-privileges=true
    ulimits:
      sigpending: 62793
      nproc: 131072
      nofile: 60000
      core: 0
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - ./data/config:/config
      - /dev/shm:/data/transcode
      - ./backups:/backups
      - /mnt/archive-pool/content/media:/media:ro
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:32400/identity"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=Plex
      - homepage.icon=plex.svg
      - homepage.href=https://plex.${DOMAINNAME}
      - homepage.description=Media Services
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=plex-frontend"
      - "traefik.http.routers.plex-rtr.rule=Host(`plex.${DOMAINNAME}`)"
      - "traefik.http.routers.plex-rtr.middlewares=chain-no-auth-plex@file"
      - "traefik.http.routers.plex-rtr.service=plex"
      - "traefik.http.services.plex.loadbalancer.server.scheme=https"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"
      - "traefik.http.services.plex.loadbalancer.serverstransport=insecure-skip-verify@file"
      ## Monitoring (Gatus — internal entrypoint only)
      - "traefik.http.routers.plex-monitor.rule=Host(`plex.${DOMAINNAME}`)"
      - "traefik.http.routers.plex-monitor.entrypoints=monitoring"
      - "traefik.http.routers.plex-monitor.middlewares=chain-no-auth@file"
      - "traefik.http.routers.plex-monitor.service=plex"
      ## Gatus
      - "gatus.url=http://172.30.100.6:8444"
      - "gatus.headers.Host=plex.${DOMAINNAME}"
      - 'gatus.client={"ignore-redirect": true}'
      - 'gatus.conditions=["[STATUS] == 401", "[RESPONSE_TIME] < 1000"]'
      - 'gatus.alerts=[{"type": "email"}, {"type": "custom"}]'

networks:
  plex-frontend:
    name: plex-frontend
    driver: bridge
