---
# Server-specific compose override for svlazextpub (Azure public web server).
# Applied automatically by dccd.sh -S svlazextpub on top of compose.yaml.
#
# Overrides:
# - AUTH_SUBDOMAIN for the init container (auth-pub instead of auth)
# - Labels: adjusts dashboard hostname and Traefik router rule
services:
  traefik-forward-auth-init:
    environment:
      AUTH_SUBDOMAIN: auth-pub

  traefik-forward-auth:
    labels: !override
      - homepage.group=Infrastructure # Homepage
      - homepage.name=Traefik Forward Auth (svlazextpub)
      - homepage.icon=traefik.svg
      - homepage.href=https://auth-pub.${DOMAINNAME}
      - homepage.description=Authentication Service (svlazextpub)
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-forward-auth-frontend"
      ## HTTP Routers
      - "traefik.http.routers.traefik-forward-auth-rtr.rule=Host(`auth-pub.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.traefik-forward-auth-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services
      - "traefik.http.routers.traefik-forward-auth-rtr.service=traefik-forward-auth"
      - "traefik.http.services.traefik-forward-auth.loadbalancer.server.port=4181"
