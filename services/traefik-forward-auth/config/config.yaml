---
# Example: https://github.com/ItalyPaleAle/traefik-forward-auth/blob/main/config.sample.yaml
# NOTE: This file is a template. The traefik-forward-auth-init container runs
# envsubst.sh to replace placeholders (dollar-brace VAR dollar-brace style) with values from secret.sops.env.
# The processed output is written to data/config.yaml (not committed to git).

server:
  # External hostname for OAuth redirects (AUTH_SUBDOMAIN set per server)
  hostname: "${AUTH_SUBDOMAIN}.${DOMAINNAME}"

cookies:
  # Use the main domain so sub-domains share the cookie
  domain: "${DOMAINNAME}"
  # Prefix is server-specific (set per server in compose.<server>.yaml) so cookies from
  # different TFA instances don't collide despite sharing the same domain.
  namePrefix: "${COOKIE_NAME_PREFIX}"

tokens:
  # Keep users signed in for 12 hours instead of the 2-hour default
  sessionLifetime: "12h"
  # Key used to sign session tokens
  signingKey: "${TRAEFIK_FORWARD_AUTH_SECRET}"

logs:
  level: "info"
  omitHealthChecks: true

portals:
  - name: "main"
    providers:
      - microsoftEntraID:
          tenantID: "${AZURE_TENANT_ID}"
          clientID: "${AZURE_CLIENT_ID}"
          clientSecret: "${AZURE_CLIENT_SECRET}"

# Since we only use one portal, we can set it as the default
defaultPortal: "main"
