---
services:
  # Init: validates egress network macvlan egress before deploying SABnzbd.
  # Resolves DDNS_DOMAIN (home public IP) and compares against the container's
  # api4.ipify.org egress IP. Exits non-zero — blocking sabnzbd — if the IPs match,
  # meaning the container is egressing through the home connection, not egress network.
  sabnzbd-init:
    image: docker.io/library/alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
    container_name: sabnzbd-init
    env_file:
      - path: .env
        required: false
      - path: ../shared/env/tz.env
    restart: "no"
    command:
      - sh
      - -c
      - |-
        echo "=== egress network egress check ==="

        EXTERNAL_IP="$(wget -qO- https://api4.ipify.org)"
        echo "External IP (container egress) : $${EXTERNAL_IP}"

        DDNS_IP="$(nslookup "${DDNS_DOMAIN}" | awk '/^Address:/{a=$2} END{print a}' | sed 's/:[0-9]*$//')"
        echo "DDNS domain                    : ${DDNS_DOMAIN}"
        echo "DDNS IP (home)                 : $${DDNS_IP}"

        if [ -z "$${EXTERNAL_IP}" ]; then
          echo "ERROR: Could not determine external IP via api4.ipify.org"
          exit 1
        fi
        if [ -z "$${DDNS_IP}" ]; then
          echo "ERROR: Could not resolve DDNS_DOMAIN=${DDNS_DOMAIN}"
          exit 1
        fi
        if [ "$${EXTERNAL_IP}" = "$${DDNS_IP}" ]; then
          echo "FAIL: Egress IP matches home IP — container is NOT on egress network, aborting!"
          exit 1
        fi
        echo "OK: Egress IP ($${EXTERNAL_IP}) != home IP ($${DDNS_IP}) — egress network confirmed"
    networks:
      sabnzbd-egress:
        ipv4_address: ${EGRESS_INIT_IP}
        mac_address: ${EGRESS_INIT_MAC}
    mem_limit: 64m
    pids_limit: 10
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true

  # s6-overlay exception — see ARCHITECTURE.md for the full rationale.
  # LinuxServer SABnzbd starts as root and uses s6-overlay to drop to PUID:PGID.
  # read_only: true is omitted (s6-overlay writes to the root fs at startup).
  # user: is omitted (s6-overlay requires root to chown /config to PUID:PGID).
  # cap_drop: ALL still applied; CHOWN/SETUID/SETGID/SETPCAP re-added for s6-overlay.
  #
  # Network design: sabnzbd-egress is listed FIRST so Docker sets it as eth0 and uses
  # EGRESS_GATEWAY as the default route — all internet traffic exits through egress network.
  # sabnzbd-frontend (bridge) is listed SECOND; Docker adds only a specific route for
  # the 172.x.x.x bridge subnet so Traefik can reach SABnzbd without overriding the
  # egress network default route. Traefik is NOT joined to sabnzbd-egress (macvlan) to avoid
  # assigning Traefik an unnecessary egress network IP.
  sabnzbd:
    image: docker.io/linuxserver/sabnzbd:amd64-4.5.1@sha256:39952ab247d97c9d3345a572385ebee158ce497887652d8421f4c0ac44cddf7e
    container_name: sabnzbd
    hostname: sabnzbd
    depends_on:
      sabnzbd-init:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
      - path: ../shared/env/tz.env
    environment:
      - PUID=3115 # svc-app-sabnzbd
      - PGID=3200 # media group — shared with Plex, MeTube, and other arr apps
      - UMASK=002 # group-writable files for media group (664 files, 775 dirs)
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    networks:
      sabnzbd-egress: # FIRST — becomes default route; all internet traffic via egress network
        ipv4_address: ${EGRESS_IP}
        mac_address: ${EGRESS_MAC}
      sabnzbd-frontend: # SECOND — bridge for Traefik; specific route only, no default GW change
      arr-stack-backend: # Internal bridge for arr app inter-communication
    mem_limit: ${MEM_LIMIT:-4096m}
    pids_limit: 200
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # s6-overlay chowns /config to PUID:PGID at startup
      - SETUID # s6-overlay drops from root to PUID
      - SETGID # s6-overlay drops from root to PGID
      - SETPCAP # s6-overlay clears bounding capabilities before exec-ing SABnzbd
    tmpfs:
      - /run:exec # s6-overlay places executables in /run during init
      - /tmp
    volumes:
      - ./data/config:/config
      - /mnt/archive-pool/content:/data # downloads/ on same filesystem as media/ for hardlinks
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:8080/"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      # Homepage
      - homepage.group=Media
      - homepage.name=SABnzbd
      - homepage.icon=sabnzbd.svg
      - homepage.href=https://sabnzbd.$DOMAINNAME
      - homepage.description=Usenet Downloads Manager
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=sabnzbd-frontend"
      ## HTTP Routers
      - "traefik.http.routers.sabnzbd-rtr.rule=Host(`sabnzbd.${DOMAINNAME}`)"
      ## Middlewares
      - "traefik.http.routers.sabnzbd-rtr.middlewares=chain-auth@file"
      ## HTTP Services
      - "traefik.http.routers.sabnzbd-rtr.service=sabnzbd"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"

networks:
  sabnzbd-egress:
    name: sabnzbd-egress
    driver: macvlan
    driver_opts:
      parent: ${EGRESS_PARENT_INTERFACE}
    ipam:
      driver: default
      config:
        - subnet: ${EGRESS_SUBNET}
          gateway: ${EGRESS_GATEWAY}
  sabnzbd-frontend:
    name: sabnzbd-frontend
    driver: bridge
    internal: true # Blocks internet egress via the Traefik bridge — all outbound traffic must use sabnzbd-egress
  arr-stack-backend:
    name: arr-stack-backend
    external: true
